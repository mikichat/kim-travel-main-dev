# Development environment override
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

version: "3.9"

services:
  db:
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  # Optional: Development server container
  # Uncomment to run the backend in a container
  # server:
  #   build:
  #     context: ./server
  #     dockerfile: Dockerfile
  #     target: development
  #   container_name: tourworld_server_dev
  #   restart: unless-stopped
  #   environment:
  #     NODE_ENV: development
  #     DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-tourworld}
  #     PORT: ${SERVER_PORT:-3001}
  #   ports:
  #     - "${SERVER_PORT:-3001}:3001"
  #   volumes:
  #     - ./server/src:/app/src:ro
  #     - ./shared:/app/shared:ro
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   networks:
  #     - tourworld-network

  # Optional: Development client container
  # Uncomment to run the frontend in a container
  # client:
  #   build:
  #     context: ./client
  #     dockerfile: Dockerfile
  #     target: development
  #   container_name: tourworld_client_dev
  #   restart: unless-stopped
  #   environment:
  #     VITE_API_URL: http://localhost:${SERVER_PORT:-3001}
  #   ports:
  #     - "${CLIENT_PORT:-5173}:5173"
  #   volumes:
  #     - ./client/src:/app/src:ro
  #     - ./shared:/app/shared:ro
  #   depends_on:
  #     - server
  #   networks:
  #     - tourworld-network

  # pgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tourworld_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@tourworld.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tourworld-network
    profiles:
      - tools

volumes:
  pgadmin_data:
    name: tourworld_pgadmin_data
