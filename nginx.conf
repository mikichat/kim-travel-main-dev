# ===========================================
# @TASK T6.3 - Nginx Configuration (Legacy Frontend)
# Static file serving + API reverse proxy
# ===========================================

upstream backend_api {
    server backend:5000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Client max body size (for file uploads)
    client_max_body_size 50m;

    # --- API Proxy ---
    # All /api/ requests forwarded to Express backend
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Swagger API docs proxy
    location /api-docs {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Tables API proxy (non-standard path)
    location /tables/ {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Static File Locations ---

    # JavaScript files
    location /js/ {
        alias /usr/share/nginx/html/js/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # CSS files
    location /css/ {
        alias /usr/share/nginx/html/css/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Hanatour module
    location /hanatour/ {
        alias /usr/share/nginx/html/hanatour/;
        expires 1d;
    }

    # Air booking module
    location /air1/ {
        alias /usr/share/nginx/html/air1/;
        expires 1d;
    }

    location /air-booking/ {
        alias /usr/share/nginx/html/air-booking/;
        expires 1d;
    }

    # Invoice module
    location /in/ {
        alias /usr/share/nginx/html/in/;
        expires 1d;
    }

    # Invoice page routes (proxy to backend for server-side routing)
    location = /invoice {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /invoice/preview {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /invoices {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Schedule upload route
    location = /schedule-upload {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Contract module
    location /contract/ {
        alias /usr/share/nginx/html/contract/;
        expires 1d;
    }

    # Components
    location /components/ {
        alias /usr/share/nginx/html/components/;
        expires 1d;
    }

    # Design assets
    location /design/ {
        alias /usr/share/nginx/html/design/;
        expires 7d;
    }

    # Quote editor
    location /quote-editor-v1/ {
        alias /usr/share/nginx/html/quote-editor-v1/;
        expires 1d;
    }

    # Document templates
    location /doc-template-1/ {
        alias /usr/share/nginx/html/doc-template-1/;
        expires 1d;
    }

    # Shared assets
    location /shared/ {
        alias /usr/share/nginx/html/shared/;
        expires 7d;
    }

    # Default: try static files, then fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to backend source
    location /backend/ {
        deny all;
    }

    # Deny access to node_modules
    location /node_modules/ {
        deny all;
    }
}
