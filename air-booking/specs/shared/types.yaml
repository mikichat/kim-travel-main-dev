# 공통 타입 정의
# TypeScript interfaces 및 Union types

version: "2.0"
category: shared-types

types:
  Booking:
    description: "통합 예약 정보 (air_bookings 테이블)"
    source: "pages/bookings/types.ts"

    fields:
      - id:
          type: string (UUID)
          description: "예약 ID"
          pk: true

      - user_id:
          type: string
          description: "생성한 사용자 ID"
          required: true

      - customer_id:
          type: string | null
          description: "고객 ID (고객용 뷰 필터링)"

      - pnr:
          type: string
          description: "예약 번호"
          unique: true
          required: true

      - airline:
          type: string | null
          description: "항공사 코드 (예: KE, AA)"

      - flight_number:
          type: string | null
          description: "항공편번호"

      - route_from:
          type: string | null
          description: "출발지 3코드"

      - route_to:
          type: string | null
          description: "도착지 3코드"

      - name_kr:
          type: string | null
          description: "고객명 (한글)"

      - name_en:
          type: string | null
          description: "영문명"

      - passport_number:
          type: string | null
          description: "여권번호 (암호화)"

      - seat_number:
          type: string | null
          description: "좌석번호"

      - fare:
          type: number | null
          description: "요금"

      - nmtl_date:
          type: string | null
          description: "NMTL 마감일 (ISO)"

      - tl_date:
          type: string | null
          description: "TL 마감일 (ISO)"

      - departure_date:
          type: string | null
          description: "출발일 (ISO)"

      - return_date:
          type: string | null
          description: "귀국일 (ISO)"

      - status:
          type: enum
          values: [pending, confirmed, ticketed, cancelled]
          description: "예약 상태"

      - remarks:
          type: string | null
          description: "특별 지시사항"

      - pax_count:
          type: integer
          description: "탑승객 수"

      - agency:
          type: string | null
          description: "예약한 대리점"

      - group_id:
          type: string | null
          description: "단체 그룹 ID"

      - original_pnr_text:
          type: string | null
          description: "원본 PNR 텍스트 (재변환용)"

      - source:
          type: enum
          values: [air-booking, portal]
          description: "입력 출처"

      - created_at:
          type: string (ISO datetime)
          description: "생성일"

      - updated_at:
          type: string (ISO datetime)
          description: "수정일"

    relations:
      - segments: "Segment[] (항공편 구간)"
      - passengers: "Passenger[] (탑승객)"

  Segment:
    description: "항공편 구간 정보 (air_booking_segments)"

    fields:
      - id:
          type: string
          pk: true

      - booking_id:
          type: string
          fk: Booking
          required: true

      - seg_index:
          type: integer
          description: "구간 순서 (0, 1, 2...)"

      - airline:
          type: string
          description: "항공사 코드"

      - flight_number:
          type: string
          description: "항공편번호"

      - route_from:
          type: string
          description: "출발지 3코드"

      - route_to:
          type: string
          description: "도착지 3코드"

      - departure_date:
          type: string (ISO)
          description: "출발일"

      - departure_time:
          type: string
          format: "HH:MM"
          description: "출발시각"

      - arrival_time:
          type: string
          format: "HH:MM"
          description: "도착시각"

      - arrival_date:
          type: string (ISO)
          description: "도착일 (익일 도착 시 다름)"

  Passenger:
    description: "탑승객 정보 (air_booking_passengers)"

    fields:
      - id:
          type: string
          pk: true

      - booking_id:
          type: string
          fk: Booking
          required: true

      - name_en:
          type: string | null
          description: "영문명"

      - name_kr:
          type: string | null
          description: "한글명"

      - title:
          type: string
          values: [MR, MRS, MS, MSTR]
          description: "경칭"

      - gender:
          type: string
          values: [M, F]
          description: "성별"

      - passport_number:
          type: string | null
          description: "여권번호 (AES-256-GCM 암호화)"

  Estimate:
    description: "견적서/내역서 (air_estimates)"

    fields:
      - id:
          type: string
          pk: true

      - doc_type:
          type: enum
          values: [estimate, domestic, settlement, delivery, claim]
          description: "문서 유형"

      - recipient:
          type: string
          description: "수신처"

      - subject:
          type: string
          description: "제목"

      - sections_json:
          type: string (JSON)
          description: "비용 항목 배열"
          structure:
            - item: "항목명"
            - quantity: "수량"
            - unit_price: "단가"
            - amount: "금액"

      - grand_total:
          type: integer
          description: "총액"

      - status:
          type: enum
          values: [draft, sent, confirmed]
          description: "문서 상태"

      - created_at:
          type: string (ISO datetime)

      - updated_at:
          type: string (ISO datetime)

  StatusFilter:
    type: union
    values: ["" | "pending" | "confirmed" | "ticketed" | "cancelled"]
    description: "예약 상태 필터"

  SortField:
    type: union
    values: ["created_at" | "departure_date"]
    description: "정렬 필드"

  BadgeStatus:
    type: union
    values: ["pending" | "imminent" | "completed" | "urgent"]
    description: "상태 배지 타입"

  ParseResult:
    description: "PNR 파싱 결과"

    fields:
      - pnr: "string"
      - airline: "string"
      - flights: "Flight[]"
      - passengers: "ParsedPassenger[]"
      - valid: "boolean"
      - error?: "string | null"

  Flight:
    description: "파싱된 항공편 정보"

    fields:
      - airline: "string"
      - flightNumber: "string"
      - departure: "string (3코드)"
      - departureTime: "string (HH:MM)"
      - arrival: "string (3코드)"
      - arrivalTime: "string (HH:MM)"
      - date: "string (D/M 형식)"
      - arrivalDate?: "string (익일 도착 시)"

  ParsedPassenger:
    description: "파싱된 탑승객"

    fields:
      - name_en: "string"
      - name_kr?: "string"
      - title: "string (MR/MRS/MS)"
      - gender?: "string (M/F)"

  ApiResponse:
    description: "API 응답 표준 형식"

    fields:
      - success: "boolean"
      - data: "T (제네릭)"
      - error?: "string | null"
      - timestamp: "string (ISO)"

enums:
  BookingStatus:
    pending: "대기 (Pending)"
    confirmed: "확정 (Confirmed)"
    ticketed: "발권완료 (Ticketed)"
    cancelled: "취소 (Cancelled)"

  DocType:
    estimate: "해외견적서"
    domestic: "국내견적서"
    settlement: "정산서"
    delivery: "배송장"
    claim: "클레임"

  Source:
    air-booking: "air-booking 앱"
    portal: "내부 포탈"

constants:
  PAX_THRESHOLD: 4
  description: "대단위 그룹 기준 (4인 이상)"

  STATUS_LABEL:
    mapping: "상태별 표시 텍스트"
    source: "pages/bookings/types.ts"

  STATUS_MAP:
    mapping: "상태 → 배지 색상"
    source: "common/StatusBadge.tsx"
