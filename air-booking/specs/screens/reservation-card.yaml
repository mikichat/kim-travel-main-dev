# 모바일 랜딩카드 화면 명세
# @COMPONENT ReservationCard.tsx
# @ROUTE /reservation/:id
# 기존 reservation.html 기반

version: "2.0"
screen: reservation-card
component: ReservationCard.tsx

title: "예약 카드"
description: "예약정보를 모바일 친화적 카드로 표시 + html2canvas 이미지 캡처"
target_users: [customer]

data_requirements:
  resource: bookings
  view_type: customer
  fields:
    - pnr: "예약번호"
    - airline: "항공사"
    - flight_number: "항공편번호"
    - route_from: "출발지 (3코드)"
    - route_to: "도착지 (3코드)"
    - departure_date: "출발일"
    - return_date: "귀국일 (있으면 표시)"
    - segments: "항공편 구간"
    - passengers: "탑승객"
    - remarks: "특별 지시사항"

layout:
  type: single-card
  viewport: mobile-first
  content:
    - header
    - airline_info
    - flights
    - passengers
    - remarks
    - actions

sections:
  header:
    elements:
      - pnr: { size: large, weight: bold }
      - airline: { size: medium }
      - status: { badge: true }

  airline_info:
    display:
      - name: "{{ airline }} ({{ airline_code }})"
      - logo: "항공사 로고 (적재 가능)"

  flights:
    display:
      - outbound:
          - departure_city: "{{ route_from | getAirportName }}"
          - departure_date: "2026년 4월 1일 (목)"
          - departure_time: "14:55"
          - arrival_city: "{{ route_to | getAirportName }}"
          - arrival_date: "익일 (2026년 4월 2일)" or omit if unknown
          - arrival_time: "09:30"
          - flight_info: "{{ airline }} {{ flight_number }}"

      - return:
          condition: "return_date가 있으면 표시"
          display:
            - departure_city: "{{ route_to | getAirportName }}"
            - departure_date: "{{ return_date | formatDate }}"
            - arrival_city: "{{ route_from | getAirportName }}"
            - flight_info: "{{ airline }} {{ flight_number }}"

  passengers:
    title: "탑승객 ({{ count }}명)"
    display:
      - list:
          - name: "{{ name_kr }} ({{ name_en }})"
          - title: "{{ title }}" (adult/child)
          - repeat: for each passenger

  remarks:
    condition: "remarks가 있으면 표시"
    display:
      - label: "특별 지시"
      - content: "{{ remarks }}"

  actions:
    fixed_bottom: true
    elements:
      - copy_card:
          label: "카드 복사"
          icon: copy
          action: copy-card-image
          note: "html2canvas 사용"
      - back:
          label: "뒤로"
          icon: back

features:
  airport_converter:
    function: getAirportName
    input: "3코드 (예: ICN)"
    output: "도시명 (예: 서울)"
    fallback: "3코드 그대로 표시"

  date_formatting:
    departure: "요일 포함 (2026년 4월 1일 (목))"
    arrival:
      format: "{{ arrival_date }} ({{ arrival_time }})" if known
      fallback: omit "도착일 미확인"

  image_capture:
    tool: html2canvas
    format: PNG
    options:
      - useCORS: true
      - allowTaint: false
    fallback: "HTTPS 실패 시 새 탭에서 이미지 표시"
    clipboard: "복사 버튼 클릭 시 클립보드에 저장"

styling:
  card:
    width: "100% (모바일 반응형)"
    max_width: 480px
    padding: 16px
    background: white
    border: subtle shadow
    font: sans-serif

  colors:
    primary: brand-color
    text: #333
    muted: #999
    badge_status: status-specific (see common/StatusBadge)

  spacing:
    section_gap: 16px
    element_gap: 8px

responsive:
  mobile: "100% width, optimized layout"
  tablet: "centered, max-width"
  print: "optimized for html2canvas"

tests:
  - id: load-card
    when: "/reservation/:id 접근"
    then: "예약 데이터 로드 + 카드 표시"

  - id: airport-name-convert
    when: "카드 표시"
    then: "3코드가 도시명으로 변환됨 (예: ICN → 서울)"

  - id: no-arrival-date
    when: "도착일 데이터 없음"
    then: "귀국편 도착일 미표시"

  - id: copy-card-image
    when: "'카드 복사' 클릭"
    then: "html2canvas로 이미지 생성 → 클립보드 저장"

  - id: multiple-passengers
    when: "탑승객 3명 이상"
    then: "모두 목록으로 표시"

  - id: https-fallback
    when: "html2canvas HTTPS 실패"
    then: "새 탭에서 이미지 표시 (사용자 저장 가능)"

  - id: return-flight
    when: "왕복편 (return_date 있음)"
    then: "귀국편도 표시"

security:
  - "고객 데이터만 표시 (행정정보 X)"
  - "PNR 은폐 옵션 (옵션)"
  - "이미지 캡처 시 민감 정보 삭제 옵션"
