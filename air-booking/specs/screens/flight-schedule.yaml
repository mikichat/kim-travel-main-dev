# 항공편 스케줄 관리 화면 명세
# @COMPONENT FlightSchedule.tsx
# @ROUTE /flight-schedule
# 기존 flight-schedule.html 기반

version: "2.0"
screen: flight-schedule
component: FlightSchedule.tsx

title: "항공편 스케줄"
description: "전사 항공편 스케줄 CRUD + 예약장부 조회 + PNR 중복 경고"

data_requirements:
  resources:
    - bookings: "예약 정보"
    - schedules: "항공편 스케줄 (flight_schedules)"
  integrations:
    - "PNR 중복 감지: bookings.pnr vs schedules.flight_number"
    - "탑승자 관리: passengers 통합"

layout:
  type: tabbed
  tabs:
    - id: schedule
      label: "스케줄"
      icon: calendar
      content: schedule-list
    - id: bookings
      label: "예약장부"
      icon: book
      content: booking-list

sections:
  schedule-list:
    layout: table
    elements:
      - header:
          title: "항공편 스케줄"
          actions: [add-schedule, import-schedule, export]
      - toolbar:
          elements: [search, date-filter, airline-filter]
      - content:
          type: sortable-table
          pagination: true
      - modals: [add-edit, pnr-warning, delete-confirm]

  booking-list:
    layout: table
    content: "BookingList 컴포넌트와 동일"
    note: "해당 스케줄의 예약만 필터링"

features:
  schedule_columns:
    - airline: { type: text, width: 80 }
    - flight_number: { type: text, width: 100, editable: true }
    - departure_airport: { type: text, width: 80 }
    - arrival_airport: { type: text, width: 80 }
    - departure_date: { type: date, width: 100 }
    - departure_time: { type: time, width: 80 }
    - arrival_time: { type: time, width: 80 }
    - aircraft: { type: text, width: 100 }
    - seats: { type: number, width: 70 }
    - status: { type: badge, width: 100 }
    - bookings_count: { type: number, width: 80 }
    - actions: { type: actions, width: 150 }

  search:
    fields: [airline, flight_number, route]
    placeholder: "항공사, 항공편, 경로 검색"

  filters:
    date_range: [departure_date]
    airline: autocomplete
    status: [active, completed, cancelled]

actions:
  primary:
    - id: add-schedule
      label: "스케줄 추가"
      icon: plus
      modal: add-edit-schedule

    - id: import-schedule
      label: "일괄 가져오기"
      icon: upload
      action: import-csv

    - id: export
      label: "내보내기"
      icon: download
      action: export-csv

  row:
    - id: view-bookings
      label: "예약 조회"
      icon: book
      action: show-related-bookings
      badge: "{{ bookings_count }}"

    - id: edit
      label: "편집"
      icon: edit
      modal: add-edit-schedule

    - id: delete
      label: "삭제"
      icon: trash
      modal: delete-confirm
      warning: "관련 예약이 있으면 삭제 불가"

modals:
  add-edit-schedule:
    title: "스케줄 {{ action }}"
    size: large
    fields:
      - airline: { type: text, required: true }
      - flight_number: { type: text, required: true, unique: true }
      - departure_airport: { type: text, required: true }
      - arrival_airport: { type: text, required: true }
      - departure_date: { type: date, required: true }
      - departure_time: { type: time, required: true }
      - arrival_time: { type: time, required: true }
      - aircraft: { type: text }
      - seats: { type: number }
      - remarks: { type: textarea }
    validation:
      - "항공편번호 중복 검사"
      - "날짜/시간 유효성"
    actions: [save, pnr-check, cancel]

  pnr-warning:
    title: "PNR 중복 경고"
    type: warning
    content:
      - message: "다음 예약이 이 스케줄과 일치합니다"
      - table: "일치하는 PNR 목록"
        columns: [pnr, airline, flight_number, route, departure_date]
    actions: [view-booking, close]
    note: "스케줄 저장 시 자동 경고 표시"

  delete-confirm:
    title: "스케줄 삭제"
    message: "정말 삭제하시겠습니까?"
    warning: "{{ bookings_count }}개의 관련 예약이 있습니다"
    actions: [delete, cancel]

passenger_management:
  view: "탑승자 목록 조회"
  columns: [name_en, name_kr, seat_number, status]
  actions: [add, edit, remove]
  note: "탑승객 정보는 bookings.passengers에서 조회"

import_export:
  format: CSV
  fields: [airline, flight_number, departure_airport, arrival_airport, departure_date, departure_time, arrival_time, aircraft, seats]
  template: "다운로드 가능한 템플릿"

tests:
  - id: search-schedule
    when: "스케줄 검색"
    then: "필터링된 결과 표시"

  - id: add-schedule
    when: "스케줄 추가"
    then: "새 스케줄 저장"

  - id: duplicate-flight-check
    when: "중복 항공편번호 저장 시도"
    then: "중복 경고"

  - id: pnr-matching
    when: "스케줄 저장"
    then: "일치하는 PNR 자동 감지 + 경고"

  - id: delete-with-bookings
    when: "관련 예약 있는 스케줄 삭제"
    then: "삭제 불가 경고"

  - id: view-related-bookings
    when: "항공편의 '예약 조회' 클릭"
    then: "관련 예약 목록 표시"
