# 예약장부 목록 화면 명세
# @COMPONENT Bookings.tsx
# @ROUTE /bookings
# @TASK P2-S3-T1 - 예약장부 화면, P2-T2 - 키보드 단축키

version: "2.0"
screen: booking-list
component: Bookings.tsx

title: "예약장부"
description: "전사 항공편 예약 현황 조회, 상태 관리, 고객 알림"

data_requirements:
  resource: bookings
  relations:
    - segments (항공편 구간)
    - passengers (탑승객 정보)

layout:
  type: table
  sections:
    - header:
        title: "예약장부"
        actions: [search, filter, group, add-pnr, bulk-invoice]
    - toolbar:
        elements: [search-input, status-filter, sort-dropdown, group-toggle]
    - content:
        type: expandable-table
        pagination: true
        height: fill
    - modals: [pnr-registration, pax-detail, ticket-manage, invoice, notice-send]

features:
  search:
    fields: [pnr, airline, route_from, route_to, agency, name_kr]
    placeholder: "PNR, 항공사, 루트, 대리점 검색"
    hotkey: "ctrl+k / /"

  filters:
    status: [pending, confirmed, ticketed, cancelled]
    agency: autocomplete
    departure_date: range

  sort:
    fields: [created_at, departure_date, nmtl_date]
    default: created_at

  grouping:
    toggle: true
    by: [group_id, agency]

  table_columns:
    - pnr: { type: text, width: 80, sortable: true }
    - airline: { type: text, width: 60 }
    - route: { type: text, computed: "route_from→route_to", width: 120 }
    - departure_date: { type: date, width: 100, sortable: true }
    - nmtl_date: { type: date, width: 100, color_alert: true }
    - status: { type: badge, width: 100 }
    - pax: { type: number, width: 50 }
    - agency: { type: text, width: 100 }
    - actions: { type: actions, width: 150 }

  row_expansion:
    show_segments: true
    show_passengers: true
    show_remarks: true
    show_timeline: true

  deadlines:
    nmtl_color: "#ff6b6b"
    tl_color: "#ffa940"
    imminent_days: 7

actions:
  primary:
    - id: add-pnr
      label: "PNR 등록"
      hotkey: "ctrl+shift+n"
      icon: plus
      modal: pnr-registration

    - id: bulk-invoice
      label: "인보이스 생성"
      enabled_on: checkbox-select
      icon: file-text
      modal: invoice

  row:
    - id: expand
      icon: chevron-down
      action: toggle-expansion

    - id: view-pax
      label: "탑승객"
      icon: users
      modal: pax-detail

    - id: manage-tickets
      label: "발권 관리"
      icon: ticket
      panel: ticket-list

    - id: send-notice
      label: "고객알림"
      icon: mail
      modal: notice-send

    - id: edit
      label: "편집"
      icon: edit
      action: open-edit-form

    - id: delete
      label: "삭제"
      icon: trash
      action: soft-delete

modals:
  pnr-registration:
    title: "PNR 등록"
    size: large
    tabs:
      - id: parse
        label: "파싱 입력"
        fields: [pnr_text, agency]
        actions: [parse, show-manual]
      - id: manual
        label: "수동 입력"
        fields: [pnr, airline, flight_number, route_from, route_to, name_kr, name_en, fare, departure_date, nmtl_date, tl_date, remarks, agency]
    submit: "등록"
    note: "PNR 중복 시 기존 예약 갱신"

  pax-detail:
    title: "탑승객 정보"
    type: read-only
    display:
      - name_en
      - name_kr
      - title
      - gender
      - passport_number

  ticket-manage:
    title: "발권 관리"
    content: TicketList 컴포넌트

  invoice:
    title: "인보이스 생성"
    multiselect: true
    actions: [generate, preview, download, email]

  notice-send:
    title: "고객 알림 전송"
    fields: [email, message_template]
    actions: [send]

keyboard_shortcuts:
  "ctrl+k": "검색창 포커스"
  "/": "검색창 포커스"
  "ctrl+shift+n": "PNR 등록 모달"

tests:
  - id: search-pnr
    given: "예약장부 로드됨"
    when: "PNR 검색 입력"
    then: "필터링된 결과 표시"

  - id: filter-status
    given: "다양한 상태 예약 존재"
    when: "상태 필터 선택"
    then: "해당 상태 예약만 표시"

  - id: expand-row
    given: "예약 행 표시"
    when: "행 클릭"
    then: "구간/탑승객/타임라인 전개"

  - id: bulk-select
    given: "예약 목록"
    when: "여러 예약 체크 후 인보이스 클릭"
    then: "다중 인보이스 생성 모달 열림"

  - id: pnr-duplicate-check
    given: "기존 PNR 존재"
    when: "같은 PNR 등록 시도"
    then: "경고 표시 + UPDATE 옵션 제시"
