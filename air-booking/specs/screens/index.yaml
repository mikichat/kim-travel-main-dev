# 화면 목록 — screen-spec v2.0
# 원데이터 하나(PNR) → 고객용 뷰 + 예약장부용 뷰 + 관리화면
# 같은 PNR 중복 저장 금지 (INSERT or UPDATE)

version: "2.0"
screens:
  - id: booking-list
    name: "예약장부 목록"
    path: /bookings
    component: Bookings.tsx
    description: "전사 항공편 예약 장부 (PNR 검색, 상태 필터, 마감일 강조)"
    data_model: bookings (segments, passengers)
    users: [staff, admin]

  - id: converter
    name: "PNR 항공편 변환기"
    path: /converter
    component: PnrConverter.tsx
    description: "PNR 텍스트 → 파싱 → DB 저장 (고객용 뷰)"
    data_model: bookings
    tabs:
      - "변환기"
      - "저장된 항공편"
      - "버스예약"
      - "안내문"
    users: [staff, admin, customer]

  - id: converter-saved
    name: "저장된 항공편"
    path: /converter/saved
    component: SavedFlights.tsx
    description: "DB 저장 항공편 목록 (불러오기, 삭제, 팀 병합)"
    data_model: bookings (flight_saves + air_bookings)
    users: [staff, admin]

  - id: flight-schedule
    name: "항공편 스케줄 관리"
    path: /flight-schedule
    component: FlightSchedule.tsx
    description: "스케줄 CRUD + 예약장부 탭 + PNR 중복 경고"
    data_model: bookings + schedules
    users: [staff, admin]

  - id: estimate-editor
    name: "견적서/내역서 에디터"
    path: /estimate-editor
    component: EstimateEditor.tsx
    description: "3개 에디터 (domestic/estimate/delivery) DB 저장/불러오기"
    data_model: estimates
    tabs:
      - "국내견적서"
      - "해외견적서"
      - "정산/배송"
    users: [staff, admin]
    auth: false
    note: "내부망 전용"

  - id: reservation-card
    name: "모바일 랜딩카드"
    path: /reservation/:id
    component: ReservationCard.tsx
    description: "예약정보 카드 형태 + html2canvas 이미지 캡처"
    data_model: bookings (고객용 뷰)
    users: [customer]

  - id: bus-reservation
    name: "버스예약"
    path: /converter/bus
    component: BusReservation.tsx
    description: "변환기의 '버스예약' 탭 (localStorage → DB 전환 대기)"
    data_model: bus_reservations
    status: migrate_from_localstorage

  - id: notices
    name: "안내문"
    path: /converter/notices
    component: Notices.tsx
    description: "변환기의 '안내문' 탭 (localStorage → DB 전환 대기)"
    data_model: saved_notices
    status: migrate_from_localstorage
