# PNR 항공편 변환기 화면 명세
# @COMPONENT PnrConverter.tsx
# @ROUTE /converter
# 기존 air1/index.html 기반 (4개 탭)

version: "2.0"
screen: converter
component: PnrConverter.tsx

title: "항공편 변환기"
description: "PNR 텍스트 파싱 → 항공편 변환 → DB 저장 (고객용 뷰)"
note: "원데이터(PNR) 하나 → 같은 PNR이면 UPDATE (INSERT or UPDATE)"

data_requirements:
  resource: bookings
  fields:
    - original_pnr_text: "PNR 원본 텍스트 (재변환용)"
    - route_from: "3코드"
    - route_to: "3코드"
    - departure_date: "ISO"
    - return_date: "ISO"
    - name_kr: "고객명"
    - name_en: "영문명"

layout:
  type: tabbed
  tabs:
    - id: converter
      label: "변환기"
      icon: zap
      content: converter-tab
    - id: saved
      label: "저장된 항공편"
      icon: save
      content: SavedFlights
    - id: bus
      label: "버스예약"
      icon: bus
      content: BusReservation
      status: migrate_from_localstorage
    - id: notices
      label: "안내문"
      icon: info
      content: Notices
      status: migrate_from_localstorage

sections:
  converter-tab:
    layout: two-column
    left:
      title: "PNR 입력"
      elements:
        - textarea:
            id: pnr-input
            placeholder: "PNR 텍스트 붙여넣기 (여러 PNR 가능)"
            height: 300
        - actions: [convert, clear]

    right:
      title: "파싱 결과"
      display:
        - type: tabbed
          subtabs:
            - label: "항공편"
              content: flight-info
            - label: "탑승객"
              content: passengers-list
            - label: "모바일 카드"
              content: mobile-card

features:
  parsing:
    input: "PNR 텍스트 (여러 라인/PNR 가능)"
    output:
      - flights: "항공편 구간 배열"
      - passengers: "탑승객 배열"
      - pnr: "추출된 PNR"
      - airline: "항공사 코드"
    validation:
      - "PNR 3-6자 (uppercase)"
      - "항공편번호 규칙"
      - "날짜 형식"
      - "승객명 (영문/한글)"

  display:
    flight_info:
      - segment: { icon: plane, format: "항공사 항공편 (출발→도착)" }
      - date: { format: "2026년 4월 1일 (목) 14:55 ~ 익일 09:30" }
      - route: { format: "서울 (ICN) → 런던 (LHR)" }

    passengers:
      columns: [name_en, name_kr, title, gender]
      display: "list or table"

  mobile_card:
    display: "MobileCard 컴포넌트"
    content:
      - header: "PNR / 항공사"
      - flight_details: "항공편정보"
      - passengers: "탑승객"
      - button: "카드 복사 (html2canvas)"

actions:
  primary:
    - id: convert
      label: "변환"
      icon: zap
      action: parse-pnr

    - id: clear
      label: "초기화"
      icon: x
      action: clear-form

  secondary:
    - id: save-db
      label: "DB에 저장"
      icon: save
      enabled: result exists
      modal: save-confirm

    - id: copy-card
      label: "카드 복사"
      icon: copy
      enabled: result exists
      action: copy-mobile-card-image
      note: "HTTP 폴백 포함 (HTTPS 실패 시 새 탭 이미지)"

    - id: load-saved
      label: "저장된 항공편 불러오기"
      icon: folder
      route: converter/saved

save_modal:
  title: "DB에 저장"
  confirm_message: "항공편을 저장하시겠습니까?"
  note: "PNR 중복 시 기존 항공편 업데이트"
  fields:
    - id: confirm
      type: checkbox
      label: "원본 PNR 텍스트 저장"
      help: "재변환 시 사용됨"
  actions: [save, cancel]

error_handling:
  parse_error:
    message: "PNR 파싱 실패"
    action: "형식 확인 또는 수동 입력"
  duplicate_pnr:
    warning: "PNR 중복 감지"
    options: [update-existing, new-entry, cancel]

tests:
  - id: parse-single-pnr
    when: "PNR 텍스트 입력 → 변환"
    then: "항공편/탑승객 파싱 완료"

  - id: parse-multiple-pnr
    when: "여러 PNR 입력 → 변환"
    then: "모든 PNR 파싱 + 탭 선택 가능"

  - id: save-to-db
    when: "파싱 후 '저장' 클릭"
    then: "DB 저장 + 성공 토스트"

  - id: duplicate-pnr-update
    when: "기존 PNR 재입력 → 저장"
    then: "UPDATE (새로운 예약 X)"

  - id: copy-mobile-card
    when: "카드 복사 클릭"
    then: "MobileCard 이미지 클립보드 저장 (HTTPS 폴백)"
