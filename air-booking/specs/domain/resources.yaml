# 도메인 리소스 정의 — DB 통합 및 서버 일원화
# 핵심 원칙: 원데이터 하나 → 고객용 뷰 + 예약장부용 뷰

version: "2.0"

resources:
  bookings:
    description: "통합 예약 (PNR 기반, UNIQUE)"
    table: air_bookings
    fields:
      - { name: id, type: text, pk: true }
      - { name: pnr, type: text, unique: true, required: true }
      - { name: airline, type: text }
      - { name: flight_number, type: text }
      - { name: route_from, type: text, note: "3코드 (ICN)" }
      - { name: route_to, type: text, note: "3코드 (ICN)" }
      - { name: name_kr, type: text }
      - { name: name_en, type: text }
      - { name: departure_date, type: text }
      - { name: return_date, type: text }
      - { name: nmtl_date, type: text }
      - { name: tl_date, type: text }
      - { name: status, type: text, values: [pending, confirmed, ticketed, cancelled] }
      - { name: fare, type: real }
      - { name: pax_count, type: integer }
      - { name: agency, type: text }
      - { name: group_id, type: text }
      - { name: remarks, type: text }
      - { name: original_pnr_text, type: text, note: "PNR 원본 텍스트 보존 (재변환용)" }
      - { name: customer_name, type: text, note: "고객 대표명" }
      - { name: customer_phone, type: text }
      - { name: customer_total_people, type: integer }
      - { name: source, type: text, values: [air-booking, portal], note: "입력 출처" }
      - { name: created_at, type: text }
      - { name: updated_at, type: text }
    relations:
      - { target: segments, type: "1:N", fk: booking_id }
      - { target: passengers, type: "1:N", fk: booking_id }

  segments:
    description: "항공편 구간 (왕복/다구간)"
    table: air_booking_segments
    fields:
      - { name: id, type: text, pk: true }
      - { name: booking_id, type: text, fk: bookings.id }
      - { name: seg_index, type: integer }
      - { name: airline, type: text }
      - { name: flight_number, type: text }
      - { name: route_from, type: text }
      - { name: route_to, type: text }
      - { name: departure_date, type: text }
      - { name: departure_time, type: text }
      - { name: arrival_time, type: text }
      - { name: arrival_date, type: text, note: "익일 도착 시 출발일과 다름" }

  passengers:
    description: "탑승객 정보"
    table: air_booking_passengers
    fields:
      - { name: id, type: text, pk: true }
      - { name: booking_id, type: text, fk: bookings.id }
      - { name: name_en, type: text }
      - { name: name_kr, type: text }
      - { name: title, type: text }
      - { name: gender, type: text }
      - { name: passport_number, type: text, note: "AES-256-GCM 암호화" }

  estimates:
    description: "견적서/내역서/납품서"
    table: air_estimates
    fields:
      - { name: id, type: text, pk: true }
      - { name: doc_type, type: text, values: [estimate, domestic, settlement, delivery, claim] }
      - { name: recipient, type: text }
      - { name: subject, type: text }
      - { name: sections_json, type: text, note: "JSON — 비용 항목" }
      - { name: grand_total, type: integer }
      - { name: status, type: text, values: [draft, sent, confirmed] }

  bus_reservations:
    description: "버스 예약 (localStorage → DB 전환 필요)"
    table: bus_reservations
    status: migrate_from_localstorage
    fields:
      - { name: id, type: text, pk: true }
      - { name: data, type: text, note: "JSON" }
      - { name: created_at, type: text }
      - { name: updated_at, type: text }

  saved_notices:
    description: "안내문 (localStorage → DB 전환 필요)"
    table: saved_notices
    status: migrate_from_localstorage
    fields:
      - { name: id, type: text, pk: true }
      - { name: data, type: text, note: "JSON" }
      - { name: created_at, type: text }
      - { name: updated_at, type: text }

  group_rosters:
    description: "단체명단 (localStorage → DB 전환 필요)"
    table: group_rosters
    status: migrate_from_localstorage
    fields:
      - { name: id, type: text, pk: true }
      - { name: name, type: text }
      - { name: data, type: text, note: "JSON" }
      - { name: created_at, type: text }
      - { name: updated_at, type: text }

# PNR 중복 방지 규칙:
# 어디서 저장하든 같은 PNR → 1건만 (INSERT or UPDATE)
# 병합 시 기존 마감일/정산 보존, 항공편/탑승객 갱신
