openapi: 3.0.3
info:
  title: TourWorld API
  description: |
    TourWorld 여행 관리 시스템 API

    ## 주요 기능
    - **일정표 관리 (FEAT-2)**: 여행 일정표 생성, 편집, 관리
    - **호텔 관리 (FEAT-1)**: 호텔 정보 등록 및 관리
    - **이미지 갤러리 (FEAT-3)**: 이미지 업로드 및 카테고리 관리

    ## 인증
    JWT 토큰 기반 인증을 사용합니다.
    - `Authorization: Bearer <token>` 헤더를 통해 인증

    ## 에러 응답
    모든 에러는 동일한 형식으로 반환됩니다:
    ```json
    {
      "success": false,
      "error": {
        "code": "ERROR_CODE",
        "message": "에러 메시지",
        "details": {}
      }
    }
    ```
  version: 1.0.0
  contact:
    name: TourWorld Team

servers:
  - url: http://localhost:3000/api
    description: 개발 서버
  - url: https://api.tourworld.com/api
    description: 프로덕션 서버

tags:
  - name: Health
    description: 서버 상태 확인
  - name: Auth
    description: 인증 관련 API
  - name: Itineraries
    description: 일정표 관리 API (FEAT-2)
  - name: ItineraryItems
    description: 일정 항목 관리 API (FEAT-2)
  - name: Hotels
    description: 호텔 관리 API (FEAT-1)
  - name: Images
    description: 이미지 관리 API (FEAT-3)
  - name: ImageCategories
    description: 이미지 카테고리 관리 API (FEAT-3)

paths:
  # ==========================================
  # Health Check
  # ==========================================
  /health:
    get:
      tags:
        - Health
      summary: 서버 상태 확인
      operationId: healthCheck
      responses:
        '200':
          description: 서버 정상
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'

  # ==========================================
  # Authentication
  # ==========================================
  /auth/login:
    post:
      tags:
        - Auth
      summary: 로그인
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/register:
    post:
      tags:
        - Auth
      summary: 회원가입
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: 토큰 갱신
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: 토큰 갱신 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags:
        - Auth
      summary: 현재 사용자 정보 조회
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 사용자 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCurrentUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================
  # Itineraries (FEAT-2)
  # ==========================================
  /itineraries:
    get:
      tags:
        - Itineraries
      summary: 일정표 목록 조회
      operationId: listItineraries
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ItineraryStatus'
        - name: search
          in: query
          schema:
            type: string
          description: 제목, 설명 검색
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 일정표 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListItinerariesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Itineraries
      summary: 일정표 생성
      operationId: createItinerary
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItineraryRequest'
      responses:
        '201':
          description: 일정표 생성됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateItineraryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /itineraries/{id}:
    get:
      tags:
        - Itineraries
      summary: 일정표 상세 조회
      operationId: getItinerary
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 일정표 상세 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetItineraryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Itineraries
      summary: 일정표 수정
      operationId: updateItinerary
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItineraryRequest'
      responses:
        '200':
          description: 일정표 수정됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateItineraryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Itineraries
      summary: 일정표 삭제
      operationId: deleteItinerary
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 일정표 삭제됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==========================================
  # Itinerary Items (FEAT-2)
  # ==========================================
  /itineraries/{id}/items:
    get:
      tags:
        - ItineraryItems
      summary: 일정 항목 목록 조회
      operationId: listItineraryItems
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: dayNumber
          in: query
          schema:
            type: integer
          description: 특정 일차 필터
      responses:
        '200':
          description: 일정 항목 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListItineraryItemsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags:
        - ItineraryItems
      summary: 일정 항목 생성
      operationId: createItineraryItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItineraryItemRequest'
      responses:
        '201':
          description: 일정 항목 생성됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateItineraryItemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /itineraries/{id}/items/{itemId}:
    get:
      tags:
        - ItineraryItems
      summary: 일정 항목 상세 조회
      operationId: getItineraryItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/ItemIdParam'
      responses:
        '200':
          description: 일정 항목 상세 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetItineraryItemResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - ItineraryItems
      summary: 일정 항목 수정
      operationId: updateItineraryItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/ItemIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItineraryItemRequest'
      responses:
        '200':
          description: 일정 항목 수정됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateItineraryItemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - ItineraryItems
      summary: 일정 항목 삭제
      operationId: deleteItineraryItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/ItemIdParam'
      responses:
        '200':
          description: 일정 항목 삭제됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /itineraries/{id}/items/reorder:
    put:
      tags:
        - ItineraryItems
      summary: 일정 항목 순서 변경
      operationId: reorderItineraryItems
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderItineraryItemsRequest'
      responses:
        '200':
          description: 순서 변경됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReorderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==========================================
  # Hotels (FEAT-1)
  # ==========================================
  /hotels:
    get:
      tags:
        - Hotels
      summary: 호텔 목록 조회
      operationId: listHotels
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
        - name: search
          in: query
          schema:
            type: string
          description: 호텔명 검색
        - name: country
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: starRating
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - name: minStarRating
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
      responses:
        '200':
          description: 호텔 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListHotelsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Hotels
      summary: 호텔 생성
      operationId: createHotel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHotelRequest'
      responses:
        '201':
          description: 호텔 생성됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateHotelResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /hotels/{id}:
    get:
      tags:
        - Hotels
      summary: 호텔 상세 조회
      operationId: getHotel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 호텔 상세 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetHotelResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Hotels
      summary: 호텔 수정
      operationId: updateHotel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHotelRequest'
      responses:
        '200':
          description: 호텔 수정됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateHotelResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Hotels
      summary: 호텔 삭제
      operationId: deleteHotel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 호텔 삭제됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==========================================
  # Images (FEAT-3)
  # ==========================================
  /images:
    get:
      tags:
        - Images
      summary: 이미지 목록 조회
      operationId: listImages
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: categoryId
          in: query
          schema:
            type: string
            format: uuid
        - name: hotelId
          in: query
          schema:
            type: string
            format: uuid
        - name: search
          in: query
          schema:
            type: string
        - name: mimeType
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 이미지 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListImagesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /images/upload:
    post:
      tags:
        - Images
      summary: 이미지 업로드
      operationId: uploadImage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: 업로드할 이미지 파일
                categoryId:
                  type: string
                  format: uuid
                hotelId:
                  type: string
                  format: uuid
                metadata:
                  type: string
                  description: JSON 형식의 메타데이터
      responses:
        '201':
          description: 이미지 업로드됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadImageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'

  /images/{id}:
    get:
      tags:
        - Images
      summary: 이미지 상세 조회
      operationId: getImage
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 이미지 상세 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetImageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Images
      summary: 이미지 정보 수정
      operationId: updateImage
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateImageRequest'
      responses:
        '200':
          description: 이미지 정보 수정됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateImageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Images
      summary: 이미지 삭제
      operationId: deleteImage
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 이미지 삭제됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /images/bulk-delete:
    post:
      tags:
        - Images
      summary: 이미지 일괄 삭제
      operationId: bulkDeleteImages
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteImagesRequest'
      responses:
        '200':
          description: 이미지 일괄 삭제됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteImagesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================
  # Image Categories (FEAT-3)
  # ==========================================
  /images/categories:
    get:
      tags:
        - ImageCategories
      summary: 이미지 카테고리 목록 조회
      operationId: listImageCategories
      security:
        - bearerAuth: []
      parameters:
        - name: includeSystem
          in: query
          schema:
            type: boolean
            default: true
          description: 시스템 기본 카테고리 포함 여부
      responses:
        '200':
          description: 이미지 카테고리 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListImageCategoriesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - ImageCategories
      summary: 이미지 카테고리 생성
      operationId: createImageCategory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageCategoryRequest'
      responses:
        '201':
          description: 카테고리 생성됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateImageCategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /images/categories/{id}:
    get:
      tags:
        - ImageCategories
      summary: 이미지 카테고리 상세 조회
      operationId: getImageCategory
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 카테고리 상세 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetImageCategoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - ImageCategories
      summary: 이미지 카테고리 수정
      operationId: updateImageCategory
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateImageCategoryRequest'
      responses:
        '200':
          description: 카테고리 수정됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateImageCategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - ImageCategories
      summary: 이미지 카테고리 삭제
      operationId: deleteImageCategory
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 카테고리 삭제됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

components:
  # ==========================================
  # Security Schemes
  # ==========================================
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT 인증 토큰

  # ==========================================
  # Parameters
  # ==========================================
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 리소스 ID

    ItemIdParam:
      name: itemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 하위 리소스 ID

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: 페이지 번호

    PageSizeParam:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: 페이지당 항목 수

    SortByParam:
      name: sortBy
      in: query
      schema:
        type: string
      description: 정렬 기준 필드

    SortOrderParam:
      name: sortOrder
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
      description: 정렬 순서

  # ==========================================
  # Responses
  # ==========================================
  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: VALIDATION_ERROR
              message: 입력값 검증에 실패했습니다.
              details:
                errors:
                  - field: title
                    message: 필수 필드입니다.

    Unauthorized:
      description: 인증 필요
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: 인증이 필요합니다.

    Forbidden:
      description: 접근 거부
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: FORBIDDEN
              message: 접근이 거부되었습니다.

    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: NOT_FOUND
              message: 요청한 리소스를 찾을 수 없습니다.

    Conflict:
      description: 리소스 충돌
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: CONFLICT
              message: 리소스 충돌이 발생했습니다.

    PayloadTooLarge:
      description: 요청 크기 초과
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: FILE_TOO_LARGE
              message: 파일 크기가 허용 한도를 초과했습니다.

    UnsupportedMediaType:
      description: 지원하지 않는 미디어 타입
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: INVALID_FILE_TYPE
              message: 지원하지 않는 파일 형식입니다.

    InternalError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: INTERNAL_ERROR
              message: 서버 내부 오류가 발생했습니다.

  # ==========================================
  # Schemas
  # ==========================================
  schemas:
    # Common Schemas
    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          $ref: '#/components/schemas/ApiError'

    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
        field:
          type: string

    PaginationMeta:
      type: object
      required:
        - page
        - pageSize
        - totalCount
        - totalPages
        - hasNextPage
        - hasPreviousPage
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer
        hasNextPage:
          type: boolean
        hasPreviousPage:
          type: boolean

    Coordinates:
      type: object
      properties:
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double

    DeleteResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            deleted:
              type: boolean
              enum: [true]

    ReorderResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            reordered:
              type: boolean
              enum: [true]

    # Health Check
    HealthCheckResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required:
            - status
            - version
            - timestamp
            - uptime
          properties:
            status:
              type: string
              enum: [healthy, degraded, unhealthy]
            version:
              type: string
            timestamp:
              type: string
              format: date-time
            uptime:
              type: number
            database:
              type: object
              properties:
                connected:
                  type: boolean
                latency:
                  type: number

    # User Schemas
    User:
      type: object
      required:
        - id
        - email
        - name
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # Auth Schemas
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required:
            - user
            - accessToken
            - refreshToken
            - expiresIn
          properties:
            user:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                email:
                  type: string
                  format: email
                name:
                  type: string
            accessToken:
              type: string
            refreshToken:
              type: string
            expiresIn:
              type: integer
              description: 토큰 만료 시간 (초)

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
          minLength: 2

    RegisterResponse:
      $ref: '#/components/schemas/LoginResponse'

    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    RefreshTokenResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required:
            - accessToken
            - expiresIn
          properties:
            accessToken:
              type: string
            expiresIn:
              type: integer

    GetCurrentUserResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          allOf:
            - $ref: '#/components/schemas/User'
            - type: object
              properties:
                itineraryCount:
                  type: integer
                hotelCount:
                  type: integer
                imageCount:
                  type: integer

    # Itinerary Schemas
    ItineraryStatus:
      type: string
      enum: [DRAFT, PUBLISHED, ARCHIVED]

    ItineraryMetadata:
      type: object
      properties:
        templateId:
          type: string
        branding:
          type: object
          properties:
            primaryColor:
              type: string
            logoUrl:
              type: string
            companyName:
              type: string
        settings:
          type: object
          properties:
            showMap:
              type: boolean
            showWeather:
              type: boolean
            showTimezone:
              type: boolean

    Itinerary:
      type: object
      required:
        - id
        - userId
        - title
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
          nullable: true
        endDate:
          type: string
          format: date
          nullable: true
        status:
          $ref: '#/components/schemas/ItineraryStatus'
        metadata:
          $ref: '#/components/schemas/ItineraryMetadata'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ItinerarySummary:
      type: object
      required:
        - id
        - title
        - status
        - itemCount
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
          nullable: true
        endDate:
          type: string
          format: date
          nullable: true
        status:
          $ref: '#/components/schemas/ItineraryStatus'
        itemCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateItineraryRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
          nullable: true
        endDate:
          type: string
          format: date
          nullable: true
        status:
          $ref: '#/components/schemas/ItineraryStatus'
        metadata:
          $ref: '#/components/schemas/ItineraryMetadata'

    UpdateItineraryRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
          nullable: true
        endDate:
          type: string
          format: date
          nullable: true
        status:
          $ref: '#/components/schemas/ItineraryStatus'
        metadata:
          $ref: '#/components/schemas/ItineraryMetadata'

    ListItinerariesResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required:
            - items
            - meta
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ItinerarySummary'
            meta:
              $ref: '#/components/schemas/PaginationMeta'

    GetItineraryResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/Itinerary'

    CreateItineraryResponse:
      $ref: '#/components/schemas/GetItineraryResponse'

    UpdateItineraryResponse:
      $ref: '#/components/schemas/GetItineraryResponse'

    # ItineraryItem Schemas
    ItineraryItem:
      type: object
      required:
        - id
        - itineraryId
        - dayNumber
        - title
        - sortOrder
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        itineraryId:
          type: string
          format: uuid
        hotelId:
          type: string
          format: uuid
          nullable: true
        dayNumber:
          type: integer
          minimum: 1
        startTime:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
          nullable: true
        endTime:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        coordinates:
          $ref: '#/components/schemas/Coordinates'
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateItineraryItemRequest:
      type: object
      required:
        - dayNumber
        - title
      properties:
        hotelId:
          type: string
          format: uuid
          nullable: true
        dayNumber:
          type: integer
          minimum: 1
        startTime:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
          nullable: true
        endTime:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
          nullable: true
        title:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        coordinates:
          $ref: '#/components/schemas/Coordinates'
        sortOrder:
          type: integer
        imageIds:
          type: array
          items:
            type: string
            format: uuid

    UpdateItineraryItemRequest:
      type: object
      properties:
        hotelId:
          type: string
          format: uuid
          nullable: true
        dayNumber:
          type: integer
          minimum: 1
        startTime:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
          nullable: true
        endTime:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
          nullable: true
        title:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        coordinates:
          $ref: '#/components/schemas/Coordinates'
        sortOrder:
          type: integer
        imageIds:
          type: array
          items:
            type: string
            format: uuid

    ReorderItineraryItemsRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            type: object
            required:
              - id
              - sortOrder
            properties:
              id:
                type: string
                format: uuid
              sortOrder:
                type: integer
              dayNumber:
                type: integer
                minimum: 1

    ListItineraryItemsResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required:
            - items
            - meta
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ItineraryItem'
            meta:
              $ref: '#/components/schemas/PaginationMeta'

    GetItineraryItemResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/ItineraryItem'

    CreateItineraryItemResponse:
      $ref: '#/components/schemas/GetItineraryItemResponse'

    UpdateItineraryItemResponse:
      $ref: '#/components/schemas/GetItineraryItemResponse'

    # Hotel Schemas
    HotelAmenity:
      type: string
      enum:
        - wifi
        - parking
        - breakfast
        - pool
        - gym
        - spa
        - restaurant
        - bar
        - room_service
        - laundry
        - business_center
        - concierge
        - airport_shuttle
        - pet_friendly

    Hotel:
      type: object
      required:
        - id
        - userId
        - name
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        starRating:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        phone:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
        locationRemarks:
          type: string
          nullable: true
        coordinates:
          $ref: '#/components/schemas/Coordinates'
        amenities:
          type: array
          items:
            $ref: '#/components/schemas/HotelAmenity'
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    HotelSummary:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        city:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        starRating:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true

    CreateHotelRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        address:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        starRating:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        phone:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
        locationRemarks:
          type: string
          nullable: true
        coordinates:
          $ref: '#/components/schemas/Coordinates'
        amenities:
          type: array
          items:
            $ref: '#/components/schemas/HotelAmenity'
          nullable: true

    UpdateHotelRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        address:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        starRating:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        phone:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
        locationRemarks:
          type: string
          nullable: true
        coordinates:
          $ref: '#/components/schemas/Coordinates'
        amenities:
          type: array
          items:
            $ref: '#/components/schemas/HotelAmenity'
          nullable: true

    ListHotelsResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required:
            - items
            - meta
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/HotelSummary'
            meta:
              $ref: '#/components/schemas/PaginationMeta'

    GetHotelResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/Hotel'

    CreateHotelResponse:
      $ref: '#/components/schemas/GetHotelResponse'

    UpdateHotelResponse:
      $ref: '#/components/schemas/GetHotelResponse'

    # Image Schemas
    ImageMetadata:
      type: object
      properties:
        width:
          type: integer
        height:
          type: integer
        format:
          type: string
        originalName:
          type: string
        alt:
          type: string
        caption:
          type: string

    Image:
      type: object
      required:
        - id
        - userId
        - filename
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        categoryId:
          type: string
          format: uuid
          nullable: true
        hotelId:
          type: string
          format: uuid
          nullable: true
        filename:
          type: string
        storagePath:
          type: string
          nullable: true
        cloudUrl:
          type: string
          format: uri
          nullable: true
        fileSize:
          type: integer
          nullable: true
        mimeType:
          type: string
          nullable: true
        metadata:
          $ref: '#/components/schemas/ImageMetadata'
        createdAt:
          type: string
          format: date-time

    ImageSummary:
      type: object
      required:
        - id
        - filename
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        cloudUrl:
          type: string
          format: uri
          nullable: true
        storagePath:
          type: string
          nullable: true
        mimeType:
          type: string
          nullable: true

    UpdateImageRequest:
      type: object
      properties:
        categoryId:
          type: string
          format: uuid
          nullable: true
        hotelId:
          type: string
          format: uuid
          nullable: true
        metadata:
          $ref: '#/components/schemas/ImageMetadata'

    BulkDeleteImagesRequest:
      type: object
      required:
        - imageIds
      properties:
        imageIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1

    BulkDeleteImagesResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required:
            - deleted
            - failed
          properties:
            deleted:
              type: integer
            failed:
              type: array
              items:
                type: string
                format: uuid

    ListImagesResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required:
            - items
            - meta
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ImageSummary'
            meta:
              $ref: '#/components/schemas/PaginationMeta'

    GetImageResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/Image'

    UploadImageResponse:
      $ref: '#/components/schemas/GetImageResponse'

    UpdateImageResponse:
      $ref: '#/components/schemas/GetImageResponse'

    # ImageCategory Schemas
    ImageCategory:
      type: object
      required:
        - id
        - name
        - sortOrder
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
          nullable: true
          description: null이면 시스템 기본 카테고리
        name:
          type: string
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time

    ImageCategoryWithCount:
      allOf:
        - $ref: '#/components/schemas/ImageCategory'
        - type: object
          required:
            - imageCount
          properties:
            imageCount:
              type: integer

    CreateImageCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer

    UpdateImageCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer

    ListImageCategoriesResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            $ref: '#/components/schemas/ImageCategoryWithCount'

    GetImageCategoryResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/ImageCategory'

    CreateImageCategoryResponse:
      $ref: '#/components/schemas/GetImageCategoryResponse'

    UpdateImageCategoryResponse:
      $ref: '#/components/schemas/GetImageCategoryResponse'
