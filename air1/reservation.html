<script>
    // URL 파라미터에서 예약 ID 가져오기
    function getReservationId() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
    }

    // 공항 코드 → 도시명 매핑 (JSON에서 로드)
    let airportNames = {};

    // JSON 파일에서 공항 데이터 로드
    async function loadAirportData() {
        try {
            const response = await fetch('./world_airports_by_region.json');
            if (!response.ok) throw new Error('공항 데이터 로드 실패');
            const data = await response.json();

            // 전체 공항 데이터를 코드 → 도시명 매핑으로 변환
            for (const region in data) {
                data[region].forEach(airport => {
                    // 도시명 사용 (공항명 대신)
                    airportNames[airport['공항코드']] = airport['도시'];
                });
            }

        } catch (error) {
            console.error('공항 데이터 로드 실패:', error);
            // 로드 실패 시 기본 데이터 사용
            airportNames = {
                'ICN': '인천', 'GMP': '김포', 'PUS': '부산', 'CJU': '제주',
                'BKK': '방콕', 'NRT': '도쿄', 'HND': '도쿄', 'HKG': '홍콩',
                'SIN': '싱가포르', 'DAD': '다낭', 'CXR': '나트랑', 'SGN': '호치민'
            };
        }
    }

    function getAirportName(code) {
        // 공항코드 모드이면 코드 그대로 반환
        if (localStorage.getItem('air1_airport_code_mode') === 'true') {
            return code;
        }
        return airportNames[code] || code;
    }

    // 날짜 포맷팅
    function formatDate(dateStr) {
        if (!dateStr) return '-';
        const date = new Date(dateStr);
        if (isNaN(date.getTime())) return dateStr;
        const year = date.getFullYear();
        const month = (date.getMonth() + 1).toString().padStart(2, '0');
        const day = date.getDate().toString().padStart(2, '0');
        const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
        const weekday = weekdays[date.getDay()];
        return `${year}.${month}.${day} (${weekday})`;
    }

    // 시간 포맷팅
    function formatTime(timeStr) {
        if (!timeStr) return '--:--';
        return timeStr.substring(0, 5);
    }

    // 식사 정보 스타일 적용
    function setMealStyle(element, value) {
        if (value === '포함') {
            element.textContent = '포함';
            element.className = 'font-extrabold text-[13px] text-brand-green bg-green-50 dark:bg-green-900/10 px-2.5 py-0.5 rounded-md';
        } else {
            element.textContent = '불포함';
            element.className = 'font-extrabold text-[13px] text-brand-orange bg-orange-50 dark:bg-orange-900/10 px-2.5 py-0.5 rounded-md';
        }
    }

    // 예약 데이터 로드 및 표시
    function loadReservationData() {
        const reservationId = getReservationId();

        // localStorage에서 데이터 가져오기
        let reservationData = null;

        if (reservationId) {
            // flight_saves_v2에서 검색
            const savedFlights = JSON.parse(localStorage.getItem('flight_saves_v2') || '[]');
            reservationData = savedFlights.find(f => f.id === reservationId);
        }

        // 데이터가 없으면 URL 파라미터에서 직접 가져오기 시도
        if (!reservationData) {
            const params = new URLSearchParams(window.location.search);
            const dataParam = params.get('data');
            if (dataParam) {
                try {
                    const parsed = JSON.parse(decodeURIComponent(dataParam));
                    // URL 파라미터 데이터 검증 (필수 필드 타입 체크)
                    if (parsed && typeof parsed === 'object' &&
                        (!parsed.pnr || typeof parsed.pnr === 'string') &&
                        (!parsed.flights || Array.isArray(parsed.flights))) {
                        reservationData = parsed;
                    }
                } catch (e) {
                    console.error('데이터 파싱 실패:', e);
                }
            }
        }

        // 데모 데이터 (데이터가 없을 경우)
        if (!reservationData) {
            reservationData = {
                pnr: 'NPIXXE',
                name: 'CHO/DONGMAN',
                phone: '010-0000-0000',
                totalPeople: '4명',
                flights: [
                    {
                        flightNo: 'OZ 743',
                        departure: { airport: 'ICN', time: '07:10', date: '2026-02-05' },
                        arrival: { airport: 'BKK', time: '11:15', date: '2026-02-05' }
                    },
                    {
                        flightNo: 'OZ 742',
                        departure: { airport: 'BKK', time: '23:55', date: '2026-02-08' },
                        arrival: { airport: 'ICN', time: '06:55', date: '2026-02-09', nextDay: true }
                    }
                ],
                meetingTime: '오전 03:00',
                meetingPlace: '인천국제공항',
                departureMeal: '불포함',
                arrivalMeal: '불포함',
                remarks: '식사비용 우리가 전달 함'
            };
        }

        // 데이터 표시
        displayReservation(reservationData);
    }

    // 예약 데이터 화면에 표시
    function displayReservation(data) {
        // 거래처
        if (data.clientName) {
            document.getElementById('clientSection').classList.remove('hidden');
            document.getElementById('clientDisplay').textContent = data.clientName;
        }

        // 예약번호
        document.getElementById('pnrDisplay').textContent = data.pnr || '-';

        // 고객 정보
        document.getElementById('customerName').textContent = data.name || '-';
        document.getElementById('totalPeople').textContent = data.totalPeople || '-';
        document.getElementById('phoneNumber').textContent = data.phone || '-';

        // 항공편 정보
        if (data.flights && data.flights.length > 0) {
            // 출발편
            const dep = data.flights[0];
            document.getElementById('departureFlightNo').textContent = dep.flightNo || '-';
            document.getElementById('departureTime').textContent = formatTime(dep.departure?.time);
            document.getElementById('departureAirport').textContent = getAirportName(dep.departure?.airport);
            document.getElementById('departureDate').textContent = formatDate(dep.departure?.date);
            document.getElementById('arrivalTime1').textContent = formatTime(dep.arrival?.time);
            document.getElementById('arrivalAirport1').textContent = getAirportName(dep.arrival?.airport);
            document.getElementById('arrivalDate1').textContent = formatDate(dep.arrival?.date);

            // 도착편 (있는 경우)
            if (data.flights.length > 1) {
                const ret = data.flights[data.flights.length - 1];
                document.getElementById('returnFlightNo').textContent = ret.flightNo || '-';
                document.getElementById('departureTime2').textContent = formatTime(ret.departure?.time);
                document.getElementById('departureAirport2').textContent = getAirportName(ret.departure?.airport);
                document.getElementById('departureDate2').textContent = formatDate(ret.departure?.date);
                document.getElementById('arrivalTime2').textContent = formatTime(ret.arrival?.time);
                document.getElementById('arrivalAirport2').textContent = getAirportName(ret.arrival?.airport);

                // 익일 도착 표시
                const arrivalDate2El = document.getElementById('arrivalDate2');
                if (ret.arrival?.nextDay) {
                    arrivalDate2El.className = 'text-[11px] font-bold text-red-500';
                    arrivalDate2El.textContent = `${formatDate(ret.arrival?.date)} 도착`;
                } else {
                    arrivalDate2El.textContent = formatDate(ret.arrival?.date);
                }
            }
        }

        // 미팅 정보
        if (data.meetingTime || data.meetingPlace) {
            document.getElementById('meetingInfoSection').classList.remove('hidden');
            document.getElementById('meetingTime').textContent = data.meetingTime || '-';
            document.getElementById('meetingPlace').textContent = data.meetingPlace || '-';
        }

        // 식사 정보
        if (data.departureMeal || data.arrivalMeal) {
            document.getElementById('mealInfoSection').classList.remove('hidden');

            if (data.departureMeal) {
                document.getElementById('departureMealRow').classList.remove('hidden');
                setMealStyle(document.getElementById('departureMeal'), data.departureMeal);
            }

            if (data.arrivalMeal) {
                document.getElementById('arrivalMealRow').classList.remove('hidden');
                setMealStyle(document.getElementById('arrivalMeal'), data.arrivalMeal);
            }
        }

        // 비고사항
        if (data.remarks) {
            document.getElementById('remarksSection').classList.remove('hidden');
            document.getElementById('remarksContent').textContent = data.remarks;
        }

        // 비용 정보
        if (data.priceAdult || data.priceChild || data.priceInfant) {
            document.getElementById('priceInfoSection').classList.remove('hidden');

            if (data.priceAdult) {
                document.getElementById('priceAdultRow').classList.remove('hidden');
                document.getElementById('priceAdultDisplay').textContent = `₩${data.priceAdult}원`;
            }

            if (data.priceChild) {
                document.getElementById('priceChildRow').classList.remove('hidden');
                document.getElementById('priceChildDisplay').textContent = `₩${data.priceChild}원`;
            }

            if (data.priceInfant) {
                document.getElementById('priceInfantRow').classList.remove('hidden');
                document.getElementById('priceInfantDisplay').textContent = `₩${data.priceInfant}원`;
            }
        }

        // 전체 승객 명단 표시
        if (data.showAllPassengers && data.passengers && data.passengers.length > 0) {
            document.getElementById('passengersSection').classList.remove('hidden');
            const passengersList = document.getElementById('passengersList').querySelector('.grid');
            passengersList.innerHTML = '';

            // DOM API로 안전하게 승객 목록 생성
            data.passengers.forEach(p => {
                const div = document.createElement('div');
                div.className = 'flex items-center space-x-2';

                const indexSpan = document.createElement('span');
                indexSpan.className = 'text-slate-400 text-[11px]';
                indexSpan.textContent = (p.index || '') + '.';

                const nameSpan = document.createElement('span');
                nameSpan.className = 'text-slate-800 dark:text-slate-200';
                nameSpan.textContent = (p.name || '') + (p.title || '');

                div.appendChild(indexSpan);
                div.appendChild(nameSpan);

                passengersList.appendChild(div);
            });
        }
    }

    // 페이지 로드 시 실행
    // 페이지 로드 시 공항 데이터 먼저 로드 후 예약 데이터 로드
    document.addEventListener('DOMContentLoaded', async () => {
        await loadAirportData();  // 공항 데이터 먼저 로드
        loadReservationData();    // 그 후 예약 데이터 로드
    });
</script>

</body>
</html>
