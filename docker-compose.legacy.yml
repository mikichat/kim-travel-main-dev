# ===========================================
# @TASK T6.3 - Docker Containerization (Legacy)
# @SPEC docs/planning/docker-legacy.md
# Express + SQLite backend + Nginx frontend
# ===========================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel_legacy_backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DATABASE_PATH: ./data/travel.db
    volumes:
      # SQLite database persistence
      - backend_data:/app/data
      # Upload files persistence
      - backend_uploads:/app/uploads
      # Backup files persistence
      - backend_backups:/app/backups
      # Log files
      - backend_logs:/app/logs
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api-docs/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - legacy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: travel_legacy_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - legacy-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  legacy-network:
    driver: bridge
    name: travel-legacy-network

volumes:
  backend_data:
    name: travel_legacy_data
  backend_uploads:
    name: travel_legacy_uploads
  backend_backups:
    name: travel_legacy_backups
  backend_logs:
    name: travel_legacy_logs
