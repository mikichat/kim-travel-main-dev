version: "2.0"

screen:
  name: 거래처 관리
  route: /vendors
  layout: dashboard
  auth: true

data_requirements:
  - resource: vendors
    needs: [id, name, type, contact_name, phone, email, remarks]
    filters: { type: "?type", page: "?page" }

components:
  - id: vendor_type_filter
    type: navigation
    position: main
    function: 여행사/항공사 유형별 필터
    events:
      - on: click:filter
        do: 유형별 거래처 필터링

  - id: vendor_table
    type: list
    position: main
    function: 거래처 목록 테이블
    data_source:
      resource: vendors
    events:
      - on: click:row
        do: 거래처 상세 정보 표시

  - id: vendor_form
    type: form
    position: overlay
    function: 거래처 정보 입력/편집
    data_source:
      resource: vendors
    events:
      - on: submit
        do: 거래처 정보 저장

connections:
  shared_components:
    - sidebar
    - header
    - modal

tests:
  - name: 초기 로드
    when: 거래처 관리 페이지 접속
    then:
      - 거래처 목록 테이블 표시

  - name: 유형 필터
    when: 항공사 필터 클릭
    then:
      - 항공사 유형 거래처만 표시

  - name: 거래처 추가
    when: 추가 버튼 클릭 후 정보 입력
    then:
      - 거래처 폼 표시
      - 저장 시 목록에 추가
