version: "2.0"

screen:
  name: 설정
  route: /settings
  layout: dashboard
  auth: true

data_requirements:
  - resource: bsp_dates
    needs: [id, payment_date, description, is_notified]

  - resource: alert_settings
    needs: [id, user_id, hours_before, alert_type, enabled]

  - resource: users
    needs: [id, name, email]

components:
  - id: bsp_date_manager
    type: form
    position: main
    function: BSP 입금일 등록/삭제 관리
    data_source:
      resource: bsp_dates
    events:
      - on: submit:add
        do: BSP 입금일 추가
      - on: click:delete
        do: BSP 입금일 삭제

  - id: alert_settings
    type: form
    position: main
    function: 알림 시간 설정 (24시간 전/12시간 전 등)
    data_source:
      resource: alert_settings
    events:
      - on: change:toggle
        do: 알림 ON/OFF 전환
      - on: submit
        do: 알림 설정 저장

  - id: account_settings
    type: form
    position: main
    function: 비밀번호 변경
    data_source:
      resource: users
    events:
      - on: submit
        do: 비밀번호 변경 처리

  - id: ui_settings
    type: form
    position: main
    function: 큰 글씨 모드 / 다크모드 토글
    events:
      - on: change:font_size
        do: 큰 글씨 모드 전환
      - on: change:dark_mode
        do: 다크모드 전환

connections:
  shared_components:
    - sidebar
    - header
    - toast

tests:
  - name: BSP 입금일 등록
    when: 새 BSP 입금일 입력 후 추가
    then:
      - BSP 목록에 추가
      - 달력에 자동 반영

  - name: 알림 설정 변경
    when: 24시간 전 알림 ON
    then:
      - 설정 저장
      - 해당 시간에 알림 활성화

  - name: 큰 글씨 모드
    when: 큰 글씨 모드 토글 ON
    then:
      - 전체 UI 폰트 크기 증가
      - 설정 유지 (새로고침 후에도)
