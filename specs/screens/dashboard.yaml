version: "2.0"

screen:
  name: 대시보드
  route: /dashboard
  layout: dashboard
  auth: true

data_requirements:
  - resource: bookings
    needs: [id, pnr, name_kr, airline, flight_number, route_from, route_to, nmtl_date, tl_date, departure_date, status]
    filters: { date_range: "today+7d" }

  - resource: bsp_dates
    needs: [id, payment_date, description, is_notified]
    filters: { date_range: "today+7d" }

components:
  - id: weekly_calendar_strip
    type: navigation
    position: main
    function: 7일 롤링 달력 — NMTL/TL/BSP/출발일 색상 구분 표시
    data_source:
      resource: bookings
    events:
      - on: click:date
        do: 해당 날짜의 할 일 목록 필터링

  - id: todo_list
    type: list
    position: main
    function: 오늘 마감 항목 긴급도순 정렬 표시
    data_source:
      resource: bookings
    events:
      - on: click:item
        do: /bookings로 이동, 해당 예약 확장

  - id: quick_actions
    type: navigation
    position: main
    function: 예약장부/달력/정산 바로가기 버튼
    events:
      - on: click:action
        do: 해당 화면으로 이동

connections:
  navigations:
    - from: todo_list
      to: /bookings
    - from: quick_actions
      to: /bookings
    - from: quick_actions
      to: /calendar
    - from: quick_actions
      to: /settlements

  shared_components:
    - sidebar
    - header
    - toast

tests:
  - name: 초기 로드
    when: 로그인 후 대시보드 접속
    then:
      - 7일 롤링 달력 표시
      - 오늘 마감 항목 긴급도순 정렬

  - name: 긴급 항목 강조
    when: NMTL/TL 마감이 오늘인 예약 존재
    then:
      - 빨간색 긴급 배지 표시
      - 목록 최상단 배치

  - name: 할 일 클릭
    when: 마감 항목 클릭
    then:
      - /bookings로 이동
      - 해당 예약 자동 확장

  - name: BSP 입금일 표시
    when: 7일 내 BSP 입금일 존재
    then:
      - 달력에 BSP 마커 표시
      - 24시간 전 알림 예약 확인
