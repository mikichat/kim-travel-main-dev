version: "2.0"

screen:
  name: 로그인
  route: /login
  layout: full-width
  auth: false

data_requirements:
  - resource: users
    needs: [email, password_hash]

components:
  - id: login_form
    type: form
    position: main
    function: 이메일/비밀번호 입력 후 인증
    data_source:
      resource: users
    events:
      - on: submit
        do: 인증 요청 → 성공 시 /dashboard 이동, 실패 시 에러 메시지

connections:
  navigations:
    - from: login_form
      to: /dashboard

tests:
  - name: 로그인 성공
    when: 올바른 이메일/비밀번호 입력 후 로그인 클릭
    then:
      - /dashboard로 이동
      - 세션 토큰 저장

  - name: 로그인 실패
    when: 잘못된 비밀번호 입력
    then:
      - 에러 메시지 표시
      - 입력 필드 유지

  - name: 빈 입력 제출
    when: 이메일 또는 비밀번호 비어있는 상태로 제출
    then:
      - 유효성 검사 에러 표시
