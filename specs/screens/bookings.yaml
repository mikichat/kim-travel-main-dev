version: "2.0"

screen:
  name: 예약장부
  route: /bookings
  layout: dashboard
  auth: true

data_requirements:
  - resource: bookings
    needs: [id, user_id, customer_id, pnr, airline, flight_number, route_from, route_to, name_kr, name_en, passport_number, seat_number, fare, nmtl_date, tl_date, departure_date, status, remarks]
    filters: { status: "?status", search: "?q", page: "?page" }

  - resource: tickets
    needs: [id, booking_id, ticket_number, issue_date, status]
    filters: { booking_id: ":booking_id" }

  - resource: customers
    needs: [id, name_kr, name_en]

components:
  - id: pnr_input
    type: form
    position: main
    function: PNR 텍스트 붙여넣기 → 예약 정보 자동 파싱 등록
    data_source:
      resource: bookings
    events:
      - on: submit
        do: PNR 파싱 → 예약장부 자동 등록, 티켓번호 자동 추출

  - id: search_bar
    type: form
    position: main
    function: 고객명/PNR 검색
    events:
      - on: input:search
        do: 검색어로 예약 목록 필터링

  - id: status_filter
    type: navigation
    position: main
    function: 상태별 필터 (전체/대기/확정/발권/취소)
    events:
      - on: click:filter
        do: 상태별 예약 목록 필터링, URL 업데이트

  - id: booking_table
    type: list
    position: main
    function: 예약 목록 테이블 — 정렬/필터/검색 지원
    data_source:
      resource: bookings
    events:
      - on: click:row
        do: 해당 예약 확장 패널 열기

  - id: booking_detail
    type: detail
    position: main
    function: 확장 패널 — 예약 상세 정보 표시
    data_source:
      resource: bookings
    events:
      - on: click:passenger_name
        do: 해당 탑승객의 티켓번호 목록 표시
      - on: click:edit
        do: 예약 정보 수정 모드 전환

  - id: ticket_list
    type: list
    position: main
    function: 탑승객 이름 클릭 시 티켓번호 목록 표시 (1인 다수 티켓)
    data_source:
      resource: tickets
    events:
      - on: click:add_ticket
        do: 티켓번호 수동 추가 폼 표시
      - on: click:edit_ticket
        do: 티켓 상태 변경 (발권/환불/재발행/VOID)

  - id: action_buttons
    type: navigation
    position: main
    function: 안내문 발송 / 발권 / 정산 / 인보이스 액션 버튼
    events:
      - on: click:settlement
        do: /settlements로 이동 (해당 예약 연결)
      - on: click:notice
        do: 고객 안내문 생성 모달 표시

connections:
  navigations:
    - from: action_buttons
      to: /settlements
    - from: booking_detail
      to: /customers

  shared_components:
    - sidebar
    - header
    - toast
    - modal

tests:
  - name: PNR 파싱 등록
    when: PNR 텍스트 붙여넣기 후 등록 클릭
    then:
      - 예약 정보 자동 파싱
      - 예약장부 테이블에 새 행 추가
      - 티켓번호 자동 추출 (발권된 경우)

  - name: 탑승객 이름 → 티켓 목록
    when: 예약 확장 후 탑승객 이름 클릭
    then:
      - 해당 탑승객의 티켓번호 목록 표시
      - 티켓별 상태 배지 표시 (발권/환불/재발행/VOID)

  - name: 티켓 수동 추가
    when: 티켓 목록에서 추가 버튼 클릭
    then:
      - 티켓번호/발권일/상태 입력 폼 표시
      - 저장 시 목록에 추가

  - name: 상태 필터링
    when: 발권 필터 클릭
    then:
      - 발권 상태 예약만 표시
      - URL에 ?status=ticketed 반영

  - name: 검색
    when: 고객명 입력
    then:
      - 해당 고객의 예약만 표시
