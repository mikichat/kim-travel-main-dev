version: "2.0"

screen:
  name: 정산 관리
  route: /settlements
  layout: dashboard
  auth: true

data_requirements:
  - resource: settlements
    needs: [id, booking_id, vendor_id, payment_type, amount, status, payment_date, remarks]
    filters: { status: "?status", page: "?page" }

  - resource: invoices
    needs: [id, settlement_id, invoice_number, issue_date, total_amount]

  - resource: bookings
    needs: [id, pnr, name_kr, airline]

  - resource: vendors
    needs: [id, name]

components:
  - id: settlement_summary
    type: detail
    position: main
    function: 총 미수/입금 완료 금액 요약 표시
    data_source:
      resource: settlements

  - id: settlement_filter
    type: navigation
    position: main
    function: 미수/입금/카드/전체 상태 필터
    events:
      - on: click:filter
        do: 정산 상태별 필터링

  - id: settlement_table
    type: list
    position: main
    function: 정산 목록 테이블
    data_source:
      resource: settlements
    events:
      - on: click:row
        do: 정산 상세 정보 표시

  - id: payment_form
    type: form
    position: overlay
    function: 결제 정보 입력 (결제유형/금액/날짜)
    data_source:
      resource: settlements
    events:
      - on: submit
        do: 정산 정보 저장, 상태 업데이트

  - id: invoice_generator
    type: form
    position: overlay
    function: 인보이스 자동 작성 및 발행
    data_source:
      resource: invoices
    events:
      - on: submit
        do: 인보이스 생성, PDF 미리보기

connections:
  navigations:
    - from: settlement_table
      to: /bookings

  shared_components:
    - sidebar
    - header
    - modal

tests:
  - name: 초기 로드
    when: 정산 관리 페이지 접속
    then:
      - 미수/입금 요약 금액 표시
      - 정산 목록 테이블 표시

  - name: 상태 필터
    when: 미수 필터 클릭
    then:
      - 미수 상태 정산만 표시

  - name: 결제 등록
    when: 정산 항목 선택 후 결제 등록
    then:
      - 결제 정보 입력 폼 표시
      - 저장 시 상태 업데이트

  - name: 인보이스 발행
    when: 인보이스 생성 클릭
    then:
      - 인보이스 자동 작성
      - PDF 미리보기 표시
