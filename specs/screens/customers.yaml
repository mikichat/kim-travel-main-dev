version: "2.0"

screen:
  name: 고객 관리
  route: /customers
  layout: dashboard
  auth: true

data_requirements:
  - resource: customers
    needs: [id, name_kr, name_en, phone, email, passport_number, passport_expiry, remarks]
    filters: { search: "?q", page: "?page" }

  - resource: bookings
    needs: [id, pnr, airline, departure_date, status]
    filters: { customer_id: ":customer_id" }

  - resource: tickets
    needs: [id, booking_id, ticket_number, issue_date, status]

components:
  - id: customer_search
    type: form
    position: main
    function: 이름/여권번호 검색
    events:
      - on: input:search
        do: 고객 목록 실시간 필터링

  - id: customer_table
    type: list
    position: main
    function: 고객 목록 테이블
    data_source:
      resource: customers
    events:
      - on: click:row
        do: 고객 상세 + 예약 이력 표시

  - id: customer_form
    type: form
    position: overlay
    function: 고객 정보 입력/편집
    data_source:
      resource: customers
    events:
      - on: submit
        do: 고객 정보 저장

  - id: booking_history
    type: list
    position: main
    function: 선택 고객의 예약 이력 및 티켓번호 조회
    data_source:
      resource: bookings
    events:
      - on: click:booking
        do: /bookings로 이동, 해당 예약 확장

connections:
  navigations:
    - from: booking_history
      to: /bookings

  shared_components:
    - sidebar
    - header
    - modal

tests:
  - name: 초기 로드
    when: 고객 관리 페이지 접속
    then:
      - 고객 목록 테이블 표시

  - name: 고객 검색
    when: 이름 입력
    then:
      - 검색어 매칭 고객만 표시

  - name: 고객 상세 → 예약 이력
    when: 고객 행 클릭
    then:
      - 해당 고객 예약 이력 표시
      - 각 예약의 티켓번호 조회 가능

  - name: 고객 정보 편집
    when: 편집 버튼 클릭
    then:
      - 고객 정보 폼 표시
      - 저장 시 목록 업데이트
