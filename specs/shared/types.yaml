version: "2.0"

types:
  BookingStatus:
    type: enum
    values: [pending, confirmed, ticketed, cancelled]
    labels:
      pending: 대기
      confirmed: 확정
      ticketed: 발권
      cancelled: 취소

  TicketStatus:
    type: enum
    values: [issued, refunded, reissued, void]
    labels:
      issued: 발권
      refunded: 환불
      reissued: 재발행
      void: VOID

  SettlementStatus:
    type: enum
    values: [unpaid, paid, partial]
    labels:
      unpaid: 미수
      paid: 입금완료
      partial: 부분입금

  PaymentType:
    type: enum
    values: [cash, card, transfer]
    labels:
      cash: 현금
      card: 카드
      transfer: 이체

  UserRole:
    type: enum
    values: [admin, staff]
    labels:
      admin: 관리자
      staff: 직원

  CalendarEventType:
    type: enum
    values: [nmtl, tl, bsp, departure]
    colors:
      nmtl: red
      tl: yellow
      bsp: blue
      departure: green
    labels:
      nmtl: NMTL 마감
      tl: TL 마감
      bsp: BSP 입금
      departure: 출발

  RetentionPolicy:
    type: object
    fields:
      basis: { type: string, description: "보관 기준 필드 (departure_date)" }
      period: { type: string, description: "보관 기간 (5y)" }
      action: { type: string, description: "만료 시 동작 (auto_delete)" }
