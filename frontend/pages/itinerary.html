<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일정 관리 - 여행사 계약 관리</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .itinerary-item {
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .itinerary-header {
            background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .itinerary-day {
            font-size: 16px;
            font-weight: bold;
        }

        .itinerary-date {
            font-size: 14px;
        }

        .itinerary-body {
            padding: 20px;
            background-color: #FAFAFA;
        }

        .itinerary-field {
            margin-bottom: 10px;
        }

        .itinerary-label {
            font-weight: bold;
            color: #2563EB;
            display: inline-block;
            min-width: 80px;
        }

        .itinerary-value {
            display: inline-block;
        }

        .itinerary-actions {
            padding: 10px 20px;
            border-top: 1px solid #E5E7EB;
            background-color: white;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-body .form-group {
            margin-bottom: 15px;
        }

        .group-info-box {
            background-color: #EFF6FF;
            border: 1px solid #BFDBFE;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .group-info-box h3 {
            margin: 0 0 10px 0;
            color: #2563EB;
            font-size: 16px;
        }

        .empty-itinerary {
            text-align: center;
            padding: 60px 20px;
            color: #9CA3AF;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <div class="page-header">
            <h1>일정 관리</h1>
            <div class="breadcrumb">홈 > 단체 관리 > <span id="groupName">...</span> > 일정 관리</div>
        </div>

        <!-- 단체 정보 -->
        <div class="group-info-box" id="groupInfo">
            <h3>📋 단체 정보</h3>
            <div id="groupInfoContent">로딩 중...</div>
        </div>

        <!-- 액션 버튼 -->
        <div class="d-flex justify-between align-center mb-20">
            <div>
                <button id="btnAddItinerary" class="btn btn-success">+ 일정 추가</button>
                <button id="btnBackToGroup" class="btn btn-secondary">← 단체 정보로 돌아가기</button>
            </div>
            <div id="totalInfo" class="text-muted">
                <!-- 전체 일정 개수 -->
            </div>
        </div>

        <!-- 일정 목록 -->
        <div id="itineraryList">
            <div class="loading show">
                <div class="spinner"></div>
                <p>일정을 불러오는 중...</p>
            </div>
        </div>
    </div>

    <!-- 일정 추가/수정 모달 -->
    <div id="itineraryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">일정 추가</h2>
                <span class="modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <form id="itineraryForm">
                    <div class="form-group">
                        <label for="day_no" class="form-label">일차</label>
                        <input type="number" id="day_no" name="day_no" class="form-control" min="1" />
                        <small class="info-text">비워두면 자동으로 부여됩니다</small>
                    </div>

                    <div class="form-group">
                        <label for="itinerary_date" class="form-label">일정 날짜</label>
                        <input type="date" id="itinerary_date" name="itinerary_date" class="form-control" />
                        <small class="info-text">비워두면 출발일 기준으로 자동 계산됩니다</small>
                    </div>

                    <div class="form-group">
                        <label for="location" class="form-label">장소</label>
                        <input type="text" id="location" name="location" class="form-control" placeholder="예: 서울 → 파리" />
                    </div>

                    <div class="form-group">
                        <label for="transport" class="form-label">교통</label>
                        <input type="text" id="transport" name="transport" class="form-control" placeholder="예: 대한항공 KE901" />
                    </div>

                    <div class="form-group">
                        <label for="time" class="form-label">시간</label>
                        <input type="text" id="time" name="time" class="form-control" placeholder="예: 10:00 출발, 14:30 도착" />
                    </div>

                    <div class="form-group">
                        <label for="schedule" class="form-label">일정</label>
                        <textarea id="schedule" name="schedule" class="form-control" rows="4"
                            placeholder="예:&#10;09:00 호텔 조식&#10;10:00 에펠탑 관광&#10;12:00 점심 식사&#10;14:00 루브르 박물관"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="meals" class="form-label">식사</label>
                        <input type="text" id="meals" name="meals" class="form-control" placeholder="예: 조식, 중식, 석식" />
                    </div>

                    <div class="form-group">
                        <label for="accommodation" class="form-label">숙박</label>
                        <input type="text" id="accommodation" name="accommodation" class="form-control" placeholder="예: 힐튼 파리 호텔" />
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary modal-close">취소</button>
                <button type="button" class="btn btn-success" id="btnSaveItinerary">저장</button>
            </div>
        </div>
    </div>

    <!-- 스크립트 -->
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/itinerary.js"></script>
</body>
</html>
