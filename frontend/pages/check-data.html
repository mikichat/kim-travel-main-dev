<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 확인</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }
        .section {
            margin: 20px 0;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        h2 {
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .data-item {
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-left: 4px solid #667eea;
        }
        .count {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #5568d3;
        }
        .warning {
            color: #f44336;
            font-weight: bold;
        }
        pre {
            background: #fff;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            max-height: 300px;
        }
    </style>
</head>
<body>
    <h1>📊 데이터 확인 도구</h1>

    <div class="section">
        <h2>1. 단체명단 데이터 (localStorage)</h2>
        <div id="groupRosterData"></div>
    </div>

    <div class="section">
        <h2>2. 항공편 데이터 (localStorage)</h2>
        <div id="flightData"></div>
    </div>

    <div class="section">
        <h2>3. 데이터베이스 (SQLite)</h2>
        <div id="databaseData"></div>
        <button type="button" onclick="checkDatabase()">데이터베이스 확인</button>
    </div>

    <div class="section">
        <h2>4. 전체 localStorage 키 목록</h2>
        <div id="allKeys"></div>
    </div>

    <script>
        // 단체명단 데이터 확인
        function checkGroupRoster() {
            const data = localStorage.getItem('group-roster-data');
            const container = document.getElementById('groupRosterData');

            if (!data) {
                container.innerHTML = '<p class="warning">❌ 단체명단 데이터가 없습니다!</p>';
                return;
            }

            try {
                const groups = JSON.parse(data);
                container.innerHTML = `
                    <p class="count">${groups.length}개 단체</p>
                    <button type="button" onclick="showGroupDetails()">상세 보기</button>
                    <button type="button" onclick="exportGroupData()">데이터 내보내기</button>
                    <div id="groupDetails" style="display:none;">
                        <h3>단체 목록:</h3>
                        ${groups.map((g, i) => `
                            <div class="data-item">
                                <strong>${i+1}. ${g.name || '(이름없음)'}</strong><br>
                                출발일: ${g.departureDate || '없음'}<br>
                                목적지: ${g.destination || '없음'}<br>
                                인원: ${g.members?.length || 0}명
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `<p class="warning">❌ 데이터 파싱 오류: ${error.message}</p>`;
            }
        }

        function showGroupDetails() {
            const details = document.getElementById('groupDetails');
            details.style.display = details.style.display === 'none' ? 'block' : 'none';
        }

        function exportGroupData() {
            const data = localStorage.getItem('group-roster-data');
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `group-roster-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        // 항공편 데이터 확인
        function checkFlights() {
            const data = localStorage.getItem('flight_saves_v2');
            const container = document.getElementById('flightData');

            if (!data) {
                container.innerHTML = '<p class="warning">❌ 항공편 데이터가 없습니다!</p>';
                return;
            }

            try {
                const flights = JSON.parse(data);
                container.innerHTML = `
                    <p class="count">${flights.length}개 항공편</p>
                    <button type="button" onclick="showFlightDetails()">상세 보기</button>
                    <div id="flightDetails" style="display:none;">
                        <h3>항공편 목록:</h3>
                        ${flights.map((f, i) => `
                            <div class="data-item">
                                <strong>${i+1}. ${f.name || '(그룹명 없음)'}</strong><br>
                                PNR: ${f.pnr || '없음'}<br>
                                구간: ${f.flights?.length || 0}개<br>
                                저장일: ${f.saveDate ? new Date(f.saveDate).toLocaleString() : '없음'}
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `<p class="warning">❌ 데이터 파싱 오류: ${error.message}</p>`;
            }
        }

        function showFlightDetails() {
            const details = document.getElementById('flightDetails');
            details.style.display = details.style.display === 'none' ? 'block' : 'none';
        }

        // 데이터베이스 확인
        async function checkDatabase() {
            const container = document.getElementById('databaseData');
            container.innerHTML = '<p>데이터 로딩 중...</p>';

            try {
                const [customers, bookings, schedules] = await Promise.all([
                    fetch('/api/customers?limit=1000').then(r => r.json()),
                    fetch('/api/bookings?limit=1000').then(r => r.json()),
                    fetch('/api/schedules').then(r => r.json())
                ]);

                container.innerHTML = `
                    <div class="data-item">
                        <strong>고객(Customers):</strong> ${customers.length}명
                    </div>
                    <div class="data-item">
                        <strong>예약(Bookings):</strong> ${bookings.length}건
                    </div>
                    <div class="data-item">
                        <strong>일정(Schedules):</strong> ${schedules.length}개
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `<p class="warning">❌ 데이터베이스 연결 오류: ${error.message}</p>`;
            }
        }

        // 전체 localStorage 키 확인
        function checkAllKeys() {
            const container = document.getElementById('allKeys');
            const keys = Object.keys(localStorage);

            container.innerHTML = `
                <p class="count">${keys.length}개 키</p>
                <pre>${keys.map((key, i) => {
                    const value = localStorage.getItem(key);
                    const size = new Blob([value]).size;
                    return `${i+1}. ${key} (${(size/1024).toFixed(2)} KB)`;
                }).join('\n')}</pre>
            `;
        }

        // 페이지 로드 시 자동 실행
        window.onload = function() {
            checkGroupRoster();
            checkFlights();
            checkDatabase();
            checkAllKeys();
        };
    </script>
</body>
</html>
