<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백업 관리</title>
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #2d3748;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .status-card {
            background: #f7fafc;
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border-left: 4px solid #667eea;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .status-item {
            text-align: center;
        }

        .status-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .status-label {
            color: #718096;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            background: #38a169;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #e53e3e;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #2d3748;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #cbd5e0;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .backup-list {
            margin-top: 2rem;
        }

        .backup-item {
            background: #f7fafc;
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e2e8f0;
        }

        .backup-info {
            flex: 1;
        }

        .backup-date {
            font-size: 1.125rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }

        .backup-meta {
            color: #718096;
            font-size: 0.875rem;
        }

        .backup-actions {
            display: flex;
            gap: 0.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #718096;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #667eea;
            text-decoration: none;
            margin-bottom: 1rem;
        }

        .home-link:hover {
            text-decoration: underline;
        }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        .badge-latest {
            background: #c6f6d5;
            color: #276749;
        }

        .badge-auto {
            background: #bee3f8;
            color: #2a4365;
        }

        .spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 확인 다이얼로그 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-box h3 {
            margin-bottom: 1rem;
            color: #2d3748;
        }

        .modal-box p {
            color: #718096;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="index.html" class="home-link">
            <i class="fas fa-arrow-left"></i>
            대시보드로 돌아가기
        </a>

        <h1>
            <i class="fas fa-database"></i>
            백업 관리
        </h1>

        <!-- 백업 상태 -->
        <div class="status-card">
            <h2 style="margin-bottom: 1rem;">백업 상태</h2>
            <div class="status-grid">
                <div class="status-item">
                    <div class="status-value" id="totalBackups">-</div>
                    <div class="status-label">총 백업 수 (최대 5개)</div>
                </div>
                <div class="status-item">
                    <div class="status-value" id="lastBackupTime">-</div>
                    <div class="status-label">마지막 백업</div>
                </div>
                <div class="status-item">
                    <div class="status-value" id="nextBackupTime">-</div>
                    <div class="status-label">다음 자동 백업</div>
                </div>
                <div class="status-item">
                    <div class="status-value" id="totalSize">-</div>
                    <div class="status-label">총 크기</div>
                </div>
            </div>
        </div>

        <!-- 액션 버튼 -->
        <div class="actions">
            <button type="button" class="btn btn-primary" id="btnCreateBackup" onclick="createBackupNow()">
                <i class="fas fa-save"></i>
                지금 백업하기
            </button>
            <button type="button" class="btn btn-secondary" onclick="downloadJsonBackup()">
                <i class="fas fa-file-code"></i>
                JSON 다운로드
            </button>
        </div>

        <!-- 백업 목록 -->
        <div class="backup-list">
            <h2 style="margin-bottom: 1rem;">백업 목록</h2>
            <div id="backupList">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>로딩 중...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 확인 다이얼로그 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-box">
            <h3 id="modalTitle">확인</h3>
            <p id="modalMessage">정말 진행하시겠습니까?</p>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">취소</button>
                <button type="button" class="btn btn-danger" id="modalConfirmBtn" onclick="modalConfirmAction()">확인</button>
            </div>
        </div>
    </div>

    <script src="js/toast.js"></script>
    <script>
        // API 기본 URL
        const API_BASE = '/api/backup';
        let pendingAction = null;

        // 포맷 헬퍼
        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function formatDate(isoStr) {
            if (!isoStr) return '-';
            const d = new Date(isoStr);
            return d.toLocaleString('ko-KR', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function formatShortTime(isoStr) {
            if (!isoStr) return '-';
            const d = new Date(isoStr);
            return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        }

        // 모달 열기/닫기
        function showModal(title, message, confirmText, action) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('modalConfirmBtn').textContent = confirmText || '확인';
            pendingAction = action;
            document.getElementById('confirmModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('confirmModal').classList.remove('active');
            pendingAction = null;
        }

        function modalConfirmAction() {
            if (pendingAction) {
                pendingAction();
            }
            closeModal();
        }

        // 백업 목록 조회 및 렌더링
        async function loadBackups() {
            try {
                const res = await fetch(`${API_BASE}/list`);
                const data = await res.json();

                if (!data.success) {
                    showToast('백업 목록 조회 실패', 'error');
                    return;
                }

                const { backups, nextAutoBackup } = data;

                // 상태 업데이트
                document.getElementById('totalBackups').textContent = backups.length;

                if (backups.length > 0) {
                    document.getElementById('lastBackupTime').textContent = formatShortTime(backups[0].created_at);
                    const totalBytes = backups.reduce((sum, b) => sum + b.size_bytes, 0);
                    document.getElementById('totalSize').textContent = formatBytes(totalBytes);
                } else {
                    document.getElementById('lastBackupTime').textContent = '-';
                    document.getElementById('totalSize').textContent = '-';
                }

                document.getElementById('nextBackupTime').textContent = formatShortTime(nextAutoBackup);

                // 백업 목록 렌더링
                const container = document.getElementById('backupList');

                if (backups.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-database"></i>
                            <p>백업이 없습니다.</p>
                            <p style="font-size: 0.875rem; margin-top: 0.5rem;">지금 백업하기 버튼을 클릭하여 첫 백업을 생성하세요.</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = backups.map((backup, index) => {
                    const isLatest = index === 0;
                    const latestBadge = isLatest ? '<span class="badge badge-latest">최신</span>' : '';

                    return `
                        <div class="backup-item">
                            <div class="backup-info">
                                <div class="backup-date">
                                    <i class="fas fa-calendar-alt"></i>
                                    ${formatDate(backup.created_at)}
                                    ${latestBadge}
                                </div>
                                <div class="backup-meta">
                                    <i class="fas fa-hdd"></i> ${formatBytes(backup.size_bytes)}
                                    &nbsp;&middot;&nbsp;
                                    <i class="fas fa-file"></i> ${backup.filename}
                                </div>
                            </div>
                            <div class="backup-actions">
                                <button type="button" class="btn btn-success btn-sm"
                                    onclick="confirmRestore('${backup.id}')" title="복원">
                                    <i class="fas fa-undo"></i> 복원
                                </button>
                                <button type="button" class="btn btn-secondary btn-sm"
                                    onclick="downloadBackup('${backup.id}')" title="다운로드">
                                    <i class="fas fa-download"></i>
                                </button>
                                <button type="button" class="btn btn-danger btn-sm"
                                    onclick="confirmDelete('${backup.id}')" title="삭제">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('백업 목록 조회 오류:', error);
                document.getElementById('backupList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color: #e53e3e;"></i>
                        <p>서버 연결 실패</p>
                        <p style="font-size: 0.875rem; margin-top: 0.5rem;">백엔드 서버가 실행 중인지 확인해주세요.</p>
                    </div>
                `;
            }
        }

        // 수동 백업 생성
        async function createBackupNow() {
            const btn = document.getElementById('btnCreateBackup');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 백업 중...';

            try {
                const res = await fetch(`${API_BASE}/create`, { method: 'POST' });
                const data = await res.json();

                if (data.success) {
                    showToast(`백업 생성 완료: ${data.backup.filename}`, 'success');
                    await loadBackups();
                } else {
                    showToast(data.error || '백업 생성 실패', 'error');
                }
            } catch (error) {
                showToast('백업 생성 중 오류: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> 지금 백업하기';
            }
        }

        // 복원 확인
        function confirmRestore(backupId) {
            showModal(
                '백업 복원',
                `이 백업을 복원하면 현재 데이터베이스가 덮어씌워집니다. 복원 전에 자동으로 안전 백업이 생성됩니다. 복원 후 서버를 재시작해야 합니다. 계속하시겠습니까?`,
                '복원',
                async () => {
                    try {
                        const res = await fetch(`${API_BASE}/restore/${backupId}`, { method: 'POST' });
                        const data = await res.json();
                        if (data.success) {
                            showToast(data.message, 'success', 6000);
                            await loadBackups();
                        } else {
                            showToast(data.error || '복원 실패', 'error');
                        }
                    } catch (error) {
                        showToast('복원 중 오류: ' + error.message, 'error');
                    }
                }
            );
        }

        // 삭제 확인
        function confirmDelete(backupId) {
            showModal(
                '백업 삭제',
                `이 백업을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`,
                '삭제',
                async () => {
                    try {
                        const res = await fetch(`${API_BASE}/${backupId}`, { method: 'DELETE' });
                        const data = await res.json();
                        if (data.success) {
                            showToast('백업이 삭제되었습니다.', 'success');
                            await loadBackups();
                        } else {
                            showToast(data.error || '삭제 실패', 'error');
                        }
                    } catch (error) {
                        showToast('삭제 중 오류: ' + error.message, 'error');
                    }
                }
            );
        }

        // 파일 다운로드
        function downloadBackup(backupId) {
            const a = document.createElement('a');
            a.href = `${API_BASE}/${backupId}/download`;
            a.download = '';
            a.click();
        }

        // JSON 전체 다운로드 (기존 호환)
        function downloadJsonBackup() {
            const a = document.createElement('a');
            a.href = `${API_BASE}/download`;
            a.download = `database-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        // 페이지 로드 시 초기화
        window.onload = function () {
            loadBackups();

            // 30초마다 상태 업데이트
            setInterval(loadBackups, 30000);
        };
    </script>
</body>

</html>
