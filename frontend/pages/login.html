<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 여행세상</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="js/tailwind.min.js?plugins=forms"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#7B61FF",
                    },
                    fontFamily: {
                        display: ["Noto Sans KR", "sans-serif"],
                    },
                },
            },
        };
    </script>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .form-input:focus {
            border-color: #7B61FF;
            box-shadow: 0 0 0 3px rgba(123, 97, 255, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="login-card rounded-2xl shadow-2xl w-full max-w-md p-8">
        <!-- 로고 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-primary/10 rounded-full mb-4">
                <i class="fas fa-plane-departure text-2xl text-primary"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">여행세상</h1>
            <p class="text-gray-500 text-sm mt-1">여행사 관리 시스템</p>
        </div>

        <!-- 에러 메시지 -->
        <div id="errorMsg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg">
        </div>

        <!-- 로그인 폼 -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="space-y-4">
                <div>
                    <label for="loginEmail" class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
                    <input type="email" id="loginEmail" required
                        class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none"
                        placeholder="이메일 입력">
                </div>
                <div>
                    <label for="loginPassword" class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
                    <input type="password" id="loginPassword" required
                        class="form-input w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none"
                        placeholder="비밀번호 입력">
                </div>
                <button type="submit" id="loginBtn"
                    class="w-full py-2.5 bg-primary text-white font-medium rounded-lg hover:opacity-90 transition-opacity">
                    로그인
                </button>
            </div>
        </form>

        <p class="text-center text-xs text-gray-400 mt-6">관리자에게 계정을 요청하세요</p>
    </div>

    <script>
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.textContent = '로그인 중...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error);
                    return;
                }

                window.location.href = '/';
            } catch (err) {
                showError('서버에 연결할 수 없습니다.');
            } finally {
                btn.disabled = false;
                btn.textContent = '로그인';
            }
        }
    </script>
</body>
</html>
