<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단체 정보 입력 - 여행사 계약 관리</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        /* 추가 스타일 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .product-info-summary {
            text-align: right;
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }

        .product-info-summary > div {
            margin-bottom: 4px;
        }

        .product-info-summary strong {
            color: #333;
            margin-right: 5px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.estimate {
            background-color: #fef3c7;
            color: #92400e;
        }

        .badge.contract {
            background-color: #dbeafe;
            color: #1e40af;
        }

        .badge.confirmed {
            background-color: #d1fae5;
            color: #065f46;
        }

        .form-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f9fafb;
        }

        .form-section h2 {
            font-size: 18px;
            color: #2563EB;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }

        .calculated-field {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .calculated-field input {
            flex: 1;
        }

        .auto-calculated {
            background-color: #e7f3ff !important;
            border: 1px solid #0066cc !important;
        }

        .manual-edited {
            background-color: #fff3cd !important;
            border: 1px solid #ffc107 !important;
        }

        .field-status {
            color: #666;
            font-size: 12px;
            display: block;
            margin-top: 4px;
        }

        .field-status.auto {
            color: #0066cc;
        }

        .field-status.manual {
            color: #ffc107;
        }

        .btn-edit, .btn-reset {
            background: none;
            border: 1px solid #ddd;
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .btn-edit:hover, .btn-reset:hover {
            background-color: #f1f3f5;
            transform: scale(1.05);
        }

        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 4px;
            min-height: 18px;
        }

        .required {
            color: #dc3545;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #ddd;
        }

        .info-text {
            font-size: 12px;
            color: #6c757d;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <div class="page-header">
            <div>
                <h1 id="pageTitle">상품 수정</h1>
                <div class="breadcrumb">홈 > 상품 관리 > <span id="breadcrumbAction">수정</span></div>
            </div>
            <div class="product-info-summary">
                <div><strong>상품명:</strong> <span id="summaryProductName">-</span></div>
                <div><strong>단체명:</strong> <span id="summaryGroupName">-</span></div>
                <div><strong>상태:</strong> <span id="summaryStatus" class="badge">-</span></div>
            </div>
        </div>

        <!-- 폼 -->
        <form id="groupForm">
            <!-- 기본 정보 섹션 -->
            <div class="form-section">
                <h2>📋 기본 정보</h2>

                <div class="form-group">
                    <label for="name" class="form-label required">단체명</label>
                    <input type="text" id="name" name="name" class="form-control" required />
                    <div class="error-message" id="error-name"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="start_date" class="form-label required">출발일</label>
                        <input type="date" id="start_date" name="start_date" class="form-control" required />
                        <div class="error-message" id="error-start_date"></div>
                    </div>

                    <div class="form-group">
                        <label for="end_date" class="form-label required">도착일</label>
                        <input type="date" id="end_date" name="end_date" class="form-control" required />
                        <div class="error-message" id="error-end_date"></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="pax" class="form-label required">인원수</label>
                        <input type="number" id="pax" name="pax" class="form-control" min="1" required />
                        <div class="info-text">명</div>
                        <div class="error-message" id="error-pax"></div>
                    </div>

                    <div class="form-group">
                        <label for="price_per_pax" class="form-label required">1인당 요금</label>
                        <input type="number" id="price_per_pax" name="price_per_pax" class="form-control" min="0" step="1000" required />
                        <div class="info-text">원</div>
                        <div class="error-message" id="error-price_per_pax"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="deposit" class="form-label required">계약금</label>
                    <input type="number" id="deposit" name="deposit" class="form-control" min="0" step="1000" required />
                    <div class="info-text">원 (총액보다 작거나 같아야 합니다)</div>
                    <div class="error-message" id="error-deposit"></div>
                </div>
            </div>

            <!-- 항공편 정보 섹션 -->
            <div class="form-section">
                <h2>✈️ 항공편 정보</h2>

                <div class="form-group">
                    <label for="flightSelector" class="form-label">저장된 항공편 불러오기</label>
                    <select id="flightSelector" name="flightSelector" class="form-control">
                        <option value="">-- 항공편 선택 --</option>
                        <!-- JavaScript로 동적 로드 -->
                    </select>
                    <div class="info-text">항공권 관리(air1)에서 저장한 항공편을 선택하세요</div>
                </div>

                <div class="form-group">
                    <label for="airline" class="form-label">항공사</label>
                    <input type="text" id="airline" name="airline" class="form-control" placeholder="예: 대한항공" />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="outbound_flight" class="form-label">출발편</label>
                        <input type="text" id="outbound_flight" name="outbound_flight" class="form-control" placeholder="예: KE123 인천 09:00 → 방콕 13:00" />
                    </div>

                    <div class="form-group">
                        <label for="return_flight" class="form-label">귀국편</label>
                        <input type="text" id="return_flight" name="return_flight" class="form-control" placeholder="예: KE124 방콕 14:30 → 인천 21:30" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="flight_note" class="form-label">항공 비고</label>
                    <textarea id="flight_note" name="flight_note" class="form-control" rows="2" placeholder="항공편 관련 메모사항"></textarea>
                </div>
            </div>

            <!-- 자동 계산 결과 섹션 -->
            <div class="form-section">
                <h2>🧮 자동 계산 결과</h2>
                <div class="info-text mb-20">
                    자동으로 계산되는 값입니다. 필요시 수정 버튼을 클릭하여 수동으로 변경할 수 있습니다.
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>박수</label>
                        <div class="calculated-field">
                            <input type="number" id="nights" name="nights" class="form-control auto-calculated" readonly />
                            <button type="button" class="btn-edit" id="btn-edit-nights" title="수동 수정">✏️</button>
                            <button type="button" class="btn-reset" id="btn-reset-nights" style="display:none;" title="자동 계산으로 되돌리기">↺</button>
                        </div>
                        <small class="field-status auto" id="status-nights">자동 계산됨</small>
                    </div>

                    <div class="form-group">
                        <label>일수</label>
                        <div class="calculated-field">
                            <input type="number" id="days" name="days" class="form-control auto-calculated" readonly />
                            <button type="button" class="btn-edit" id="btn-edit-days" title="수동 수정">✏️</button>
                            <button type="button" class="btn-reset" id="btn-reset-days" style="display:none;" title="자동 계산으로 되돌리기">↺</button>
                        </div>
                        <small class="field-status auto" id="status-days">자동 계산됨</small>
                    </div>
                </div>

                <div class="form-group">
                    <label>총액</label>
                    <div class="calculated-field">
                        <input type="number" id="total_price" name="total_price" class="form-control auto-calculated" readonly />
                        <button type="button" class="btn-edit" id="btn-edit-total_price" title="수동 수정">✏️</button>
                        <button type="button" class="btn-reset" id="btn-reset-total_price" style="display:none;" title="자동 계산으로 되돌리기">↺</button>
                    </div>
                    <small class="field-status auto" id="status-total_price">자동 계산됨 (인원 × 1인당 요금)</small>
                </div>

                <div class="form-group">
                    <label>잔액</label>
                    <div class="calculated-field">
                        <input type="number" id="balance" name="balance" class="form-control auto-calculated" readonly />
                        <button type="button" class="btn-edit" id="btn-edit-balance" title="수동 수정">✏️</button>
                        <button type="button" class="btn-reset" id="btn-reset-balance" style="display:none;" title="자동 계산으로 되돌리기">↺</button>
                    </div>
                    <small class="field-status auto" id="status-balance">자동 계산됨 (총액 - 계약금)</small>
                </div>

                <div class="form-group">
                    <label>잔액 완납일</label>
                    <div class="calculated-field">
                        <input type="date" id="balance_due_date" name="balance_due_date" class="form-control auto-calculated" readonly />
                        <button type="button" class="btn-edit" id="btn-edit-balance_due_date" title="수동 수정">✏️</button>
                        <button type="button" class="btn-reset" id="btn-reset-balance_due_date" style="display:none;" title="자동 계산으로 되돌리기">↺</button>
                    </div>
                    <small class="field-status auto" id="status-balance_due_date">자동 계산됨 (출발일 - 7일)</small>
                </div>
            </div>

            <!-- 호텔 정보 섹션 -->
            <div class="form-section">
                <h2>🏨 호텔 정보</h2>

                <div class="form-group">
                    <label for="hotel_name" class="form-label">호텔명</label>
                    <input type="text" id="hotel_name" name="hotel_name" class="form-control" placeholder="예: 그랜드 하얏트 호텔" />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="hotel_checkin" class="form-label">체크인</label>
                        <input type="date" id="hotel_checkin" name="hotel_checkin" class="form-control" />
                    </div>

                    <div class="form-group">
                        <label for="hotel_checkout" class="form-label">체크아웃</label>
                        <input type="date" id="hotel_checkout" name="hotel_checkout" class="form-control" />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="hotel_room_type" class="form-label">객실 타입</label>
                        <input type="text" id="hotel_room_type" name="hotel_room_type" class="form-control" placeholder="예: 디럭스 트윈" />
                    </div>

                    <div class="form-group">
                        <label for="hotel_rooms" class="form-label">객실 수</label>
                        <input type="number" id="hotel_rooms" name="hotel_rooms" class="form-control" min="0" placeholder="예: 20" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="hotel_note" class="form-label">호텔 비고</label>
                    <textarea id="hotel_note" name="hotel_note" class="form-control" rows="2" placeholder="호텔 관련 메모사항"></textarea>
                </div>
            </div>

            <!-- 차량 정보 섹션 -->
            <div class="form-section">
                <h2>🚌 차량 정보</h2>

                <div class="form-row">
                    <div class="form-group">
                        <label for="vehicle_type" class="form-label">차량 종류</label>
                        <input type="text" id="vehicle_type" name="vehicle_type" class="form-control" placeholder="예: 대형버스 45인승" />
                    </div>

                    <div class="form-group">
                        <label for="vehicle_count" class="form-label">차량 대수</label>
                        <input type="number" id="vehicle_count" name="vehicle_count" class="form-control" min="0" placeholder="예: 2" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="vehicle_company" class="form-label">차량 업체</label>
                    <input type="text" id="vehicle_company" name="vehicle_company" class="form-control" placeholder="예: ABC 관광버스" />
                </div>

                <div class="form-group">
                    <label for="vehicle_note" class="form-label">차량 비고</label>
                    <textarea id="vehicle_note" name="vehicle_note" class="form-control" rows="2" placeholder="차량 관련 메모사항"></textarea>
                </div>
            </div>

            <!-- 가이드 정보 섹션 -->
            <div class="form-section">
                <h2>👤 가이드 정보</h2>

                <div class="form-row">
                    <div class="form-group">
                        <label for="guide_name" class="form-label">가이드명</label>
                        <input type="text" id="guide_name" name="guide_name" class="form-control" placeholder="예: 홍길동" />
                    </div>

                    <div class="form-group">
                        <label for="guide_phone" class="form-label">연락처</label>
                        <input type="tel" id="guide_phone" name="guide_phone" class="form-control" placeholder="예: 010-1234-5678" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="guide_language" class="form-label">가이드 언어</label>
                    <input type="text" id="guide_language" name="guide_language" class="form-control" placeholder="예: 한국어, 영어" />
                </div>

                <div class="form-group">
                    <label for="guide_note" class="form-label">가이드 비고</label>
                    <textarea id="guide_note" name="guide_note" class="form-control" rows="2" placeholder="가이드 관련 메모사항"></textarea>
                </div>
            </div>

            <!-- 수배업무 관리 섹션 -->
            <div class="form-section">
                <h2>📋 수배업무 관리</h2>

                <div class="form-group">
                    <label class="form-label">수배 체크리스트</label>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="procurement_flight" name="procurement_flight" />
                            <span>항공권 수배</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="procurement_hotel" name="procurement_hotel" />
                            <span>호텔 예약</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="procurement_vehicle" name="procurement_vehicle" />
                            <span>차량 예약</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="procurement_guide" name="procurement_guide" />
                            <span>가이드 섭외</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="procurement_visa" name="procurement_visa" />
                            <span>비자 수속</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="procurement_insurance" name="procurement_insurance" />
                            <span>보험 가입</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="procurement_status" class="form-label">수배 진행 상태</label>
                    <select id="procurement_status" name="procurement_status" class="form-control">
                        <option value="">-- 선택 --</option>
                        <option value="pending">수배 대기</option>
                        <option value="in_progress">수배 진행중</option>
                        <option value="completed">수배 완료</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="procurement_note" class="form-label">수배 메모</label>
                    <textarea id="procurement_note" name="procurement_note" class="form-control" rows="3" placeholder="수배업무 관련 메모사항"></textarea>
                </div>
            </div>

            <!-- 제출 버튼 -->
            <div class="form-actions">
                <button type="submit" class="btn btn-success">💾 저장</button>
                <button type="button" class="btn btn-secondary" id="btnCancel">취소</button>
                <button type="button" class="btn btn-warning" id="btnRecalculate" style="display:none;">🔄 전체 재계산</button>
            </div>
        </form>
    </div>

    <!-- 스크립트 -->
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/group_form.js"></script>
</body>
</html>
