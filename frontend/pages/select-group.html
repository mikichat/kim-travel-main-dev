    <style>
        /* Page-specific overrides for select-group */
        .main-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header-card {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-card h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }

        .header-card p {
            color: #718096;
        }

        .groups-card {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .search-box {
            margin-bottom: 1.5rem;
        }

        .group-list {
            display: grid;
            gap: 1rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .group-item {
            padding: 1.25rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .group-item:hover {
            border-color: #667eea;
            background: #f7fafc;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .group-item-clickable {
            flex: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .group-info {
            flex: 1;
        }

        .group-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 0.25rem;
        }

        .group-count {
            font-size: 0.875rem;
            color: #718096;
        }

        .group-icon {
            font-size: 1.5rem;
            color: #667eea;
        }

        .btn-edit {
            background: #ed8936;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-edit:hover {
            background: #dd6b20;
            transform: scale(1.05);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #718096;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            padding: 3rem;
            color: #a0aec0;
        }

        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }

        /* 스크롤바 스타일 */
        .group-list::-webkit-scrollbar {
            width: 8px;
        }

        .group-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .group-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .group-list::-webkit-scrollbar-thumb:hover {
            background: #5a67d8;
        }

        @media (max-width: 768px) {
            .header-card h1 {
                font-size: 1.5rem;
            }

            .group-item {
                padding: 1rem;
            }

            .group-name {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- 메인 컨텐츠 -->
    <main class="main-content">
        <div class="container">
            <!-- 헤더 -->
            <div class="header-card">
                <h1><i class="fas fa-users"></i> 여행 그룹 선택</h1>
                <p>일정을 확인할 그룹을 선택하세요</p>
            </div>

        <!-- 그룹 목록 카드 -->
        <div class="groups-card">
            <!-- 검색 -->
            <div class="search-box">
                <input type="text"
                       id="searchInput"
                       class="search-input"
                       placeholder="그룹명 검색..."
                       autocomplete="off"
                       aria-label="그룹명 검색">
            </div>

            <!-- 로딩 -->
            <div id="loading" class="loading" role="status" aria-live="polite">
                <div class="spinner"></div>
                <p>그룹 목록을 불러오는 중...</p>
            </div>

            <!-- 에러 메시지 -->
            <div id="errorMessage" class="error-message" style="display: none;"></div>

            <!-- 그룹 목록 -->
            <div id="groupList" class="group-list" style="display: none;">
                <!-- 동적으로 추가됩니다 -->
            </div>

            <!-- 빈 데이터 -->
            <div id="noData" class="no-data" style="display: none;">
                <i class="fas fa-inbox fa-3x mb-4" style="color: #cbd5e0;"></i>
                <p>등록된 그룹이 없습니다.</p>
            </div>
        </div>
        </div>
    </main>

    <script>
        function escapeHtml(s) {
            if (s == null) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
        }

        // 사이드바 서브메뉴 토글
        function toggleSubmenu(element) {
            element.classList.toggle('open');
            const submenu = element.nextElementSibling;
            if (submenu && submenu.classList.contains('nav-submenu')) {
                submenu.classList.toggle('open');
            }
        }

        let allGroups = [];

        // 페이지 로드 시 그룹 목록 가져오기
        document.addEventListener('DOMContentLoaded', function() {
            loadGroups();

            // 검색 기능
            document.getElementById('searchInput').addEventListener('input', function(e) {
                const searchTerm = e.target.value.toLowerCase();
                filterGroups(searchTerm);
            });
        });

        async function loadGroups() {
            try {
                const response = await fetch('/api/schedules');

                if (!response.ok) {
                    throw new Error('그룹 목록을 불러오는데 실패했습니다.');
                }

                const schedules = await response.json();

                // 로딩 숨기기
                document.getElementById('loading').style.display = 'none';

                if (schedules.length === 0) {
                    document.getElementById('noData').style.display = 'block';
                    return;
                }

                // 그룹명별로 그룹화 및 카운트
                const groupMap = {};
                schedules.forEach(schedule => {
                    const groupName = schedule.group_name || '그룹명 없음';
                    if (!groupMap[groupName]) {
                        groupMap[groupName] = 0;
                    }
                    groupMap[groupName]++;
                });

                // 배열로 변환 및 정렬
                allGroups = Object.keys(groupMap).map(name => ({
                    name: name,
                    count: groupMap[name]
                })).sort((a, b) => a.name.localeCompare(b.name));

                // 그룹 목록 표시
                document.getElementById('groupList').style.display = 'grid';
                renderGroups(allGroups);

            } catch (error) {
                console.error('그룹 로드 오류:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorMessage').textContent = `오류: ${error.message}`;
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        function renderGroups(groups) {
            const groupList = document.getElementById('groupList');
            groupList.innerHTML = '';

            if (groups.length === 0) {
                groupList.style.display = 'none';
                document.getElementById('noData').innerHTML = `
                    <i class="fas fa-search fa-3x mb-4" style="color: #cbd5e0;"></i>
                    <p>검색 결과가 없습니다.</p>
                `;
                document.getElementById('noData').style.display = 'block';
                return;
            }

            document.getElementById('noData').style.display = 'none';
            groupList.style.display = 'grid';

            groups.forEach(group => {
                const groupItem = document.createElement('div');
                groupItem.className = 'group-item';

                const safeNameJs = escapeHtml(JSON.stringify(group.name));
                groupItem.innerHTML = `
                    <div class="group-item-clickable" onclick="selectGroup(${safeNameJs})">
                        <div class="group-info">
                            <div class="group-name">${escapeHtml(group.name)}</div>
                            <div class="group-count">
                                <i class="fas fa-calendar-check"></i> ${group.count}개의 일정
                            </div>
                        </div>
                        <div class="group-icon">
                            <i class="fas fa-chevron-right"></i>
                        </div>
                    </div>
                    <button type="button" class="btn-edit" onclick="editGroup(${safeNameJs}); event.stopPropagation();">
                        <i class="fas fa-edit"></i> 수정
                    </button>
                `;

                groupList.appendChild(groupItem);
            });
        }

        function filterGroups(searchTerm) {
            if (!searchTerm) {
                renderGroups(allGroups);
                return;
            }

            const filtered = allGroups.filter(group =>
                group.name.toLowerCase().includes(searchTerm)
            );

            renderGroups(filtered);
        }

        function selectGroup(groupName) {
            // 랜딩 페이지로 이동
            const url = `/landing.html?group=${encodeURIComponent(groupName)}`;
            window.location.href = url;
        }

        function editGroup(groupName) {
            // 편집 페이지로 이동
            const url = `/edit-schedule.html?group=${encodeURIComponent(groupName)}`;
            window.location.href = url;
        }
    </script>
