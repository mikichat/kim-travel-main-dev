<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단체 관리 대시보드 - 여행사 계약 관리</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .tabs {
            display: flex;
            gap: 5px;
            border-bottom: 2px solid #2563EB;
            margin-bottom: 20px;
        }

        .tab {
            padding: 12px 24px;
            background-color: #f8f9fa;
            border: none;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            font-size: 14px;
            transition: all 0.3s;
        }

        .tab:hover {
            background-color: #e9ecef;
        }

        .tab.active {
            background-color: #2563EB;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .dashboard-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .summary-card h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .summary-card .value {
            font-size: 24px;
            font-weight: bold;
        }

        .list-item {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 10px;
            background-color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-item:hover {
            background-color: #f8f9fa;
        }

        .list-item-content {
            flex: 1;
        }

        .list-item-actions {
            display: flex;
            gap: 5px;
        }

        .action-buttons {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <div class="page-header">
            <h1 id="groupName">단체 관리 대시보드</h1>
            <div class="breadcrumb">홈 > 단체 관리 > <span id="breadcrumbName">...</span></div>
        </div>

        <!-- 요약 카드 -->
        <div class="dashboard-summary" id="dashboardSummary">
            <!-- JavaScript로 동적 생성 -->
        </div>

        <!-- 탭 -->
        <div class="tabs">
            <button class="tab active" data-tab="info">기본 정보</button>
            <button class="tab" data-tab="itinerary">일정 관리</button>
            <button class="tab" data-tab="cancel-rules">취소 규정</button>
            <button class="tab" data-tab="includes">포함/불포함</button>
            <button class="tab" data-tab="documents">문서 출력</button>
        </div>

        <!-- 탭 컨텐츠 -->

        <!-- 기본 정보 탭 -->
        <div class="tab-content active" id="tab-info">
            <div class="action-buttons">
                <button class="btn btn-primary" id="btnEditGroup">✏️ 기본 정보 수정</button>
                <button class="btn btn-warning" id="btnChangeStatus">🔄 상태 변경</button>
                <button class="btn btn-danger" id="btnDeleteGroup">🗑️ 단체 삭제</button>
            </div>
            <div class="card">
                <div class="card-header">단체 상세 정보</div>
                <div class="card-body" id="groupDetailInfo">
                    로딩 중...
                </div>
            </div>
        </div>

        <!-- 일정 관리 탭 -->
        <div class="tab-content" id="tab-itinerary">
            <div class="action-buttons">
                <button class="btn btn-success" id="btnAddItinerary">+ 일정 추가</button>
            </div>
            <div id="itineraryList">로딩 중...</div>
        </div>

        <!-- 취소 규정 탭 -->
        <div class="tab-content" id="tab-cancel-rules">
            <div class="action-buttons">
                <button class="btn btn-success" id="btnAddCancelRule">+ 취소 규정 추가</button>
            </div>
            <div id="cancelRulesList">로딩 중...</div>
        </div>

        <!-- 포함/불포함 탭 -->
        <div class="tab-content" id="tab-includes">
            <div class="action-buttons">
                <button class="btn btn-success" id="btnAddInclude">+ 포함 항목 추가</button>
                <button class="btn btn-warning" id="btnAddExclude">+ 불포함 항목 추가</button>
            </div>
            <div id="includesList">로딩 중...</div>
        </div>

        <!-- 문서 출력 탭 -->
        <div class="tab-content" id="tab-documents">
            <div class="card">
                <div class="card-header">문서 생성 및 출력</div>
                <div class="card-body">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
                        <div style="text-align: center; padding: 30px; border: 2px dashed #ddd; border-radius: 8px;">
                            <div style="font-size: 48px; margin-bottom: 15px;">📄</div>
                            <h3 style="margin-bottom: 10px;">견적서</h3>
                            <p style="font-size: 12px; color: #666; margin-bottom: 15px;">기본 정보, 요금, 포함/불포함 사항</p>
                            <button class="btn btn-primary btn-generate-doc" data-type="estimate" style="margin-bottom: 5px;">PDF 생성 (미지원)</button>
                            <button class="btn btn-secondary" onclick="handlePreviewDocument('estimate')" style="font-size: 13px;">HTML 미리보기</button>
                        </div>
                        <div style="text-align: center; padding: 30px; border: 2px dashed #ddd; border-radius: 8px;">
                            <div style="font-size: 48px; margin-bottom: 15px;">📝</div>
                            <h3 style="margin-bottom: 10px;">계약서</h3>
                            <p style="font-size: 12px; color: #666; margin-bottom: 15px;">계약 조건, 취소 규정, 서명란</p>
                            <button class="btn btn-primary btn-generate-doc" data-type="contract" style="margin-bottom: 5px;">PDF 생성 (미지원)</button>
                            <button class="btn btn-secondary" onclick="handlePreviewDocument('contract')" style="font-size: 13px;">HTML 미리보기</button>
                        </div>
                        <div style="text-align: center; padding: 30px; border: 2px dashed #ddd; border-radius: 8px;">
                            <div style="font-size: 48px; margin-bottom: 15px;">📅</div>
                            <h3 style="margin-bottom: 10px;">일정표</h3>
                            <p style="font-size: 12px; color: #666; margin-bottom: 15px;">일자별 상세 일정, 교통, 숙박</p>
                            <button class="btn btn-primary btn-generate-doc" data-type="itinerary" style="margin-bottom: 5px;">PDF 생성 (미지원)</button>
                            <button class="btn btn-secondary" onclick="handlePreviewDocument('itinerary')" style="font-size: 13px;">HTML 미리보기</button>
                        </div>
                        <div style="text-align: center; padding: 30px; border: 2px dashed #ddd; border-radius: 8px;">
                            <div style="font-size: 48px; margin-bottom: 15px;">📦</div>
                            <h3 style="margin-bottom: 10px;">통합 문서</h3>
                            <p style="font-size: 12px; color: #666; margin-bottom: 15px;">견적서 + 계약서 + 일정표</p>
                            <button class="btn btn-success btn-generate-doc" data-type="bundle" style="margin-bottom: 5px;">PDF 생성 (미지원)</button>
                            <button class="btn btn-secondary" onclick="handlePreviewDocument('bundle')" style="font-size: 13px;">HTML 미리보기</button>
                        </div>
                    </div>

                    <hr style="margin: 30px 0;">

                    <h3 style="margin-bottom: 15px;">생성된 문서 목록</h3>
                    <div id="documentsList">로딩 중...</div>
                </div>
            </div>
        </div>

        <!-- 돌아가기 버튼 -->
        <div style="margin-top: 30px; padding-top: 20px; border-top: 2px solid #ddd;">
            <button class="btn btn-secondary" id="btnBackToList">← 단체 목록으로 돌아가기</button>
        </div>
    </div>

    <!-- 스크립트 -->
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/group_dashboard.js"></script>
</body>
</html>
