<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여행 일정표 미리보기</title>
    <link rel="stylesheet" href="css/itinerary.css">
    <link rel="stylesheet" href="css/print.css" media="print">
</head>
<body>
    <!-- 일정표 페이지들이 동적으로 추가됩니다 -->
    <div id="itinerary-pages-container"></div>

    <script type="module" src="js/itinerary-data.js"></script>
    <script type="module">
        // ==================================================================
        // 페이지 렌더링
        // ==================================================================

        let currentItineraryData = null;

        /**
         * 일정표 페이지 렌더링
         * @param {Object} itineraryData - 일정표 데이터
         */
        function renderItineraryPages(itineraryData) {
            currentItineraryData = itineraryData;
            const container = document.getElementById('itinerary-pages-container');
            container.innerHTML = '';

            if (!itineraryData || !itineraryData.pages) {
                console.warn('No itinerary data to render');
                return;
            }

            itineraryData.pages.forEach(page => {
                if (page.page_type === 'itinerary_day') {
                    const pageElement = createItineraryPage(page);
                    container.appendChild(pageElement);
                }
            });

        }

        /**
         * 일정표 페이지 생성
         * @param {Object} pageData - 페이지 데이터
         * @returns {HTMLElement}
         */
        function createItineraryPage(pageData) {
            const page = document.createElement('div');
            page.className = 'itinerary-page-container';
            page.setAttribute('data-page-number', pageData.page_number);

            // 배경 이미지가 있으면 설정
            const backgroundStyle = pageData.background_image
                ? `background-image: url('${pageData.background_image}');`
                : '';

            page.innerHTML = `
                <!-- 배경 이미지 레이어 -->
                <div class="itinerary-background" style="${backgroundStyle}"></div>

                <!-- 콘텐츠 레이어 (텍스트 오버레이) -->
                <div class="itinerary-content">
                    <!-- 헤더: 일차 정보 -->
                    <div class="itinerary-header">
                        <div class="day-info">
                            <span class="day-number" data-field="day_number">${pageData.day_info.day_number}일차</span>
                            <span class="day-date" data-field="day_date">(${pageData.day_info.date} ${pageData.day_info.day_of_week})</span>
                        </div>
                        <h2 class="day-title" data-field="day_title">${pageData.day_info.title}</h2>
                    </div>

                    <!-- 주요 일정 -->
                    <div class="schedule-section">
                        <h3 class="section-title">일정</h3>
                        <div class="schedule-content" data-field="main_schedule">
                            ${formatScheduleText(pageData.editable_text.main_schedule)}
                        </div>
                    </div>

                    <!-- 식사 정보 -->
                    <div class="meals-section">
                        <h3 class="section-title">식사</h3>
                        <div class="meals-content" data-field="meals">
                            ${pageData.editable_text.meals}
                        </div>
                    </div>

                    <!-- 호텔 정보 -->
                    <div class="hotel-section">
                        <h3 class="section-title">숙박</h3>
                        <div class="hotel-content" data-field="hotel">
                            ${pageData.editable_text.hotel}
                        </div>
                    </div>
                </div>
            `;

            return page;
        }

        /**
         * 일정 텍스트를 HTML로 포맷팅
         * @param {string} scheduleText
         * @returns {string}
         */
        function formatScheduleText(scheduleText) {
            if (!scheduleText) return '';

            // 줄바꿈을 <br />로 변환
            return scheduleText
                .split('\n')
                .map(line => `<p>${line}</p>`)
                .join('');
        }

        // ==================================================================
        // 데이터 바인딩 (개별 필드)
        // ==================================================================

        /**
         * 특정 페이지의 특정 필드 업데이트
         * @param {number} pageNumber - 페이지 번호
         * @param {string} fieldName - 필드 이름
         * @param {string} value - 새 값
         */
        function updateItineraryField(pageNumber, fieldName, value) {
            const page = document.querySelector(`[data-page-number="${pageNumber}"]`);
            if (!page) {
                console.warn(`Page ${pageNumber} not found`);
                return;
            }

            const field = page.querySelector(`[data-field="${fieldName}"]`);
            if (!field) {
                console.warn(`Field ${fieldName} not found in page ${pageNumber}`);
                return;
            }

            if (fieldName === 'main_schedule') {
                field.innerHTML = formatScheduleText(value);
            } else {
                field.textContent = value;
            }

        }

        // ==================================================================
        // 메시지 수신 (편집기로부터)
        // ==================================================================

        window.addEventListener('message', (event) => {
            if (event.data.type === 'LOAD_ITINERARY') {
                renderItineraryPages(event.data.data);
            } else if (event.data.type === 'UPDATE_ITINERARY_FIELD') {
                updateItineraryField(
                    event.data.pageNumber,
                    event.data.field,
                    event.data.value
                );
            }
        });

        // ==================================================================
        // 초기화
        // ==================================================================

        window.addEventListener('load', () => {
            // 개발 테스트용: 샘플 데이터 로드
            if (typeof SIMPLE_ITINERARY_DATA !== 'undefined') {
                setTimeout(() => {
                    renderItineraryPages(SIMPLE_ITINERARY_DATA);
                }, 100);
            }
        });
    </script>
</body>
</html>
