<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전체 문서 미리보기 (견적서 + 일정표)</title>
    <link rel="stylesheet" href="css/document.css">
    <link rel="stylesheet" href="css/itinerary.css">
    <link rel="stylesheet" href="css/print.css" media="print">
    <style>
        body {
            background-color: #e5e7eb;
            padding: 20px;
            margin: 0;
        }

        .document-container {
            max-width: 210mm;
            margin: 0 auto;
        }

        /* Page separation in screen view */
        @media screen {
            .page-container,
            .itinerary-page-container {
                margin-bottom: 20px;
            }

            .page-container:last-child,
            .itinerary-page-container:last-child {
                margin-bottom: 0;
            }
        }

        /* Print: remove spacing between pages */
        @media print {
            body {
                background-color: white;
                padding: 0;
            }

            .document-container {
                max-width: 100%;
            }

            .page-container,
            .itinerary-page-container {
                margin: 0;
                page-break-after: always;
            }
        }
    </style>
</head>
<body>
    <div class="document-container">
        <!-- Page 1: Quote (견적서) -->
        <div id="quote-page" class="page-container">
            <!-- Quote content will be loaded here -->
        </div>

        <!-- Pages 2+: Itinerary (일정표) -->
        <div id="itinerary-pages">
            <!-- Itinerary pages will be loaded here -->
        </div>
    </div>

    <script type="module" src="js/data-binding.js"></script>
    <script type="module" src="js/itinerary-data.js"></script>
    <script type="module">
        // ==================================================================
        // Render Quote Page
        // ==================================================================
        function renderQuotePage(quoteData) {
            const quotePage = document.getElementById('quote-page');

            quotePage.innerHTML = `
                <!-- Top Border -->
                <div class="page-border-top"></div>

                <!-- Content Wrapper -->
                <div class="content-wrapper">
                    <!-- Header -->
                    <header class="header">
                        <div class="header-logo">
                            <img src="assets/images/25년11월중순 광저우 망산-1_hd1.png" alt="로고" class="logo-image">
                        </div>
                        <div class="header-contact">
                            <p class="contact-info" data-field="contact_info">${quoteData.contact_info || '담당자: 김국진 010-2662-9009'}</p>
                        </div>
                    </header>

                    <!-- Title -->
                    <section class="title-section">
                        <h1 class="document-title">여행 견적서</h1>
                        <div class="title-underline"></div>
                    </section>

                    <!-- Main Info Table -->
                    <section class="main-info-section">
                        <table class="info-table">
                            <tbody>
                                <tr class="table-row">
                                    <th class="table-header">단체명</th>
                                    <td class="table-data" data-field="group_name">${quoteData.group_info?.group_name || ''}</td>
                                </tr>
                                <tr class="table-row">
                                    <th class="table-header">일 자</th>
                                    <td class="table-data" data-field="travel_dates">${quoteData.group_info?.travel_dates || ''}</td>
                                </tr>
                                <tr class="table-row">
                                    <th class="table-header">여행지</th>
                                    <td class="table-data" data-field="destination">${quoteData.group_info?.destination || ''}</td>
                                </tr>
                                <tr class="table-row-last">
                                    <th class="table-header table-header-top">1인 여행요금</th>
                                    <td class="table-data-pricing">
                                        <div class="price-box">
                                            <div class="price-grid">
                                                <div class="price-cell price-airline" data-field="airline_name">${quoteData.pricing?.airline_name || ''}</div>
                                                <div class="price-cell price-schedule">
                                                    <p data-field="departure_flight">${quoteData.pricing?.departure_flight || ''}</p>
                                                    <p data-field="return_flight">${quoteData.pricing?.return_flight || ''}</p>
                                                </div>
                                                <div class="price-cell price-option" data-field="option_type">${quoteData.pricing?.option_type || ''}</div>
                                                <div class="price-cell price-amount" data-field="price_amount">${quoteData.pricing?.price_amount || ''}</div>
                                            </div>
                                            <div class="price-note">
                                                <p data-field="price_note">${quoteData.pricing?.price_note || ''}</p>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </section>

                    <!-- Conditions Table -->
                    <section class="conditions-section">
                        <div class="conditions-header">
                            <h2 class="conditions-title">여 행 조 건</h2>
                        </div>
                        <table class="conditions-table">
                            <tbody>
                                <tr class="condition-row">
                                    <th class="condition-header">항공료</th>
                                    <td class="condition-content">전 일정에 명시된 항공료</td>
                                    <td class="condition-note condition-note-red">선발권 기준으로 추후에 요금이 변동 될 수 있습니다</td>
                                </tr>
                                <tr class="condition-row">
                                    <th class="condition-header">숙 박</th>
                                    <td class="condition-content">일정에 있는 숙박 포함</td>
                                    <td class="condition-note">2인 1실 기준</td>
                                </tr>
                                <tr class="condition-row">
                                    <th class="condition-header">식 사</th>
                                    <td class="condition-content">일정에 있는 식사 포함</td>
                                    <td class="condition-note"></td>
                                </tr>
                                <tr class="condition-row">
                                    <th class="condition-header">교통편</th>
                                    <td class="condition-content">일정에 따른 차량 이용 교통 포함</td>
                                    <td class="condition-note">집결지 ↔ 인천국제공항1청사 왕복 리무진 제공</td>
                                </tr>
                                <tr class="condition-row">
                                    <th class="condition-header">관 광</th>
                                    <td class="condition-content">전 일정에 명시된 관광 비용 포함</td>
                                    <td class="condition-note condition-note-red">전신맛사지 90분 2회 포함 (단 팁은 별도)</td>
                                </tr>
                                <tr class="condition-row">
                                    <th class="condition-header">여행자 보험</th>
                                    <td class="condition-content">여행 기간 해외 여행자 보험 가입</td>
                                    <td class="condition-note"></td>
                                </tr>
                                <tr class="condition-row">
                                    <th class="condition-header">기타 세금</th>
                                    <td class="condition-content">공항 이용료, 출국세, 입국세 포함</td>
                                    <td class="condition-note"></td>
                                </tr>
                                <tr class="condition-row-last">
                                    <th class="condition-header condition-header-top">비고 사항</th>
                                    <td class="condition-content-full" colspan="2">
                                        <ul class="condition-list">
                                            <li>상기 일정은 기상악화나 현지 사정으로 인하여 변동될 수 있습니다.</li>
                                            <li>견적서 인원 (8명 이상)에 따른 행사 조건입니다.</li>
                                            <li>현금 결제 조건입니다.</li>
                                            <li>식사 시 음료(주류) 및 식사 추가는 불포함입니다.</li>
                                            <li>단독 요금 진행 조건입니다.</li>
                                        </ul>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </section>

                    <!-- Signature -->
                    <section class="signature-section">
                        <p class="signature-text">위와 같이 여행 경비 견적서를 제출합니다.</p>
                        <p class="signature-date">2025년 07월 09일</p>
                        <p class="signature-company">(유) 여행세상 대표이사</p>
                    </section>
                </div>

                <!-- Footer -->
                <footer class="footer">
                    <div class="footer-content">
                        <div class="footer-logo">
                            <img src="assets/images/25년11월중순 광저우 망산-1_hd2.png" alt="하단 로고" class="footer-logo-image">
                        </div>
                        <div class="footer-info">
                            <span>A: 전주시 완산구 서신동 856-1번지</span>
                            <span>T: 063)271-9090</span>
                            <span>F: 063)271-9030</span>
                        </div>
                        <div class="footer-spacer"></div>
                    </div>
                </footer>
            `;
        }

        // ==================================================================
        // Render Itinerary Pages
        // ==================================================================
        function renderItineraryPages(itineraryData) {
            const container = document.getElementById('itinerary-pages');
            container.innerHTML = '';

            if (!itineraryData || !itineraryData.pages) {
                return;
            }

            itineraryData.pages.forEach(page => {
                if (page.page_type === 'itinerary_day') {
                    const pageElement = createItineraryPage(page);
                    container.appendChild(pageElement);
                }
            });
        }

        function createItineraryPage(pageData) {
            const page = document.createElement('div');
            page.className = 'itinerary-page-container';

            const backgroundStyle = pageData.background_image
                ? `background-image: url('${pageData.background_image}');`
                : '';

            page.innerHTML = `
                <div class="itinerary-background" style="${backgroundStyle}"></div>
                <div class="itinerary-content">
                    <div class="itinerary-header">
                        <div class="day-info">
                            <span class="day-number">${pageData.day_info.day_number}일차</span>
                            <span class="day-date">(${pageData.day_info.date} ${pageData.day_info.day_of_week})</span>
                        </div>
                        <h2 class="day-title">${pageData.day_info.title}</h2>
                    </div>
                    <div class="schedule-section">
                        <h3 class="section-title">일정</h3>
                        <div class="schedule-content">
                            ${formatScheduleText(pageData.editable_text.main_schedule)}
                        </div>
                    </div>
                    <div class="meals-section">
                        <h3 class="section-title">식사</h3>
                        <div class="meals-content">${pageData.editable_text.meals}</div>
                    </div>
                    <div class="hotel-section">
                        <h3 class="section-title">숙박</h3>
                        <div class="hotel-content">${pageData.editable_text.hotel}</div>
                    </div>
                </div>
            `;

            return page;
        }

        function formatScheduleText(scheduleText) {
            if (!scheduleText) return '';
            return scheduleText
                .split('\n')
                .map(line => `<p>${line}</p>`)
                .join('');
        }

        // ==================================================================
        // Message Handler
        // ==================================================================
        window.addEventListener('message', (event) => {
            if (event.data.type === 'LOAD_COMPLETE_DOCUMENT') {
                if (event.data.quote) {
                    renderQuotePage(event.data.quote);
                }
                if (event.data.itinerary) {
                    renderItineraryPages(event.data.itinerary);
                }
            }
        });

        // ==================================================================
        // Initialize with sample data
        // ==================================================================
        window.addEventListener('load', () => {
            // Load default quote data
            if (typeof DEFAULT_QUOTE_DATA !== 'undefined') {
                renderQuotePage(DEFAULT_QUOTE_DATA);
            }

            // Load default itinerary data
            if (typeof SIMPLE_ITINERARY_DATA !== 'undefined') {
                renderItineraryPages(SIMPLE_ITINERARY_DATA);
            }
        });
    </script>
</body>
</html>
