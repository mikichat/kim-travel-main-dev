<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인보이스 생성</title>
    <base href="/in/">
    <link rel="stylesheet" href="css/invoice.css">
</head>
<body>
    <div class="invoice-editor-container">
        <h1>인보이스 생성</h1>
        
        <form id="invoice-form">
            <!-- 기본 정보 섹션 -->
            <div class="card">
                <div class="card-header">기본 정보</div>
                <div class="form-group">
                    <label for="recipient">수신 *</label>
                    <div class="recipient-input-group">
                        <select id="recipient-select" aria-label="거래처 선택">
                            <option value="">거래처 선택</option>
                        </select>
                        <input type="text" id="recipient" name="recipient" placeholder="또는 수동 입력" required aria-label="수신">
                    </div>
                    <small class="recipient-hint">
                        드롭다운에서 선택하거나 직접 입력할 수 있습니다.
                    </small>
                </div>
                <div class="form-group">
                    <label for="invoice-date">일자 *</label>
                    <input type="date" id="invoice-date" name="invoice_date" required aria-label="일자">
                </div>
                <div class="form-group">
                    <label for="description">설명</label>
                    <input type="text" id="description" name="description" aria-label="설명">
                </div>
            </div>

            <!-- 항공 스케줄 선택 섹션 -->
            <div class="card">
                <div class="card-header">항공 스케줄</div>
                <div class="form-group">
                    <label for="flight-schedule">항공 스케줄 선택</label>
                    <select id="flight-schedule" name="flight_schedule_id" aria-label="항공 스케줄 선택">
                        <option value="">선택하세요</option>
                    </select>
                </div>
                <div id="flight-info" class="flight-info" style="display: none;">
                    <div class="info-row">
                        <span>항공사:</span>
                        <span id="flight-airline"></span>
                    </div>
                    <div class="info-row">
                        <span>항공편명:</span>
                        <span id="flight-number"></span>
                    </div>
                    <div class="info-row">
                        <span>출발:</span>
                        <span id="flight-departure"></span>
                    </div>
                    <div class="info-row">
                        <span>도착:</span>
                        <span id="flight-arrival"></span>
                    </div>
                </div>
            </div>

            <!-- 계산 모드 선택 -->
            <div class="card">
                <div class="card-header">계산 방식</div>
                <div class="calculation-mode-selector">
                    <label>
                        <input type="radio" name="calc-mode" value="simple" checked aria-label="간편 계산 (항목 × 수량)">
                        간편 계산 (항목 × 수량)
                    </label>
                    <label>
                        <input type="radio" name="calc-mode" value="advanced" aria-label="고급 계산 (계약금/잔금)">
                        고급 계산 (계약금/잔금)
                    </label>
                </div>
            </div>

            <!-- 간편 계산 모드 (기본) -->
            <div class="card" id="simple-mode-section">
                <div class="card-header">
                    항목 및 금액
                    <button type="button" id="add-item-btn" class="btn-add-item">+ 항목 추가</button>
                </div>
                <div id="items-container">
                    <!-- 동적으로 항목이 추가됨 -->
                </div>
                <div class="total-section">
                    <label>TOTAL</label>
                    <span id="total-amount" class="total-amount">₩ 0</span>
                </div>
            </div>

            <!-- 고급 계산 모드 -->
            <div id="advanced-mode-section" style="display: none;">

                <!-- 명칭 설정 -->
                <div class="card" style="padding: 12px 20px;">
                    <div style="display: flex; gap: 24px; align-items: center; flex-wrap: wrap;">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <label style="font-size: 13px; font-weight: 600; color: #374151; white-space: nowrap;">비용 명칭</label>
                            <select id="cost-label-select" style="padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px;">
                                <option value="여행경비">여행경비</option>
                                <option value="항공료">항공료</option>
                                <option value="패키지비용">패키지비용</option>
                                <option value="custom">직접입력</option>
                            </select>
                            <input type="text" id="cost-label-custom" placeholder="직접 입력" style="display:none; padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px; width: 120px;">
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <label style="font-size: 13px; font-weight: 600; color: #374151; white-space: nowrap;">입금 명칭</label>
                            <select id="deposit-label-select" style="padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px;">
                                <option value="계약금">계약금</option>
                                <option value="선입금">선입금</option>
                                <option value="입금액">입금액</option>
                                <option value="custom">직접입력</option>
                            </select>
                            <input type="text" id="deposit-label-custom" placeholder="직접 입력" style="display:none; padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px; width: 120px;">
                        </div>
                    </div>
                </div>

                <!-- 1. 인원 그룹 -->
                <div class="card">
                    <div class="card-header" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                        <span id="groups-card-title">인원 그룹별 여행경비</span>
                        <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
                            <select id="group-preset-select" style="padding:5px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:12px;color:#374151;max-width:160px">
                                <option value="">프리셋 불러오기...</option>
                            </select>
                            <button type="button" id="save-group-preset-btn" class="btn-add-item" style="font-size:12px;padding:5px 10px">💾 프리셋 저장</button>
                            <button type="button" id="add-group-btn" class="btn-add-item">+ 그룹 추가</button>
                        </div>
                    </div>
                    <div id="groups-container">
                        <!-- 동적으로 그룹이 추가됨 -->
                    </div>
                </div>

                <!-- 2. 추가 항목 (단가 × 인원) -->
                <div class="card">
                    <div class="card-header">
                        추가 항목
                        <button type="button" id="add-extra-item-btn" class="btn-add-item">+ 항목 추가</button>
                    </div>
                    <div id="extra-items-container">
                        <!-- 동적으로 추가됨 -->
                    </div>
                </div>

                <!-- 3. 비고 -->
                <div class="card">
                    <div class="card-header">비고</div>
                    <div class="form-group">
                        <input type="text" id="deposit-description" placeholder="예: 8명 계약금 입금, 2명 전액 입금 완료" aria-label="비고">
                    </div>
                </div>

                <!-- 4. 청구 요약 -->
                <div class="card balance-summary">
                    <div class="calculation-breakdown">
                        <h3 style="color: white; margin-bottom: 15px; text-align: center;">청구 요약</h3>
                        <div class="calc-row">
                            <span id="summary-cost-label">여행경비 소계:</span>
                            <span id="breakdown-airfare">₩ 0</span>
                        </div>
                        <div class="calc-row">
                            <span>추가 항목 소계:</span>
                            <span id="breakdown-extras">₩ 0</span>
                        </div>
                        <div class="calc-row" style="border-top: 1px solid rgba(255,255,255,0.4); padding-top: 10px; margin-top: 4px;">
                            <span style="font-weight: 700;">총 청구액:</span>
                            <span id="breakdown-total-charge" style="font-weight: 700; font-size: 17px;">₩ 0</span>
                        </div>
                        <div class="calc-row" style="margin-top: 8px;">
                            <span id="summary-deposit-label">총 계약금:</span>
                            <span id="breakdown-total-paid">₩ 0</span>
                        </div>
                        <div class="calc-row total-row">
                            <span>잔금:</span>
                            <span id="breakdown-balance" class="highlight">₩ 0</span>
                        </div>
                        <div id="balance-alert" style="display: none; margin-top: 15px; padding: 12px; background: #fee2e2; border-left: 4px solid #ef4444; border-radius: 4px; color: #7f1d1d; font-size: 13px; font-weight: 600;">
                        </div>
                    </div>
                </div>

            </div>

            <!-- 은행 정보 섹션 -->
            <div class="card">
                <div class="card-header">은행 정보</div>
                <div class="form-group">
                    <label for="bank-account">은행 계좌 선택</label>
                    <select id="bank-account" name="bank_account_id" aria-label="은행 계좌 선택">
                        <option value="">선택하세요</option>
                    </select>
                </div>
                <div id="bank-info" class="bank-info" style="display: none;">
                    <div class="info-row">
                        <span>은행명:</span>
                        <span id="bank-name"></span>
                    </div>
                    <div class="info-row">
                        <span>계좌번호:</span>
                        <span id="account-number"></span>
                    </div>
                    <div class="info-row">
                        <span>예금주:</span>
                        <span id="account-holder"></span>
                    </div>
                </div>
            </div>

            <!-- 액션 버튼 -->
            <div class="action-buttons">
                <button type="button" onclick="exportToCSV()" class="btn-secondary" title="CSV로 내보내기">📊 CSV 내보내기</button>
                <button type="button" id="preview-btn" class="btn-secondary">미리보기</button>
                <button type="button" id="generate-pdf-btn" class="btn-primary">PDF 생성</button>
                <button type="submit" class="btn-primary">저장</button>
            </div>
        </form>
    </div>

    <!-- Classic scripts (전역 함수 등록) -->
    <script src="/js/toast.js"></script>
    <script src="/js/fetch-utils.js"></script>
    <script src="/in/js/config.js"></script>
    <script src="/js/flight-sync-manager.js"></script>
    <!-- ES Modules -->
    <script type="module" src="/in/js/invoice-editor.js"></script>
    <script type="module" src="/in/js/invoice-templates.js"></script>
    <script type="module" src="/in/js/invoice-excel.js"></script>
</body>
</html>
