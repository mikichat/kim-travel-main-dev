<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인보이스 목록</title>
    <link rel="stylesheet" href="/in/css/invoice.css">
    <script src="/js/toast.js"></script>
    <script src="/js/fetch-utils.js"></script>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 30px;
        }

        h1 {
            margin: 0 0 30px 0;
            color: #333;
            font-size: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-new {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-new:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
        }

        .filter-group input, .filter-group select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .filter-group button {
            padding: 8px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        thead {
            background: #f8f9fa;
        }

        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
            font-size: 13px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            color: #555;
        }

        tbody tr {
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: #f8f9ff;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-simple {
            background: #e3f2fd;
            color: #1976d2;
        }

        .badge-advanced {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .amount {
            font-weight: 600;
            color: #2563EB;
            text-align: right;
        }

        .balance {
            font-weight: 700;
            color: #16a34a;
            text-align: right;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit, .btn-delete, .btn-view {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-edit {
            background: #3b82f6;
            color: white;
        }

        .btn-edit:hover {
            background: #2563eb;
        }

        .btn-view {
            background: #10b981;
            color: white;
        }

        .btn-view:hover {
            background: #059669;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty {
            text-align: center;
            padding: 60px;
            color: #999;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            align-items: center;
        }

        .pagination button {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        .pagination button:hover:not(:disabled) {
            background: #f0f0f0;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination .current {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .stat-item {
            flex: 1;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>인보이스 목록</span>
            <button type="button" class="btn-new" onclick="createNew()">+ 새 인보이스</button>
        </h1>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">전체 인보이스</div>
                <div class="stat-value" id="total-count">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">간편 계산</div>
                <div class="stat-value" id="simple-count">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">고급 계산</div>
                <div class="stat-value" id="advanced-count">0</div>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label>수신자</label>
                <input type="text" id="filter-recipient" placeholder="수신자 검색">
            </div>
            <div class="filter-group">
                <label>시작일</label>
                <input type="date" id="filter-date-from">
            </div>
            <div class="filter-group">
                <label>종료일</label>
                <input type="date" id="filter-date-to">
            </div>
            <div class="filter-group">
                <label>계산 모드</label>
                <select id="filter-mode">
                    <option value="">전체</option>
                    <option value="simple">간편 계산</option>
                    <option value="advanced">고급 계산</option>
                </select>
            </div>
            <div class="filter-group" style="justify-content: flex-end;">
                <label>&nbsp;</label>
                <button type="button" onclick="applyFilters()">검색</button>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            데이터를 불러오는 중...
        </div>

        <div id="empty" class="empty" style="display: none;">
            인보이스가 없습니다.
        </div>

        <table id="invoice-table" style="display: none;">
            <thead>
                <tr>
                    <th>번호</th>
                    <th>계산 모드</th>
                    <th>수신자</th>
                    <th>일자</th>
                    <th>내역</th>
                    <th>금액</th>
                    <th>작업</th>
                </tr>
            </thead>
            <tbody id="invoice-tbody">
            </tbody>
        </table>

        <div class="pagination" id="pagination">
            <button type="button" onclick="goToPage(currentPage - 1)" id="prev-btn">이전</button>
            <span id="page-info">1 / 1</span>
            <button type="button" onclick="goToPage(currentPage + 1)" id="next-btn">다음</button>
        </div>
    </div>

    <!-- 설정 파일 로드 -->
    <script src="/in/js/config.js"></script>
    <script>
        function escapeHtml(s) {
            if (s == null) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
        }

        // API_BASE_URL은 config.js에서 가져옴
        const API_BASE_URL = (typeof CONFIG !== 'undefined' && CONFIG.API_BASE_URL)
            ? CONFIG.API_BASE_URL
            : '/api';
        let currentPage = 1;
        let totalPages = 1;
        let invoices = [];

        // 페이지 로드 시 목록 가져오기
        document.addEventListener('DOMContentLoaded', () => {
            loadInvoices();
        });

        // 인보이스 목록 로드
        async function loadInvoices(page = 1) {
            const loading = document.getElementById('loading');
            const empty = document.getElementById('empty');
            const table = document.getElementById('invoice-table');

            loading.style.display = 'block';
            empty.style.display = 'none';
            table.style.display = 'none';

            try {
                const params = new URLSearchParams({
                    page: page,
                    limit: 20
                });

                // 필터 추가
                const recipient = document.getElementById('filter-recipient').value;
                const dateFrom = document.getElementById('filter-date-from').value;
                const dateTo = document.getElementById('filter-date-to').value;
                const mode = document.getElementById('filter-mode').value;

                if (recipient) params.append('recipient', recipient);
                if (dateFrom) params.append('invoice_date_from', dateFrom);
                if (dateTo) params.append('invoice_date_to', dateTo);

                const data = await fetchJSON(`${API_BASE_URL}/invoices?${params}`);

                invoices = data.data || [];
                currentPage = data.page || 1;
                totalPages = Math.ceil(data.total / data.limit) || 1;

                // 모드 필터링 (클라이언트 측)
                if (mode) {
                    invoices = invoices.filter(inv => inv.calculation_mode === mode);
                }

                loading.style.display = 'none';

                if (invoices.length === 0) {
                    empty.style.display = 'block';
                } else {
                    table.style.display = 'table';
                    renderTable();
                }

                updateStats(data.total);
                updatePagination();

            } catch (error) {
                console.error('목록 로드 오류:', error);
                loading.style.display = 'none';
                showToast('목록을 불러오는 중 오류가 발생했습니다.', 'error');
            }
        }

        // 테이블 렌더링
        function renderTable() {
            const tbody = document.getElementById('invoice-tbody');
            tbody.innerHTML = '';

            invoices.forEach((invoice, index) => {
                const row = document.createElement('tr');
                const isAdvanced = invoice.calculation_mode === 'advanced';

                // 금액 표시 생성
                let amountDisplay = '';
                
                if (isAdvanced) {
                    // Advanced Mode: 잔금 라인에 수식 표시
                    const deposit = invoice.deposit_amount || 0;
                    const balance = invoice.balance_due || 0;
                    
                    // 추가비용 항목 이름 가져오기
                    let parsedItems = null;
                    if (invoice.additional_items) {
                        if (typeof invoice.additional_items === 'string') {
                            try { parsedItems = JSON.parse(invoice.additional_items); } catch(e) { parsedItems = null; }
                        } else {
                            parsedItems = invoice.additional_items;
                        }
                    }

                    // 새 그룹 형식 vs 구 배열 형식
                    let itemsArray = [];
                    if (parsedItems && !Array.isArray(parsedItems) && parsedItems.groups) {
                        // 새 형식: extras에서 항목명 추출
                        itemsArray = (parsedItems.extras || []);
                    } else if (Array.isArray(parsedItems)) {
                        itemsArray = parsedItems;
                    }

                    const costLabel = (parsedItems && parsedItems.cost_label) || '여행경비';

                    // 수식 구성
                    let formulaParts = [costLabel];
                    itemsArray.forEach(item => {
                        if (item.name) {
                            formulaParts.push(item.type === 'add' ? `+ ${item.name}` : `- ${item.name}`);
                        }
                    });
                    if (deposit > 0) {
                        formulaParts.push('- 계약금');
                    }
                    
                    amountDisplay = `
                        <div style="font-size:12px; line-height:1.6;">
                            <span style="font-weight:700; color:#16a34a;">잔금:</span>
                            <span style="color:#666; font-size:11px;">(${formulaParts.join(' ')})</span>
                            <div style="font-weight:700; color:#16a34a; font-size:14px; margin-top:4px;">
                                ${formatCurrency(balance)}
                            </div>
                        </div>
                    `;
                } else {
                    // Simple Mode: 총액만 표시
                    amountDisplay = `
                        <div class="amount" style="font-weight:600; color:#2563EB;">
                            ${formatCurrency(invoice.total_amount)}
                        </div>
                    `;
                }

                row.innerHTML = `
                    <td>${escapeHtml(invoice.invoice_number || '-')}</td>
                    <td>
                        <span class="badge ${isAdvanced ? 'badge-advanced' : 'badge-simple'}">
                            ${isAdvanced ? '고급' : '간편'}
                        </span>
                    </td>
                    <td>${escapeHtml(invoice.recipient || '-')}</td>
                    <td>${escapeHtml(invoice.invoice_date || '-')}</td>
                    <td>${escapeHtml(invoice.description || '-')}</td>
                    <td>${amountDisplay}</td>
                    <td>
                        <div class="actions">
                            <button type="button" class="btn-view" onclick="viewInvoice('${invoice.id}')">미리보기</button>
                            <button type="button" class="btn-view" onclick="window.open('/api/invoices/${invoice.id}/pdf','_blank')" style="background:#2563eb">미리보기</button>
                            <button type="button" class="btn-view" onclick="window.open('/api/invoices/${invoice.id}/pdf?download=true')" style="background:#dc2626">PDF</button>
                            <button type="button" class="btn-edit" onclick="editInvoice('${invoice.id}')">편집</button>
                            <button type="button" class="btn-delete" onclick="deleteInvoice('${invoice.id}')">삭제</button>
                        </div>
                    </td>
                `;

                tbody.appendChild(row);
            });
        }

        // 통계 업데이트
        function updateStats(total) {
            const simpleCount = invoices.filter(inv => inv.calculation_mode === 'simple').length;
            const advancedCount = invoices.filter(inv => inv.calculation_mode === 'advanced').length;

            document.getElementById('total-count').textContent = total || 0;
            document.getElementById('simple-count').textContent = simpleCount;
            document.getElementById('advanced-count').textContent = advancedCount;
        }

        // 페이지네이션 업데이트
        function updatePagination() {
            document.getElementById('page-info').textContent = `${currentPage} / ${totalPages}`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage === totalPages;
        }

        // 페이지 이동
        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            loadInvoices(page);
        }

        // 필터 적용
        function applyFilters() {
            loadInvoices(1);
        }

        // 새 인보이스 생성
        function createNew() {
            window.location.href = '/invoice';
        }

        // 인보이스 편집
        function editInvoice(id) {
            window.location.href = `/invoice?id=${id}`;
        }

        // 인보이스 미리보기
        async function viewInvoice(id) {
            try {
                const invoice = await fetchJSON(`${API_BASE_URL}/invoices/${id}`);

                // 미리보기 데이터 준비
                const previewData = preparePreviewData(invoice);

                // sessionStorage에 저장
                const previewId = 'invoice-preview-' + Date.now();
                sessionStorage.setItem(previewId, JSON.stringify(previewData));

                // 미리보기 창 열기
                window.open(`/invoice/preview?previewId=${previewId}`, '_blank', 'width=900,height=900');

            } catch (error) {
                console.error('미리보기 오류:', error);
                showToast('미리보기를 여는 중 오류가 발생했습니다.', 'error');
            }
        }

        // 미리보기 데이터 준비
        function preparePreviewData(invoice) {
            const data = {
                recipient: invoice.recipient,
                invoice_date: invoice.invoice_date,
                description: invoice.description,
                calculation_mode: invoice.calculation_mode,
                items: []
            };

            if (invoice.calculation_mode === 'advanced') {
                data.advanced_calculation = {
                    base_price_per_person: invoice.base_price_per_person,
                    total_participants: invoice.total_participants,
                    total_travel_cost: invoice.total_travel_cost,
                    deposit_amount: invoice.deposit_amount,
                    deposit_description: invoice.deposit_description,
                    additional_items: invoice.additional_items || [],
                    balance_due: invoice.balance_due
                };
            } else {
                // Simple Mode
                if (invoice.airfare_unit_price > 0) {
                    data.items.push({
                        name: '항공료',
                        unit_price: invoice.airfare_unit_price,
                        quantity: invoice.airfare_quantity,
                        total: invoice.airfare_total
                    });
                }
                if (invoice.seat_preference_unit_price > 0) {
                    data.items.push({
                        name: '좌석 선호',
                        unit_price: invoice.seat_preference_unit_price,
                        quantity: invoice.seat_preference_quantity,
                        total: invoice.seat_preference_total
                    });
                }
            }

            // 항공 스케줄 정보
            if (invoice.flight_schedule) {
                data.flight_schedule = invoice.flight_schedule;
            }

            // 은행 계좌 정보
            if (invoice.bank_account) {
                data.bank_account = invoice.bank_account;
            }

            return data;
        }

        // 인보이스 삭제
        async function deleteInvoice(id) {
            if (!await showConfirmModal('인보이스 삭제', '정말 삭제하시겠습니까?', { danger: true })) return;

            try {
                await fetchJSON(`${API_BASE_URL}/invoices/${id}`, { method: 'DELETE' });
                showToast('삭제되었습니다.', 'success');
                loadInvoices(currentPage);
            } catch (error) {
                console.error('삭제 오류:', error);
                showToast('삭제 중 오류가 발생했습니다.', 'error');
            }
        }

        // 통화 포맷
        function formatCurrency(amount) {
            if (!amount && amount !== 0) return '-';
            return new Intl.NumberFormat('ko-KR', {
                style: 'currency',
                currency: 'KRW'
            }).format(amount);
        }
    </script>
</body>
</html>
