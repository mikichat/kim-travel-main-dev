<!-- 사이드바 토글 버튼 (모바일용) -->
<button type="button" id="sidebarToggle" class="sidebar-toggle">
    <i class="fas fa-bars"></i>
</button>

<style>
    /* 사이드바 스타일 */
    .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: 230px;
        height: 100vh;
        background: linear-gradient(180deg, #1e3a5f 0%, #152840 100%);
        color: #ffffff;
        overflow-y: auto;
        z-index: 1000;
        transition: transform 0.3s ease;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.3);
    }

    .sidebar::-webkit-scrollbar {
        width: 6px;
    }

    .sidebar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
    }

    .sidebar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 3px;
    }

    .sidebar-header {
        padding: 1.5rem 1rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .sidebar-header i {
        font-size: 1.5rem;
        color: #60a5fa;
    }

    .sidebar-header h2 {
        font-size: 1.1rem;
        font-weight: 700;
        margin: 0;
    }

    .sidebar-nav {
        padding: 0.5rem 0;
    }

    .sidebar-menu {
        list-style: none;
        margin: 0;
        padding: 0;
    }

    .menu-item {
        position: relative;
    }

    .menu-link {
        display: flex;
        align-items: center;
        padding: 0.875rem 1.25rem;
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        transition: all 0.2s ease;
        gap: 0.75rem;
        font-size: 0.9rem;
        cursor: pointer;
    }

    .menu-link i:first-child {
        width: 20px;
        text-align: center;
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.6);
    }

    .menu-link span {
        flex: 1;
    }

    .submenu-arrow {
        font-size: 0.7rem;
        transition: transform 0.3s ease;
        color: rgba(255, 255, 255, 0.5);
    }

    .menu-link:hover {
        background: rgba(96, 165, 250, 0.15);
        color: #ffffff;
    }

    .menu-link:hover i {
        color: #60a5fa;
    }

    .menu-item.active > .menu-link {
        background: rgba(96, 165, 250, 0.2);
        color: #ffffff;
        border-left: 3px solid #60a5fa;
    }

    .menu-item.active > .menu-link i {
        color: #60a5fa;
    }

    /* 서브메뉴 */
    .submenu {
        list-style: none;
        margin: 0;
        padding: 0;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
        background: rgba(0, 0, 0, 0.2);
    }

    .submenu.show {
        max-height: 500px;
    }

    .submenu-item {
        position: relative;
    }

    .submenu-link {
        display: flex;
        align-items: center;
        padding: 0.75rem 1.25rem 0.75rem 3rem;
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        transition: all 0.2s ease;
        gap: 0.75rem;
        font-size: 0.85rem;
    }

    .submenu-link i {
        width: 16px;
        text-align: center;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.5);
    }

    .submenu-link:hover {
        background: rgba(96, 165, 250, 0.15);
        color: #ffffff;
    }

    .submenu-link:hover i {
        color: #60a5fa;
    }

    .submenu-item.active .submenu-link {
        background: rgba(96, 165, 250, 0.25);
        color: #60a5fa;
        border-left: 2px solid #60a5fa;
    }

    /* 사이드바 토글 버튼 */
    .sidebar-toggle {
        position: fixed;
        left: 240px;
        top: 1rem;
        width: 40px;
        height: 40px;
        background: #1e3a5f;
        color: white;
        border: none;
        border-radius: 0.5rem;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 999;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
    }

    .sidebar-toggle:hover {
        background: #2c5282;
    }

    /* 사이드바가 숨겨질 때 */
    .sidebar.hidden {
        transform: translateX(-100%);
    }

    .sidebar.hidden ~ .sidebar-toggle {
        left: 1rem;
    }

    /* 메인 컨텐츠 영역에 여백 추가 */
    body.has-sidebar {
        margin-left: 230px;
    }

    /* 모바일 반응형 */
    @media (max-width: 768px) {
        .sidebar {
            transform: translateX(-100%);
        }

        .sidebar.show {
            transform: translateX(0);
        }

        .sidebar-toggle {
            display: flex;
            left: 1rem;
        }

        body.has-sidebar {
            margin-left: 0;
        }
    }
</style>

<script>
    // 서브메뉴 토글
    function toggleSubmenu(event, element) {
        event.preventDefault();
        const menuItem = element.closest('.menu-item');
        const submenu = menuItem.querySelector('.submenu');
        const arrow = element.querySelector('.submenu-arrow');

        if (submenu) {
            submenu.classList.toggle('show');
            if (submenu.classList.contains('show')) {
                arrow.classList.remove('fa-chevron-down');
                arrow.classList.add('fa-chevron-up');
            } else {
                arrow.classList.remove('fa-chevron-up');
                arrow.classList.add('fa-chevron-down');
            }
        }
    }

    // 사이드바 토글 (모바일)
    document.addEventListener('DOMContentLoaded', function() {
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');

        if (sidebarToggle && sidebar) {
            sidebarToggle.addEventListener('click', function() {
                sidebar.classList.toggle('show');
            });

            // 사이드바 외부 클릭 시 닫기 (모바일)
            document.addEventListener('click', function(e) {
                if (window.innerWidth <= 768) {
                    if (!sidebar.contains(e.target) && !sidebarToggle.contains(e.target)) {
                        sidebar.classList.remove('show');
                    }
                }
            });
        }

        // 현재 페이지에 따라 active 클래스 추가
        const currentPath = window.location.pathname;
        const submenuLinks = document.querySelectorAll('.submenu-link');

        submenuLinks.forEach(link => {
            if (link.getAttribute('href') && currentPath.includes(link.getAttribute('href').replace(/^\//, ''))) {
                link.closest('.submenu-item').classList.add('active');
            }
        });
    });
</script>
