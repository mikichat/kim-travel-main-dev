<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}여행 문서{% endblock %}</title>
    <style>
        @page {
            size: A4;
            margin: 2cm;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            font-size: 11pt;
            line-height: 1.6;
            color: #333;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #2563EB;
        }

        .header h1 {
            font-size: 24pt;
            color: #2563EB;
            margin: 10px 0;
        }

        .header p {
            font-size: 10pt;
            color: #666;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 14pt;
            font-weight: bold;
            color: #2563EB;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        table th,
        table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        table th {
            background-color: #f3f4f6;
            font-weight: bold;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-item {
            display: flex;
            padding: 5px 0;
        }

        .info-label {
            font-weight: bold;
            width: 120px;
            color: #555;
        }

        .info-value {
            flex: 1;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            text-align: center;
            font-size: 9pt;
            color: #999;
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="header">
        <h1>{% block document_title %}여행 문서{% endblock %}</h1>
        <p>생성일: {{ generated_date|format_date }}</p>
    </div>

    {% block content %}{% endblock %}

    <div class="footer">
        <p>본 문서는 {{ group.name }} 단체를 위해 생성되었습니다.</p>
        <p><strong>여행세상</strong> | 문서 버전: v{{ version }}</p>
    </div>
</body>
</html>
