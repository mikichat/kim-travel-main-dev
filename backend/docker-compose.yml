version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travel-backend
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_PATH=./data/travel.db
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:4005}
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
      - backend-backups:/app/backups
      - backend-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:5000/api-docs/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  backend-data:
  backend-uploads:
  backend-backups:
  backend-logs:
