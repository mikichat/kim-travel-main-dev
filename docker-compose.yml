version: "3.9"

# SQLite 사용으로 DB 컨테이너 불필요 - 파일 기반으로 동작
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - ./server/prisma:/app/prisma
    restart: unless-stopped
    networks:
      - tourworld-network

networks:
  tourworld-network:
    driver: bridge
    name: tourworld-network
