name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'tourworld1/**'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'tourworld1/**'
      - '*.md'

jobs:
  format-check:
    name: Prettier Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Prettier
        run: npm install --no-save prettier@3.8.1

      - name: Check formatting
        run: npx prettier --check "js/**/*.js" "__tests__/**/*.js"

  frontend-lint:
    name: Frontend ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ESLint
        run: npm install --no-save eslint@9 @eslint/js globals eslint-config-prettier

      - name: Run ESLint (errors only)
        run: npx eslint "js/**/*.js" "air1/js/**/*.js" "hanatour/js/**/*.js" "in/js/**/*.js" "quote-editor-v1/js/**/*.js" --max-warnings 200

  backend-lint:
    name: Backend ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx jest --coverage --verbose

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Jest
        run: npm install --no-save jest@30.2.0

      - name: Run tests with coverage
        run: npx jest --config jest.config.cjs --coverage --verbose

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install Playwright
        run: npm install --no-save @playwright/test

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Run E2E tests
        run: npx playwright test --config playwright.config.cjs
        env:
          SESSION_SECRET: ci-test-secret
          DATABASE_PATH: ./backend/test-e2e.db

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t travel-backend-ci ./backend
