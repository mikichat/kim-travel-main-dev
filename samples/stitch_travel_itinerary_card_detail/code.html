<!DOCTYPE html>
<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Updated Itinerary Card Layout</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Sans+KR:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --primary-accent: #007AFF;--status-green: #34C759;
            --ios-bg: #F2F2F7;
        }
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
            font-size: 20px;
        }
        .btn-active:active {
            transform: scale(0.97);
            opacity: 0.8;
        }
    </style>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        accent: "#007AFF",
                        "card-bg": "#ffffff",
                        "card-bg-dark": "#1c1c1e",
                        "ios-gray": "#f2f2f7",
                        "ios-gray-dark": "#2c2c2e"
                    }
                }
            }
        };
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#f2f2f7] dark:bg-black min-h-screen flex flex-col items-center justify-center p-4">
<div class="w-full max-w-[375px] mx-auto">
<div class="bg-card-bg dark:bg-card-bg-dark rounded-[28px] shadow-sm border border-gray-200/50 dark:border-white/10 overflow-hidden">
<div class="p-6 pb-4">
<div class="flex justify-between items-start mb-3">
<h1 class="text-[22px] font-bold text-slate-900 dark:text-white tracking-tight">기쁨의메아리</h1>
<span class="bg-emerald-100 dark:bg-emerald-500/20 text-emerald-600 dark:text-emerald-400 px-2.5 py-0.5 rounded-full text-[12px] font-bold">
                        진행
                    </span>
</div>
<div class="space-y-1.5">
<div class="flex items-center gap-1.5 text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined text-[18px]">location_on</span>
<span class="text-[14px] font-medium">베트남 나트랑</span>
</div>
<div class="flex items-center gap-1.5 text-slate-400 dark:text-slate-500">
<span class="material-symbols-outlined text-[18px]">calendar_today</span>
<span class="text-[14px] font-medium tracking-tight">2026.02.19 — 2026.02.24</span>
</div>
</div>
</div>
<div class="px-6 py-2 grid grid-cols-2 gap-3">
<div class="bg-slate-50 dark:bg-white/5 p-4 rounded-2xl border border-slate-100 dark:border-white/5">
<p class="text-[12px] text-slate-500 dark:text-slate-400 font-medium mb-1">여행 기간</p>
<p class="text-lg font-bold text-slate-900 dark:text-white">6일</p>
</div>
<div class="bg-slate-50 dark:bg-white/5 p-4 rounded-2xl border border-slate-100 dark:border-white/5">
<p class="text-[12px] text-slate-500 dark:text-slate-400 font-medium mb-1">총 가격</p>
<p class="text-lg font-bold text-slate-900 dark:text-white">0원</p>
</div>
</div>
<div class="px-6 py-4 flex flex-wrap gap-2">
<div class="flex items-center gap-1.5 bg-indigo-50 dark:bg-indigo-500/10 px-3 py-1.5 rounded-full">
<span class="material-symbols-outlined text-[16px] text-indigo-600 dark:text-indigo-400">person</span>
<span class="text-[12px] font-semibold text-indigo-600 dark:text-indigo-400">조서연</span>
</div>
<div class="flex items-center gap-1.5 bg-amber-50 dark:bg-amber-500/10 px-3 py-1.5 rounded-full">
<span class="material-symbols-outlined text-[16px] text-amber-600 dark:text-amber-400">apartment</span>
<span class="text-[12px] font-semibold text-amber-600 dark:text-amber-400">빈펄 리조트</span>
</div>
<div class="flex items-center gap-1.5 bg-teal-50 dark:bg-teal-500/10 px-3 py-1.5 rounded-full">
<span class="material-symbols-outlined text-[16px] text-teal-600 dark:text-teal-400">directions_bus</span>
<span class="text-[12px] font-semibold text-teal-600 dark:text-teal-400">29인승</span>
</div>
</div>
<div class="p-6 pt-2 space-y-3">
<button class="w-full bg-accent text-white font-bold py-4 rounded-[18px] flex items-center justify-center gap-2 transition-all btn-active shadow-sm">
<span class="material-symbols-outlined !text-[20px]">assignment_turned_in</span>
                    확정서
                </button>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center gap-1 py-3 bg-slate-100 dark:bg-white/10 rounded-[18px] text-slate-700 dark:text-slate-200 transition-all btn-active">
<span class="material-symbols-outlined text-[20px]">visibility</span>
<span class="text-[11px] font-bold">미리보기</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 py-3 bg-slate-100 dark:bg-white/10 rounded-[18px] text-slate-700 dark:text-slate-200 transition-all btn-active">
<span class="material-symbols-outlined text-[20px]">edit</span>
<span class="text-[11px] font-bold">편집</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 py-3 bg-rose-50 dark:bg-rose-500/10 rounded-[18px] text-rose-600 dark:text-rose-400 transition-all btn-active">
<span class="material-symbols-outlined text-[20px]">delete</span>
<span class="text-[11px] font-bold">삭제</span>
</button>
</div>
</div>
</div>
<div class="mt-8 flex justify-center">
<button class="px-5 py-2 bg-white dark:bg-ios-gray-dark rounded-full text-[12px] font-semibold text-slate-500 dark:text-slate-400 shadow-sm border border-slate-200 dark:border-white/5 active:bg-gray-50 transition-colors" onclick="document.documentElement.classList.toggle('dark')">
                다크모드 전환
            </button>
</div>
</div>

</body></html>
