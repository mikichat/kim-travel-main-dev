<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단체명단 관리 DB</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="/js/toast.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a5490;
            --primary-dark: #0d3a6b;
            --accent: #ff6b35;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --border-radius: 12px;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            min-height: 100vh;
            padding: 20px;
            color: #2c3e50;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: var(--bg-gradient);
            padding: 32px;
            border-radius: var(--border-radius);
            margin-bottom: 24px;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            gap: 20px;
            color: white;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 16px;
            opacity: 0.95;
        }

        .sidebar {
            background: white;
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: var(--card-shadow);
            margin-bottom: 24px;
        }

        .sidebar h3 {
            font-size: 20px;

            color: var(--primary);

        }

        .archive-tabs {
            display: flex;
            margin-bottom: 16px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--primary);
        }

        .archive-tab {

            padding: 10px 12px;

            font-size: 13px;
            font-weight: 600;
            cursor: pointer;

            background: white;

        }

        .archive-tab:first-child {

        .archive-tab.active {
            background: var(--primary);
            color: white;
        }

        .archive-tab:hover:not(.active) {

        }

        .archive-badge {
            display: inline-block;
            background: rgba(255,255,255,0.3);
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 12px;

        }

        .archive-tab.active .archive-badge {
            background: rgba(255,255,255,0.3);
        }

        .archive-tab:not(.active) .archive-badge {

        }

        .readonly-banner {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);

            border-radius: 8px;
            margin-bottom: 16px;

        .btn-archive {

            font-size: 12px;

        .btn-archive:hover {

        }

        .btn-icon {

            font-size: 12px;

        .btn {

            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;

            align-items: center;

        .btn:hover {

            transform: translateY(0);

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-accent {
            background: var(--accent);

        }

        .btn-warning {

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;

        }

        .input-group {
            display: flex;

            flex: 1;

        }

            border-color: var(--primary);
        }

        .search-box {
            position: relative;

        }

        .search-box input {
            width: 100%;

            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 84, 144, 0.1);

        .search-box::after {

            transform: translateY(-50%);

        .search-result-info {
            padding: 12px;
            background: #e3f2fd;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            color: var(--primary);
            font-weight: 600;
        }

        .main-content {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
        }

        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .content-area {
            min-height: 400px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-card h4 {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }

        .table-wrapper {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        .table-container {
            overflow-x: auto;
            overflow-y: auto;
            max-height: 65vh;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        th {
            padding: 16px 12px;
            text-align: left;
            font-weight: 600;
            color: white;
            border-bottom: 3px solid rgba(255, 255, 255, 0.3);
            white-space: nowrap;
            text-transform: uppercase;
            font-size: 13px;

        td {
            padding: 14px 12px;

        }

        tbody tr {
            transition: all 0.3s ease;
        }

        tbody tr:hover {

            transform: scale(1.01);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        tbody tr:nth-child(even) {

        }

        tbody tr:nth-child(even):hover {
            background: #f8f9ff;

        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Noto Sans KR', sans-serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 84, 144, 0.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);

            justify-content: center;
            animation: fadeIn 0.3s ease;

        .modal.show {

        .modal-body {

        .modal-footer {

        .form-group {

        }

        .form-group label {
            display: block;
            margin-bottom: 8px;

            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;

        }

        .empty-state {

            padding: 80px 20px;

        }

        .empty-state h3 {

            margin-bottom: 12px;

        }

        .export-modal-content {
            background: white;
            padding: 32px;
            border-radius: var(--border-radius);
            max-width: 800px;
            width: 90%;

            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        .field-selector {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));

        .field-checkbox {

        .field-checkbox:hover {

        }

        .field-checkbox.selected {

        }

        .field-checkbox input[type="checkbox"] {

        .field-checkbox label {

        .preview-section {

        .preview-table {

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ── P4-T2: 서버 API 헬퍼 (localStorage 폴백 포함) ──────────────────────
        const ROSTER_API = '/api/group-rosters';

        async function loadRostersFromServer() {
            try {
                const res = await fetch(ROSTER_API, { credentials: 'include' });
                if (!res.ok) throw new Error('서버 오류');
                const rows = await res.json();
                // rows: [{ id, name, data }] — data가 배열 전체
                if (rows.length > 0) {
                    const item = rows.find(r => r.id === 'main-roster') || rows[0];
                    return Array.isArray(item.data) ? item.data : [];
                }
                return [];
            } catch (e) {
                console.warn('서버 로드 실패, localStorage 폴백:', e);
                const local = localStorage.getItem('group-roster-data');
                return local ? JSON.parse(local) : [];
            }
        }

        async function saveRostersToServer(groups) {
            try {
                await fetch(ROSTER_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ id: 'main-roster', name: '단체명단', data: groups })
                });
            } catch (e) {
                console.warn('서버 저장 실패, localStorage 폴백:', e);
                localStorage.setItem('group-roster-data', JSON.stringify(groups));
            }
        }

        async function migrateRosterToServer() {
            const local = localStorage.getItem('group-roster-data');
            if (!local) return { migrated: 0 };
            const groups = JSON.parse(local);
            await fetch(ROSTER_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ id: 'main-roster', name: '단체명단', data: groups })
            });
            localStorage.removeItem('group-roster-data');
            return { migrated: groups.length };
        }
        // ────────────────────────────────────────────────────────────────────────

        // 달력 컴포넌트
        function Calendar({ groups }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth());
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());

            // 달력 날짜 생성
            const getDaysInMonth = (year, month) => {
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const daysInMonth = lastDay.getDate();
                const startDayOfWeek = firstDay.getDay();

                const days = [];

                // 이전 달의 빈 칸
                for (let i = 0; i < startDayOfWeek; i++) {
                    days.push(null);
                }

                // 현재 달의 날짜
                for (let day = 1; day <= daysInMonth; day++) {
                    days.push(day);
                }

                return days;
            };

            // 특정 날짜에 출발하는 단체 찾기
            const getGroupsForDate = (day) => {
                if (!day) return [];
                const dateStr = `${selectedYear}-${String(selectedMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                return groups.filter(group => group.departureDate === dateStr || group.returnDate === dateStr);
            };

            const days = getDaysInMonth(selectedYear, selectedMonth);
            const monthNames = ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'];
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];

            const prevMonth = () => {
                if (selectedMonth === 0) {
                    setSelectedMonth(11);
                    setSelectedYear(selectedYear - 1);
                } else {
                    setSelectedMonth(selectedMonth - 1);
                }
            };

            const nextMonth = () => {
                if (selectedMonth === 11) {
                    setSelectedMonth(0);
                    setSelectedYear(selectedYear + 1);
                } else {
                    setSelectedMonth(selectedMonth + 1);
                }
            };

            return (
                <div className="calendar-wrapper" style={{
                    background: 'white',
                    padding: '20px',
                    borderRadius: '12px',
                    marginBottom: '20px',
                    boxShadow: '0 2px 8px rgba(0,0,0,0.1)'
                }}>
                    <div className="calendar-header" style={{
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        marginBottom: '20px'
                    }}>
                        <button type="button" className="btn" onClick={prevMonth} style={{ fontSize: '18px' }}>◀</button>
                        <h2 style={{ margin: 0 }}>{selectedYear}년 {monthNames[selectedMonth]}</h2>
                        <button type="button" className="btn" onClick={nextMonth} style={{ fontSize: '18px' }}>▶</button>
                    </div>
                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: 'repeat(7, 1fr)',
                        gap: '4px'
                    }}>
                        {dayNames.map((dayName, idx) => (
                            <div key={idx} style={{
                                textAlign: 'center',
                                fontWeight: 'bold',
                                padding: '10px',
                                color: idx === 0 ? '#f44336' : idx === 6 ? '#2196F3' : '#666'
                            }}>
                                {dayName}
                            </div>
                        ))}
                        {days.map((day, idx) => {
                            const groupsForDay = day ? getGroupsForDate(day) : [];
                            const isToday = day && selectedYear === new Date().getFullYear() &&
                                          selectedMonth === new Date().getMonth() &&
                                          day === new Date().getDate();

                            return (
                                <div key={idx} style={{
                                    minHeight: '80px',
                                    padding: '8px',
                                    border: '1px solid #e0e0e0',
                                    borderRadius: '4px',
                                    background: day ? (isToday ? '#e3f2fd' : 'white') : '#f5f5f5',
                                    position: 'relative'
                                }}>
                                    {day && (
                                        <>
                                            <div style={{
                                                fontWeight: isToday ? 'bold' : 'normal',
                                                color: idx % 7 === 0 ? '#f44336' : idx % 7 === 6 ? '#2196F3' : '#333',
                                                marginBottom: '4px'
                                            }}>
                                                {day}
                                            </div>
                                            {groupsForDay.map((group, gIdx) => (
                                                <div key={gIdx} style={{
                                                    fontSize: '10px',
                                                    background: group.departureDate === `${selectedYear}-${String(selectedMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}` ? '#4CAF50' : '#FF9800',
                                                    color: 'white',
                                                    padding: '2px 4px',
                                                    borderRadius: '3px',
                                                    marginBottom: '2px',
                                                    whiteSpace: 'nowrap',
                                                    overflow: 'hidden',
                                                    textOverflow: 'ellipsis'
                                                }} title={`${group.name} - ${group.destination || ''}`}>
                                                    {group.departureDate === `${selectedYear}-${String(selectedMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}` ? '🛫' : '🛬'} {group.name}

            // 여권 스캔
            const [showPassportScanModal, setShowPassportScanModal] = useState(false);
            const [passportScanResults, setPassportScanResults] = useState(null);
            const [passportScanProgress, setPassportScanProgress] = useState({ current: 0, total: 0, scanning: false });

            // ==================== 날짜 및 ID NO 생성 함수 (맨 앞에 정의) ====================

            // 날짜 포맷 함수
            // dateType: 'birth' (생년월일, 기본값) 또는 'passport' (여권 만료일)
            const formatDate = (dateValue, dateType = 'birth') => {
                if (!dateValue) return '';

                if (typeof dateValue === 'string') {
                    // 이미 YYYY-MM-DD 형식인 경우
                    if (/^\d{4}-\d{2}-\d{2}/.test(dateValue)) {
                        return dateValue.split(' ')[0].split('T')[0];
                    }

                    // 한국어 날짜 형식 파싱 (예: "1985년 03월 15일", "1985년3월15일", "1985.03.15" 등)
                    const koreanDateMatch = dateValue.match(/(\d{4})\s*년?\s*(\d{1,2})\s*월?\s*(\d{1,2})/);
                    if (koreanDateMatch) {
                        const year = koreanDateMatch[1];
                        const month = String(koreanDateMatch[2]).padStart(2, '0');
                        const day = String(koreanDateMatch[3]).padStart(2, '0');
                        return `${year}-${month}-${day}`;
                    }

                    // 점(.) 구분자 형식 파싱 (예: "1985.03.15")
                    const dotDateMatch = dateValue.match(/(\d{4})\.(\d{1,2})\.(\d{1,2})/);
                    if (dotDateMatch) {
                        const year = dotDateMatch[1];
                        const month = String(dotDateMatch[2]).padStart(2, '0');
                        const day = String(dotDateMatch[3]).padStart(2, '0');
                        return `${year}-${month}-${day}`;
                    }

                    // 슬래시(/) 구분자 형식 파싱 (예: "1985/03/15")
                    const slashDateMatch = dateValue.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);
                    if (slashDateMatch) {
                        const year = slashDateMatch[1];
                        const month = String(slashDateMatch[2]).padStart(2, '0');
                        const day = String(slashDateMatch[3]).padStart(2, '0');
                        return `${year}-${month}-${day}`;
                    }

                    // 8자리 숫자 형식 (예: "19850315")
                    const numericDateMatch = dateValue.match(/^(\d{4})(\d{2})(\d{2})$/);
                    if (numericDateMatch) {
                        const year = numericDateMatch[1];
                        const month = numericDateMatch[2];
                        const day = numericDateMatch[3];
                        return `${year}-${month}-${day}`;
                    }

                    // 6자리 숫자 형식 (예: "670110" → 1967-01-10)
                    const sixDigitMatch = dateValue.match(/^(\d{2})(\d{2})(\d{2})$/);
                    if (sixDigitMatch) {
                        const yy = parseInt(sixDigitMatch[1]);
                        const mm = sixDigitMatch[2];
                        const dd = sixDigitMatch[3];

                        // YY > 30이면 1900년대, 아니면 2000년대
                        const year = yy > 30 ? `19${sixDigitMatch[1]}` : `20${sixDigitMatch[1]}`;

                        return `${year}-${mm}-${dd}`;
                    }

                    // 월 이름을 숫자로 변환하는 맵
                    const monthMap = {
                        'JAN': '01', 'FEB': '02', 'MAR': '03', 'APR': '04',
                        'MAY': '05', 'JUN': '06', 'JUL': '07', 'AUG': '08',
                        'SEP': '09', 'OCT': '10', 'NOV': '11', 'DEC': '12'
                    };

                    // ddMMMyyyy 형식 (예: "13JUN2032", "13jun2032", "13-JUN-2032", "13 JUN 2032" - 여권 날짜 형식)
                    const ddMMMyyyyyMatch = dateValue.match(/^(\d{1,2})[\s-]*([A-Za-z]{3})[\s-]*(\d{4})$/);
                    if (ddMMMyyyyyMatch) {
                        const day = String(ddMMMyyyyyMatch[1]).padStart(2, '0');
                        const monthStr = ddMMMyyyyyMatch[2].toUpperCase();
                        const year = ddMMMyyyyyMatch[3];
                        const month = monthMap[monthStr];
                        if (month) {
                            return `${year}-${month}-${day}`;
                        }
                    }

                    // ddMMMyy 형식 (예: "13JUN32", "13jun32", "13-JUN-32", "13 JUN 32")
                    const ddMMMyyMatch = dateValue.match(/^(\d{1,2})[\s-]*([A-Za-z]{3})[\s-]*(\d{2})$/);
                    if (ddMMMyyMatch) {
                        const day = String(ddMMMyyMatch[1]).padStart(2, '0');
                        const monthStr = ddMMMyyMatch[2].toUpperCase();
                        const yearShort = parseInt(ddMMMyyMatch[3]);
                        const month = monthMap[monthStr];
                        if (month) {
                            let year;

                            if (dateType === 'passport') {
                                // 여권 만료일: 항상 미래 날짜 (2000년대)
                                year = 2000 + yearShort;
                            } else {
                                // 생년월일: 현재 연도 기준으로 판단
                                const currentYear = new Date().getFullYear();
                                const currentYearShort = currentYear % 100;

                                // 2자리 연도가 현재 연도의 2자리보다 크면 1900년대, 작거나 같으면 2000년대
                                // 예: 현재 2025년
                                //   '85' (85 > 25) → 1985년
                                //   '24' (24 <= 25) → 2024년
                                //   '00' (0 <= 25) → 2000년
                                year = yearShort <= currentYearShort
                                    ? 2000 + yearShort
                                    : 1900 + yearShort;
                            }

                            return `${year}-${month}-${day}`;
                        }
                    }

                    // 표준 Date 파싱 시도
                    try {
                        const date = new Date(dateValue);
                        if (!isNaN(date.getTime())) {
                            // 로컬 시간 기준으로 날짜 추출
                            const year = date.getFullYear();
                            const month = String(date.getMonth() + 1).padStart(2, '0');
                            const day = String(date.getDate()).padStart(2, '0');
                            return `${year}-${month}-${day}`;
                        }
                    } catch (e) {
                        console.warn('날짜 파싱 실패:', dateValue);
                        return '';
                    }
                }

                if (typeof dateValue === 'number') {
                    try {
                        // XLSX 라이브러리의 날짜 파싱 (가장 정확함)
                        const date = XLSX.SSF.parse_date_code(dateValue);
                        let year = date.y;

                        // dateType에 따라 연도 처리
                        if (dateType === 'passport') {
                            // 여권 만료일: 무조건 2000년대 (미래 날짜)
                            if (year < 2000) {
                                year = 2000 + (year % 100);
                            }
                        } else {
                            // 생년월일: 현재 연도 기준 판단
                            if (year < 100) {
                                // 2자리 연도인 경우
                                const currentYear = new Date().getFullYear();
                                const currentYearShort = currentYear % 100;
                                year = year <= currentYearShort ? 2000 + year : 1900 + year;
                            } else if (year < 1900) {
                                // 1900년 이전은 1900년대로 변환
                                year = 1900 + (year % 100);
                            }
                            // 1900-현재년도 범위는 그대로 유지
                        }

                        return `${year}-${String(date.m).padStart(2, '0')}-${String(date.d).padStart(2, '0')}`;
                    } catch (e) {
                        try {
                            // Fallback: 엑셀 날짜를 로컬 시간으로 변환
                            const jsDate = new Date((dateValue - 25569) * 86400 * 1000);
                            let year = jsDate.getFullYear();
                            const month = String(jsDate.getMonth() + 1).padStart(2, '0');
                            const day = String(jsDate.getDate()).padStart(2, '0');

                            // dateType에 따라 연도 처리
                            if (dateType === 'passport') {
                                // 여권 만료일: 무조건 2000년대
                                if (year < 2000) {
                                    year = 2000 + (year % 100);
                                }
                            } else {
                                // 생년월일: 현재 연도 기준 판단
                                if (year < 100) {
                                    const currentYear = new Date().getFullYear();
                                    const currentYearShort = currentYear % 100;
                                    year = year <= currentYearShort ? 2000 + year : 1900 + year;
                                } else if (year < 1900) {
                                    year = 1900 + (year % 100);
                                }
                            }

                            return `${year}-${month}-${day}`;
                        } catch (e2) {
                            return '';
                        }
                    }
                }

                if (dateValue instanceof Date) {
                    // 로컬 시간 기준으로 날짜 추출 (엑셀에서 읽은 Date는 로컬 시간임)
                    let year = dateValue.getFullYear();
                    const month = String(dateValue.getMonth() + 1).padStart(2, '0');
                    const day = String(dateValue.getDate()).padStart(2, '0');

                    // dateType에 따라 연도 처리
                    if (dateType === 'passport') {
                        // 여권 만료일: 무조건 2000년대
                        if (year < 2000) {
                            year = 2000 + (year % 100);
                        }
                    } else {
                        // 생년월일: 현재 연도 기준 판단
                        if (year < 100) {
                            const currentYear = new Date().getFullYear();
                            const currentYearShort = currentYear % 100;
                            year = year <= currentYearShort ? 2000 + year : 1900 + year;
                        } else if (year < 1900) {
                            year = 1900 + (year % 100);
                        }
                        // 1900-현재년도 범위는 그대로 유지
                    }

                    return `${year}-${month}-${day}`;
                }

                return '';
            };

            // 성별 정규화 함수
            const normalizeGender = (gender) => {
                if (!gender) return '';

                const genderStr = String(gender).trim().toUpperCase();

                // 남성 (호칭 포함: MR, MSTR 등)
                if (genderStr === 'M' || genderStr === 'MALE' || genderStr === '남' || genderStr === '남성' ||
                    genderStr === '1' || genderStr === 'MR' || genderStr === 'MR.' ||
                    genderStr === 'MSTR' || genderStr === 'MASTER') {
                    return 'M';
                }
                // 여성 (호칭 포함: MRS, MS, MISS 등)
                if (genderStr === 'F' || genderStr === 'FEMALE' || genderStr === '여' || genderStr === '여성' ||
                    genderStr === '2' || genderStr === 'MRS' || genderStr === 'MRS.' ||
                    genderStr === 'MS' || genderStr === 'MS.' || genderStr === 'MISS') {
                    return 'F';
                }

                return '';
            };

            // ID NO 자동 생성 (7자리: YYMMDD + 성별)
            const generateIdNo = (gender, birthDate) => {
                // 입력값 검증
                if (!birthDate || birthDate === '' || birthDate === null || birthDate === undefined) {
                    return '';
                }

                // 성별 정규화
                const normalizedGender = normalizeGender(gender);

                if (!normalizedGender) {
                    console.warn('⚠️ ID NO 생성 실패: 성별 정보 없음 또는 인식 불가', 'gender:', gender, 'birthDate:', birthDate);
                    return '';
                }

                try {
                    // 문자열로 변환 및 trim
                    let dateStr = String(birthDate).trim();

                    // 날짜 형식이 YYYY-MM-DD가 아니면 formatDate로 변환
                    let formattedDate = dateStr;
                    if (!/^\d{4}-\d{2}-\d{2}/.test(dateStr)) {
                        formattedDate = formatDate(dateStr);
                    }

                    // 변환 후에도 올바른 형식이 아니면 빈 문자열 반환
                    if (!formattedDate || typeof formattedDate !== 'string' || formattedDate === '') {
                        console.warn('ID NO 생성 실패: formatDate 결과 없음', birthDate);
                        return '';
                    }

                    // YYYY-MM-DD 형식 검증
                    if (!/^\d{4}-\d{2}-\d{2}/.test(formattedDate)) {
                        console.warn('ID NO 생성 실패: 잘못된 날짜 형식', birthDate, '→', formattedDate);
                        return '';
                    }

                    // 날짜 파싱
                    const parts = formattedDate.split('-');
                    if (parts.length !== 3) {
                        console.warn('ID NO 생성 실패: 날짜 파싱 오류', formattedDate);
                        return '';
                    }

                    const year = parseInt(parts[0]);
                    const month = parts[1];
                    const day = parts[2];

                    // 유효성 검증
                    if (isNaN(year) || year < 1900 || year > 2100) {
                        console.warn('ID NO 생성 실패: 잘못된 연도', year);
                        return '';
                    }

                    // YYMMDD 형식으로 변환
                    const yy = String(year).slice(-2);
                    const birthYYMMDD = yy + month + day;

                    // 성별 코드 결정
                    let lastDigit = '';
                    if (normalizedGender === 'M') {
                        lastDigit = year >= 2000 ? '3' : '1';
                    } else if (normalizedGender === 'F') {
                        lastDigit = year >= 2000 ? '4' : '2';
                    } else {
                        return '';
                    }

                    const idNo = `${birthYYMMDD}${lastDigit}`;
                    return idNo;
                } catch (error) {
                    console.error('❌ ID NO 생성 오류:', error, 'birthDate:', birthDate);
                    return '';
                }
            };

            // ==================== React Hooks ====================

            // ref를 최신 상태로 유지
            useEffect(() => { groupsRef.current = groups; }, [groups]);
            useEffect(() => { dataRef.current = data; }, [data]);
            useEffect(() => { currentGroupRef.current = currentGroup; }, [currentGroup]);

            // API에서 데이터 로드
            useEffect(() => {
                fetch('/tables/groups')
                    .then(res => res.json())
                    .then(result => {
                        const apiGroups = result.data || [];
                        // API 데이터를 localStorage 형식으로 변환
                        const parsed = apiGroups.map(g => {
                            let members = [];
                            try {
                                members = JSON.parse(g.members || '[]');
                            } catch (err) {
                                console.error(`❌ 그룹 "${g.name}" 멤버 파싱 오류:`, err);
                                console.error('문제가 있는 members 데이터:', g.members);
                                members = [];
                            }

                            // 멤버에 no 필드 추가 + 전화번호 자동 포맷
                            let phoneUpdated = false;
                            const membersWithNo = members.map((member, index) => {
                                const formatted = formatPhoneNumber(member.phone);
                                if (formatted !== (member.phone || '')) phoneUpdated = true;
                                return {
                                    ...member,
                                    no: member.no || (index + 1),
                                    phone: formatted
                                };
                            });

                            return {
                                id: g.id,
                                name: g.name,
                                destination: g.destination || '',
                                departureDate: g.departure_date || '',
                                returnDate: g.return_date || '',
                                createdAt: g.created_at,
                                updatedAt: g.updated_at,
                                isArchived: g.is_archived || 0,
                                archivedAt: g.archived_at || null,
                                members: membersWithNo
                            };
                        });
                        // 자동 아카이브: 귀국일 + 7일 < 오늘 → 아카이브
                        const today = new Date();
                        today.setHours(0, 0, 0, 0);
                        const autoArchivePromises = [];
                        const autoArchiveGroups = [];
                        parsed.forEach(group => {
                            if (group.returnDate && !group.isArchived) {
                                const returnDate = new Date(group.returnDate);
                                returnDate.setDate(returnDate.getDate() + 7);
                                if (returnDate < today) {
                                    group.isArchived = 1;
                                    group.archivedAt = new Date().toISOString();
                                    autoArchiveGroups.push(group);
                                    autoArchivePromises.push(
                                        fetch(`/tables/groups/${group.id}`, {
                                            method: 'PATCH',
                                            headers: { 'Content-Type': 'application/json' },
                                            body: JSON.stringify({ is_archived: 1, archived_at: group.archivedAt })
                                        }).catch(err => console.error('자동 아카이브 실패:', err))
                                    );
                                }
                            }
                        });
                        // 자동 완료된 그룹 멤버들의 여행이력 갱신
                        for (const group of autoArchiveGroups) {
                            const dest = group.destination || '';
                            const depDate = group.departureDate || '';
                            const historyEntry = dest ? (depDate ? `${dest}(${depDate})` : dest) : '';
                            if (!historyEntry || !group.members) continue;
                            for (const member of group.members) {
                                if (!member.passportNo) continue;
                                autoArchivePromises.push(
                                    (async () => {
                                        try {
                                            const res = await fetch(`/tables/customers?search=${encodeURIComponent(member.passportNo)}`);
                                            const result = await res.json();
                                            const list = result.data || result;
                                            const matched = Array.isArray(list) ? list.find(c => c.passport_number === member.passportNo) : null;
                                            if (matched) {
                                                const patch = {
                                                    group_name: group.name || matched.group_name,
                                                    departure_date: depDate || matched.departure_date,
                                                    travel_region: dest || matched.travel_region,
                                                    last_modified: new Date().toISOString()
                                                };
                                                const existing = matched.travel_history || '';
                                                const items = existing ? existing.split(',').map(s => s.trim()) : [];
                                                if (!items.some(item => item === historyEntry)) {
                                                    patch.travel_history = existing ? `${historyEntry}, ${existing}` : historyEntry;
                                                }
                                                await fetch(`/tables/customers/${matched.id}`, {
                                                    method: 'PATCH',
                                                    headers: { 'Content-Type': 'application/json' },
                                                    body: JSON.stringify(patch)
                                                });
                                            }
                                        } catch (err) {
                                            console.error('자동완료 여행이력 갱신 실패:', member.nameKor, err);
                                        }
                                    })()
                                );
                            }
                        }
                        // 전화번호 포맷 변환된 그룹 DB 저장
                        const phoneFixGroups = parsed.filter(g => {
                            const orig = apiGroups.find(ag => ag.id === g.id);
                            if (!orig) return false;
                            const origMembers = JSON.parse(orig.members || '[]');
                            return g.members.some((m, i) => origMembers[i] && m.phone !== (origMembers[i].phone || ''));
                        });
                        if (phoneFixGroups.length > 0) {
                            phoneFixGroups.forEach(group => {

                        setGroups(parsed);

                        const activeGroups = parsed.filter(g => !g.isArchived);

            // 고객명단과 연동: postMessage 리스너 (ref 사용으로 stale closure 방지)

                    // 고객 관리에서 새 고객이 추가된 경우

                                const alreadyExists = currentGroupData.members.some(m =>
                                    (passportNum && m.passportNo === passportNum) ||

                                    nameEn: customer.name_eng || '',
                                    passportNo: customer.passport_number || '',

                                    passportExpire: customer.passport_expiry || '',
                                    phone: customer.phone || '',

                                    }
                                    return g;
                                });

                                saveToLocalStorage(updatedGroups);
                                setData([...latestData, newMember]);
                            }
                        }
                    }

                    // 고객 관리에서 고객이 수정된 경우
                    if (event.data.type === 'CUSTOMER_UPDATED') {

                        const latestCurrentGroup = currentGroupRef.current;

                        const passportNum = customerData.passport_number;
                        const nameKor = customerData.name_kor;
                        const nameEng = customerData.name_eng;

                        let updated = false;
                        const updatedGroups = latestGroups.map(group => {
                            const updatedMembers = group.members.map(member => {

                                        ...member,

                                        nameEn: customerData.name_eng || member.nameEn,
                                        passportNo: customerData.passport_number || member.passportNo,
                                        birthDate: customerData.birth_date || member.birthDate,
                                        passportExpire: customerData.passport_expiry || member.passportExpire,
                                        gender: customerData.gender || member.gender,
                                        phone: formatPhoneNumber(customerData.phone) || member.phone
                                    };
                                }
                                return member;
                            });

                            return { ...group, members: updatedMembers };
                        });

                        if (updated) {
                            // API + localStorage 모두 저장
                            saveToLocalStorage(updatedGroups);

                            // 현재 그룹의 데이터도 업데이트
                            if (latestCurrentGroup) {
                                const currentGroupData = updatedGroups.find(g => g.id === latestCurrentGroup);

                                }

            // 항공 스케줄 PNR 파싱
            const airportNameMap = {
                'ICN': '인천', 'GMP': '김포', 'PUS': '부산', 'CJU': '제주',
                'NRT': '나리타', 'HND': '하네다', 'KIX': '간사이', 'FUK': '후쿠오카', 'CTS': '삿포로', 'NGO': '나고야', 'OKA': '오키나와',
                'PVG': '상하이', 'PEK': '베이징', 'CAN': '광저우', 'HKG': '홍콩', 'MFM': '마카오', 'TPE': '타이페이', 'KHH': '가오슝',
                'BKK': '방콕', 'CNX': '치앙마이', 'HKT': '푸켓', 'DAD': '다낭', 'SGN': '호치민', 'HAN': '하노이', 'CXR': '나트랑', 'PQC': '푸꾸옥', 'HPH': '하이퐁',
                'SIN': '싱가포르', 'KUL': '쿠알라룸푸르', 'MNL': '마닐라', 'CEB': '세부', 'DPS': '발리', 'CGK': '자카르타', 'REP': '씨엠립', 'PNH': '프놈펜', 'RGN': '양곤', 'VTE': '비엔티안',
                'DEL': '델리', 'BOM': '뭄바이', 'CMB': '콜롬보', 'MLE': '몰디브', 'KTM': '카트만두',
                'SYD': '시드니', 'MEL': '멜버른', 'BNE': '브리즈번', 'AKL': '오클랜드', 'GUM': '괌', 'SPN': '사이판',
                'LAX': '로스앤젤레스', 'JFK': '뉴욕', 'SFO': '샌프란시스코', 'SEA': '시애틀', 'LAS': '라스베가스', 'HNL': '호놀룰루', 'OGG': '마우이', 'YVR': '밴쿠버', 'YYZ': '토론토',

                'SEL': '서울', 'TAS': '타슈켄트', 'ULN': '울란바토르'
            };

            const parseFlightSchedule = (text) => {
                if (!text.trim()) return;

                const lines = text.split(/\n/).filter(l => l.trim() !== '');
                const monthMap = { 'JAN': '01', 'FEB': '02', 'MAR': '03', 'APR': '04', 'MAY': '05', 'JUN': '06', 'JUL': '07', 'AUG': '08', 'SEP': '09', 'OCT': '10', 'NOV': '11', 'DEC': '12' };

                // 날짜 변환 (27APR → 2026-04-27)
                const convertPnrDate = (dateStr) => {
                    if (!dateStr || dateStr.length < 5) return '';
                    const day = dateStr.substring(0, 2);
                    const monthStr = dateStr.substring(2, 5);
                    const month = monthMap[monthStr];
                    if (!month) return '';

                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    let year = today.getFullYear();
                    let date = new Date(`${year}-${month}-${day}`);
                    date.setHours(0, 0, 0, 0);
                    if (date < today) year++;

                    return `${year}-${month}-${day}`;
                };

                // 항공편 파싱 (air1/js/main.js parseFlightInfo 로직)
                const parseFlightLine = (line) => {
                    const parts = line.split(/\s+/).filter(Boolean);

                    // 형식5: 7개 파트 간소화
                    if (parts.length === 7) {
                        const isDate = /^\d{2}[A-Z]{3}$/.test(parts[2]);
                        const isRoute = /^[A-Z]{6}$/.test(parts[3]);
                        if (isDate && isRoute) {
                            let fn = parts[1];
                            const m5 = fn.match(/^([A-Z0-9]{2})(\d+)[A-Z]?$/);
                            if (m5) fn = m5[1] + ' ' + m5[2];
                            return { flightNumber: fn, date: parts[2], departure: parts[3].substring(0, 3), arrival: parts[3].substring(3, 6), departureTime: parts[5], arrivalTime: parts[6], arrivalDate: null };
                        }
                    }

                    if (parts.length < 8) return null;

                    let flightNumber, dateIndex, routeIndex, departureTimeIndex, arrivalTimeIndex, arrivalDate = null;

                    if (/^\d{2}[A-Z]{3}$/.test(parts[2])) {
                        // 형식4: 항공편명 붙어있음
                        flightNumber = parts[1];
                        const m4 = flightNumber.match(/^([A-Z0-9]{2})(\d+)[A-Z]?$/);
                        if (m4) flightNumber = m4[1] + ' ' + m4[2];
                        dateIndex = 2; routeIndex = 4; departureTimeIndex = 6; arrivalTimeIndex = 7;
                        if (parts.length > 8 && /^\d{2}[A-Z]{3}$/.test(parts[8])) arrivalDate = parts[8];
                    } else if (/^\d{2}[A-Z]{3}$/.test(parts[3])) {
                        // 형식1: 항공사 편명클래스 날짜
                        flightNumber = parts[1] + ' ' + parts[2];
                        flightNumber = flightNumber.replace(/(\d+)[A-Z]$/, '$1');
                        dateIndex = 3; routeIndex = 5; departureTimeIndex = 7; arrivalTimeIndex = 8;
                        if (parts.length > 9 && /^\d{2}[A-Z]{3}$/.test(parts[9])) arrivalDate = parts[9];
                    } else {
                        // 형식2: 항공사 편명 클래스 날짜
                        flightNumber = parts[1] + ' ' + parts[2];
                        dateIndex = 4; routeIndex = 6; departureTimeIndex = 8; arrivalTimeIndex = 9;
                        if (parts.length > 10 && /^\d{2}[A-Z]{3}$/.test(parts[10])) arrivalDate = parts[10];
                    }

                    const date = parts[dateIndex];
                    const route = parts[routeIndex];
                    if (!route || route.length < 6) return null;
                    const departureTime = parts[departureTimeIndex];
                    const arrivalTime = parts[arrivalTimeIndex];

                    return { flightNumber, date, departure: route.substring(0, 3), arrival: route.substring(3, 6), departureTime, arrivalTime, arrivalDate };
                };

                // 승객 파싱 (air1/js/main.js parsePassengerNames 로직)
                const parsePassengers = (inputText) => {
                    const names = [];
                    const englishRegex = /(\d+)\.(\d*[A-Z][A-Z/]+[A-Z]*)/g;
                    const koreanRegex = /(\d+)\.([\uAC00-\uD7AF]+\/[\uAC00-\uD7AF]+(?:\s*(?:MR|MS|MSTR|MISS))?)/gi;
                    let match;

                    while ((match = englishRegex.exec(inputText)) !== null) {
                        let fullName = match[2].replace(/^\d+/, '');
                        fullName = fullName.replace(/\s*(MR|MS|MSTR|MISS)\s*$/i, '').trim();
                        names.push({ index: parseInt(match[1]), name: fullName });
                    }
                    while ((match = koreanRegex.exec(inputText)) !== null) {
                        let fullName = match[2].replace(/\s*(MR|MS|MSTR|MISS)\s*$/i, '').trim();
                        names.push({ index: parseInt(match[1]), name: fullName });
                    }

                    const uniqueNames = [];
                    const seen = new Set();
                    for (const item of names) {
                        if (!seen.has(item.index)) { seen.add(item.index); uniqueNames.push(item); }
                    }
                    return uniqueNames.sort((a, b) => a.index - b.index);
                };

                // 항공편 라인 파싱
                const flights = [];
                for (const line of lines) {
                    const parsed = parseFlightLine(line);

                }

                // 승객 파싱
                const passengers = parsePassengers(text);

                if (flights.length === 0 && passengers.length === 0) {

                // 여행지역: 첫 구간의 도착 공항 (ICN 출발 기준)

                    const departureDate = convertPnrDate(firstFlight.date);

                    const lastFlight = flights[flights.length - 1];
                    const returnDateStr = lastFlight.arrivalDate || lastFlight.date;
                    const returnDate = convertPnrDate(returnDateStr);
                    if (returnDate) setNewGroupReturnDate(returnDate);

                    // DB 저장용 항공편 데이터 보관
                    const flightRecords = flights.map(f => {
                        const depDate = convertPnrDate(f.date);
                        const arrDate = convertPnrDate(f.arrivalDate || f.date);
                        return {
                            airline: (f.flightNumber || '').split(' ')[0] || f.departure,
                            flight_number: f.flightNumber || '',
                            departure_date: depDate,
                            departure_airport: f.departure,
                            departure_time: f.departureTime ? `${f.departureTime.substring(0,2)}:${f.departureTime.substring(2,4)}` : '',
                            arrival_date: arrDate,

                // 승객 → members

                        return {
                            no: idx + 1,
                            nameKor: '',
                            nameEn: p.name,
                            gender: gender,
                            passportNo: '',
                            birthDate: '',
                            idNo: '',
                            passportExpire: '',
                            phone: '',
                            room: ''
                        };

                    setNewGroupExcelData(members);
                }
            };

            // 저장된 항공 스케줄 불러오기 (air1 localStorage flight_saves_v2)
            const loadSavedFlightSchedules = () => {
                try {
                    const raw = localStorage.getItem('flight_saves_v2');
                    if (!raw) {
                        showToast('저장된 항공 스케줄이 없습니다. air1 항공편 변환기에서 스케줄을 저장하면 여기서 불러올 수 있습니다.', 'info', 5000);
                        return;
                    }

                    const savedFlights = JSON.parse(raw);
                    if (!Array.isArray(savedFlights) || savedFlights.length === 0) {
                        showToast('저장된 항공 스케줄이 없습니다.', 'info');
                        return;
                    }

                    // 최신순 정렬
                    savedFlights.sort((a, b) => new Date(b.saveDate) - new Date(a.saveDate));

                    // 목록용 요약 정보 생성
                    const grouped = savedFlights.map(item => {
                        const flights = item.flights || [];
                        const first = flights[0];
                        const last = flights[flights.length - 1];

                        // 도착 공항코드에서 도시명 추출
                        const arrivalCode = first ? first.arrival?.code : '';
                        const destination = airportNameMap[arrivalCode] || (first ? first.arrival?.airport : '') || arrivalCode;

                        // 날짜에서 YYYY-MM-DD 추출 (예: "2026.04.27(일)" → "2026-04-27")
                        const extractDate = (dateStr) => {
                            if (!dateStr) return '';
                            const m = dateStr.match(/(\d{4})\.(\d{2})\.(\d{2})/);
                            return m ? `${m[1]}-${m[2]}-${m[3]}` : '';
                        };

                        const departureDate = extractDate(first?.date);
                        const returnDate = extractDate(last?.date);

                        // 승객 목록
                        const passengers = item.customerInfo?.passengers || [];

                        return {
                            id: item.id,
                            name: item.name || '이름 없음',
                            pnr: item.pnr || '',
                            destination,
                            departureDate,
                            returnDate,
                            flights,
                            passengers,
                            summary: flights.map(f => `${f.flightNumber || ''} ${f.departure?.code || ''}→${f.arrival?.code || ''} ${f.date || ''}`).join(' / '),

            const applyFlightSchedule = (group) => {

                    const members = group.passengers.map((p, idx) => ({

                        nameEn: p.name || '',

                        birthDate: '',

                    setNewGroupExcelData(members);

                setShowFlightLoadModal(false);

            // 새 단체용 엑셀 파일 처리
            const handleNewGroupExcelUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                try {
                    const data = await file.arrayBuffer();
                    const workbook = XLSX.read(data, { type: 'array', cellDates: true });

                    // 시트 선택 및 추출된 정보 저장
                    let selectedSheet = null;
                    let headerIndex = -1;
                    let jsonData = null;
