                    showToast('파일을 읽을 수 없습니다. 파일이 손상되었거나 접근 권한이 없을 수 있습니다.', 'error');
                };
                reader.readAsBinaryString(file);
                e.target.value = '';
            };

            // ── 텍스트 붙여넣기 파싱 ──────────────────────────────────
            const [pasteModalOpen, setPasteModalOpen] = React.useState(false);
            const [pasteText, setPasteText] = React.useState('');
            const [parsedPreview, setParsedPreview] = React.useState([]);

            const MONTH_MAP = { JAN:'01',FEB:'02',MAR:'03',APR:'04',MAY:'05',JUN:'06',JUL:'07',AUG:'08',SEP:'09',OCT:'10',NOV:'11',DEC:'12' };

            const parseDateText = (dateStr) => {
                if (!dateStr) return '';
                const s = dateStr.trim().toUpperCase();
                // DD-MMM-YY 형식 (예: 29-DEC-50)
                const m = s.match(/^(\d{1,2})-([A-Z]{3})-(\d{2})$/);
                if (m) {
                    const day = m[1].padStart(2, '0');
                    const mon = MONTH_MAP[m[2]] || '01';
                    let year = parseInt(m[3]);
                    year = year > 40 ? 1900 + year : 2000 + year;
                    return `${year}-${mon}-${day}`;
                }
                // YYYY-MM-DD 이미 있으면 그대로
                if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
                return dateStr.trim();
            };

            const handlePasteText = () => {
                if (!pasteText.trim()) return;
                const lines = pasteText.trim().split('\n').map(l => l.trim()).filter(Boolean);
                if (lines.length === 0) return;

                // 구분자 감지: 탭 > 쉼표
                const firstDataLine = lines.length > 1 ? lines[1] : lines[0];
                const delimiter = firstDataLine.includes('\t') ? '\t' : ',';

                // 헤더 감지
                const firstLine = lines[0].toLowerCase();
                const hasHeader = firstLine.includes('성명') || firstLine.includes('이름') || firstLine.includes('name') || firstLine.includes('한글') || firstLine.includes('영문') || firstLine.includes('여권');
                const dataLines = hasHeader ? lines.slice(1) : lines;

                // 헤더에서 컬럼 매핑
                let colMap = { nameKr: 0, nameEn: 1, gender: 2, passport: 3, birth: 4, expire: 5 };
                if (hasHeader) {
                    const headers = lines[0].split(delimiter).map(h => h.trim().toLowerCase());
                    const findCol = (...keywords) => headers.findIndex(h => keywords.some(k => h.includes(k)));
                    const kr = findCol('한글', '성명', '이름');
                    const en = findCol('영문', '영어', 'name', 'english');
                    const gen = findCol('성별', 'gender', 'sex', 'mr', 'ms');
                    const pp = findCol('여권번호', 'passport');
                    const bd = findCol('생년월일', 'birth', 'dob');
                    const ex = findCol('만료', 'expir');
                    if (kr !== -1) colMap.nameKr = kr;
                    if (en !== -1) colMap.nameEn = en;
                    if (gen !== -1) colMap.gender = gen;
                    if (pp !== -1) colMap.passport = pp;
                    if (bd !== -1) colMap.birth = bd;
                    if (ex !== -1) colMap.expire = ex;
                }

                const parsed = dataLines.map((line, idx) => {
                    const cols = line.split(delimiter).map(c => c.trim());
                    const rawGender = cols[colMap.gender] || '';
                    const gender = normalizeGender(rawGender) || 'M';
                    const birthDate = parseDateText(cols[colMap.birth] || '');
                    const passportExpire = parseDateText(cols[colMap.expire] || '');

                    let nameEn = (cols[colMap.nameEn] || '').toUpperCase();
                    nameEn = formatEnglishName(nameEn, gender, birthDate);

                    let idNo = '';
                    if (birthDate && gender) {
                        try { idNo = generateIdNo(gender, birthDate); } catch {}
                    }

                    return {
                        no: idx + 1,
                        nameKor: cols[colMap.nameKr] || '',
                        nameEn,
                        gender,
                        passportNo: (cols[colMap.passport] || '').toUpperCase(),
                        birthDate,
                        idNo,
                        passportExpire,
                        phone: '',
                        room: ''
                    };
                }).filter(r => r.nameKor || r.nameEn);

                setParsedPreview(parsed);
            };

            const confirmPasteImport = () => {
                if (parsedPreview.length === 0) return;
                saveCurrentGroupData(parsedPreview, true);
                showToast(`✅ ${parsedPreview.length}명의 데이터를 불러왔습니다.\n고객 관리에 자동 추가 중입니다.`, 'success', 5000);
                setPasteModalOpen(false);
                setPasteText('');
                setParsedPreview([]);
            };

            // 엑셀 내보내기 (전체)
            // 날짜 형식을 엑셀용 문자열로 변환하는 헬퍼 함수
            const formatDateForFullExport = (dateValue) => {
                if (!dateValue) return '';
                if (typeof dateValue === 'string') {
                    return dateValue;
                }
                return String(dateValue);
            };

            const exportToExcel = () => {
                if (!currentGroup) {
                    showToast('단체를 선택하세요.', 'warning');
                    return;
                }

                const group = groups.find(g => g.id === currentGroup);
                const wb = XLSX.utils.book_new();

                // 시트 데이터를 배열로 직접 구성 (여행사 양식)
                const rows = [];

                // 1행: 단체명단 타이틀
                rows.push(['단 체 명 단']);
                // 2행: 단체 정보
                const depDate = group.departureDate || '';
                const retDate = group.returnDate || '';
                const dest = group.destination || '';
                rows.push([`단체명: ${group.name}`, '', `여행지: ${dest}`, '', `출발일: ${depDate}`, '', `귀국일: ${retDate}`]);
                // 3행: 인원 정보
                const totalCount = data.length;
                const maleCount = data.filter(p => p.gender === 'M').length;
                const femaleCount = data.filter(p => p.gender === 'F').length;
                rows.push([`총 인원: ${totalCount}명 (남 ${maleCount}명 / 여 ${femaleCount}명)`]);
                // 4행: 빈 줄
                rows.push([]);
                // 5행: 헤더
                rows.push(['NO', '한글', '영문', '성별', '여권번호', '생년월일', 'ID NO', '여권만료일', '전화번호', 'ROOM']);
                // 데이터 행
                data.forEach(person => {
                    rows.push([
                        person.no,
                        person.nameKor || '',
                        person.nameEn || '',
                        person.gender || '',
                        person.passportNo || '',
                        formatDateForExport(person.birthDate),
                        person.idNo || '',
                        formatDateForExport(person.passportExpire),
                        formatPhoneForExport(person.phone),
                        person.room || ''
                    ]);
                });

                const ws = XLSX.utils.aoa_to_sheet(rows);

                // 셀 병합: 1행 타이틀 (A1:J1), 3행 인원 (A3:J3)
                ws['!merges'] = [
                    { s: { r: 0, c: 0 }, e: { r: 0, c: 9 } },
                    { s: { r: 2, c: 0 }, e: { r: 2, c: 9 } }
                ];

                // 열 너비 설정
                ws['!cols'] = [
                    { wch: 5 },   // NO
                    { wch: 10 },  // 한글
                    { wch: 22 },  // 영문
                    { wch: 6 },   // 성별
                    { wch: 14 },  // 여권번호
                    { wch: 14 },  // 생년월일
                    { wch: 12 },  // ID NO
                    { wch: 14 },  // 여권만료일
                    { wch: 18 },  // 전화번호
                    { wch: 10 }   // ROOM
                ];

                XLSX.utils.book_append_sheet(wb, ws, '명단');

                const fileName = `${group.name}_명단_${new Date().toISOString().split('T')[0]}.xlsx`;
                XLSX.writeFile(wb, fileName);
                showToast(`${fileName} 다운로드 완료`, 'success');
            };

            // 맞춤형 내보내기 모달 열기
            const openExportModal = () => {
                if (!currentGroup) {
                    showToast('단체를 선택하세요.', 'warning');
                    return;
                }
                generateExportPreview();
                setShowExportModal(true);
            };

            // 필드 선택 토글
            const toggleExportField = (field) => {
                setExportFields(prev => ({
                    ...prev,
                    [field]: !prev[field]
                }));
            };

            // 빠른 선택 프리셋
            const applyQuickSelect = (preset) => {
                const presets = {
                    all: {
                        no: true, nameKor: true, nameEn: true, gender: true,
                        passportNo: true, birthDate: true, idNo: true,
                        passportExpire: true, phone: true, room: true
                    },
                    basic: {
                        no: true, nameKor: true, nameEn: true, phone: true,
                        passportNo: false, birthDate: false, idNo: false,
                        passportExpire: false, gender: false, room: false
                    },
                    passport: {
                        no: true, nameKor: true, nameEn: true, gender: true,
                        passportNo: true, birthDate: true, passportExpire: true,
                        idNo: false, phone: false, room: false
                    },
                    contact: {
                        no: true, nameKor: true, nameEn: true, phone: true, room: true,
                        passportNo: false, birthDate: false, idNo: false,
                        passportExpire: false, gender: false
                    },
                    minimal: {
                        no: true, nameKor: true, nameEn: true,
                        passportNo: false, birthDate: false, idNo: false,
                        passportExpire: false, gender: false, phone: false, room: false
                    }
                };

                setExportFields(presets[preset] || presets.all);
            };

            // 미리보기 생성
            const generateExportPreview = () => {
                const fieldMap = {
                    no: 'NO',
                    nameKor: '한글',
                    nameEn: '영문',
                    gender: '성별',
                    passportNo: '여권번호',
                    birthDate: '생년월일',
                    idNo: 'ID NO',
                    passportExpire: '여권만료일',
                    phone: '전화번호',
                    room: 'ROOM'
                };

                const dateFields = ['birthDate', 'passportExpire'];
                const preview = filteredData.slice(0, 5).map(person => {
                    const row = {};
                    Object.keys(exportFields).forEach(field => {
                        if (exportFields[field]) {
                            if (dateFields.includes(field)) {
                                row[fieldMap[field]] = formatDateForExport(person[field]);
                            } else if (field === 'phone') {
                                row[fieldMap[field]] = formatPhoneForExport(person[field]);
                            } else {
                                row[fieldMap[field]] = person[field] || '';
                            }
                        }
                    });
                    return row;
                });

                setExportPreview(preview);
            };

            // 필드/옵션 변경 시 미리보기 업데이트
            useEffect(() => {
                if (showExportModal) {
                    generateExportPreview();
                }
            }, [exportFields, showExportModal, dateFormat, phoneFormat]);

            // 날짜 형식 변환 (내보내기용)
            const MONTH_ABBR = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
            const formatDateForExport = (dateValue, format) => {
                if (!dateValue) return '';
                const str = typeof dateValue === 'string' ? dateValue : String(dateValue);
                const fmt = format || dateFormat;
                if (fmt === 'DD-MMM-YY') {
                    // YYYY-MM-DD → DD-MMM-YY (예: 1985-03-15 → 15-MAR-85)
                    const m = str.match(/(\d{4})-(\d{2})-(\d{2})/);
                    if (m) {
                        const yy = m[1].slice(2);
                        const mon = MONTH_ABBR[parseInt(m[2], 10) - 1] || m[2];
                        return `${m[3]}-${mon}-${yy}`;
                    }
                }
                return str;
            };

            // 전화번호 형식 변환 (내보내기용)
            const formatPhoneForExport = (phone, format) => {
                if (!phone) return '';
                const fmt = format || phoneFormat;
                if (fmt === 'local') {
                    // +82 10-1234-5678 → 010-1234-5678
                    let local = phone.replace(/^\+82\s*/, '0');
                    // +82-10-1234-5678 형식도 처리
                    local = local.replace(/^0(\d)/, '0$1');
                    return local;
                }
                return phone;
            };

            // 맞춤형 엑셀 내보내기
            const exportCustomExcel = () => {
                if (!currentGroup) {
                    showToast('단체를 선택하세요.', 'warning');
                    return;
                }

                const fieldMap = {
                    no: 'NO',
                    nameKor: '한글',
                    nameEn: '영문',
                    gender: '성별',
                    passportNo: '여권번호',
                    birthDate: '생년월일',
                    idNo: 'ID NO',
                    passportExpire: '여권만료일',
                    phone: '전화번호',
                    room: 'ROOM'
                };

                // 날짜 필드 목록
                // 생년월일, 여권만료일은 날짜 형식으로 내보내기
                const dateFields = ['birthDate', 'passportExpire'];

                const group = groups.find(g => g.id === currentGroup);
                const exportData = filteredData.map(person => {
                    const row = {};
                    Object.keys(exportFields).forEach(field => {
                        if (exportFields[field]) {
                            if (dateFields.includes(field)) {
                                row[fieldMap[field]] = formatDateForExport(person[field]);
                            } else if (field === 'phone') {
                                row[fieldMap[field]] = formatPhoneForExport(person[field]);
                            } else {
                                row[fieldMap[field]] = person[field] || '';
                            }
                        }
                    });
                    return row;
                });

                if (exportData.length === 0) {
                    showToast('내보낼 데이터가 없습니다.', 'warning');
                    return;
                }

                const wb = XLSX.utils.book_new();
                const rows = [];
                const selectedFieldKeys = Object.keys(exportFields).filter(k => exportFields[k]);
                const headers = selectedFieldKeys.map(k => fieldMap[k]);
                const colCount = headers.length;

                // 상단 단체 정보
                rows.push(['단 체 명 단']);
                const depDate = group.departureDate || '';
                const retDate = group.returnDate || '';
                const dest = group.destination || '';
                rows.push([`단체명: ${group.name}`, '', `여행지: ${dest}`, '', `출발일: ${depDate}`, '', `귀국일: ${retDate}`]);
                const totalCount = filteredData.length;
                const maleCount = filteredData.filter(p => p.gender === 'M').length;
                const femaleCount = filteredData.filter(p => p.gender === 'F').length;
                rows.push([`총 인원: ${totalCount}명 (남 ${maleCount}명 / 여 ${femaleCount}명)`]);
                rows.push([]);
                // 헤더
                rows.push(headers);
                // 데이터
                exportData.forEach(row => {
                    rows.push(headers.map(h => row[h] || ''));
                });

                const ws = XLSX.utils.aoa_to_sheet(rows);

                // 셀 병합
                ws['!merges'] = [
                    { s: { r: 0, c: 0 }, e: { r: 0, c: Math.max(colCount - 1, 0) } },
                    { s: { r: 2, c: 0 }, e: { r: 2, c: Math.max(colCount - 1, 0) } }
                ];

                // 열 너비
                const colWidths = { NO: 5, '한글': 10, '영문': 22, '성별': 6, '여권번호': 14, '생년월일': 14, 'ID NO': 12, '여권만료일': 14, '전화번호': 18, 'ROOM': 10 };
                ws['!cols'] = headers.map(h => ({ wch: colWidths[h] || 12 }));

                XLSX.utils.book_append_sheet(wb, ws, '명단');

                const fileName = `${group.name}_명단_${new Date().toISOString().split('T')[0]}.xlsx`;
                XLSX.writeFile(wb, fileName);

                setShowExportModal(false);
                showToast(`${fileName} 다운로드 완료`, 'success');
            };

            const currentGroupData = groups.find(g => g.id === currentGroup);
            const isReadOnly = currentGroupData && currentGroupData.isArchived;

            // 탭별 그룹 수 계산
            const activeGroupCount = groups.filter(g => !g.isArchived).length;
            const archivedGroupCount = groups.filter(g => g.isArchived).length;

            // 단체 검색 필터 (탭 필터 포함)
            const filteredGroups = groups.filter(group => {
                const matchesSearch = group.name.toLowerCase().includes(groupSearchTerm.toLowerCase());
                const matchesTab = activeTab === 'active' ? !group.isArchived : !!group.isArchived;
                return matchesSearch && matchesTab;
            });

            // 명단 검색 필터
            const filteredData = data.filter(person => {
                if (!searchTerm) return true;
                const term = searchTerm.toLowerCase();
                return (
                    person.nameKor?.toLowerCase().includes(term) ||
                    person.nameEn?.toLowerCase().includes(term) ||
                    person.passportNo?.toLowerCase().includes(term) ||
                    person.phone?.toLowerCase().includes(term)
                );
            });

            // 통계 (검색된 데이터 기준)
            const stats = {
                total: filteredData.length,
                male: filteredData.filter(p => p.gender === 'M').length,
                female: filteredData.filter(p => p.gender === 'F').length,
                minor: filteredData.filter(p => {
                    const age = calculateAge(p.birthDate);
                    return age !== null && age < 15;
                }).length,
                withId: filteredData.filter(p => p.idNo).length
            };

            return (
                <div className="container">
                    {showMigrationBanner && (
                        <div style={{
                            background: '#fff3cd', border: '1px solid #ffc107', borderRadius: '8px',
                            padding: '12px 20px', marginBottom: '16px', display: 'flex',
                            alignItems: 'center', gap: '16px', fontSize: '14px', color: '#856404'
                        }}>
                            <span style={{ flex: 1 }}>
                                로컬 저장 데이터(localStorage)가 감지되었습니다. 서버로 이관하면 여러 기기에서 데이터를 공유할 수 있습니다.
                            </span>
                            <button
                                type="button"
                                onClick={handleMigrate}
                                disabled={migrating}
                                style={{
                                    background: '#ffc107', border: 'none', borderRadius: '6px',
                                    padding: '8px 16px', fontWeight: 600, cursor: 'pointer',
                                    color: '#212529', minWidth: '110px'
                                }}
                            >
                                {migrating ? '이관 중...' : '서버로 이관'}
                            </button>
                            <button
                                type="button"
                                onClick={() => setShowMigrationBanner(false)}
                                style={{
                                    background: 'transparent', border: 'none', cursor: 'pointer',
                                    fontSize: '18px', color: '#856404', lineHeight: 1
                                }}
                                title="닫기"
                            >✕</button>
                        </div>
                    )}
                    <div className="header">
                        <div style={{ flex: 1 }}>
                            <h1>✈️ 단체명단 관리 DB 시스템</h1>
                            <p>여행사 업무를 위한 스마트 명단 관리 도구 | 단체별 저장 및 관리</p>
                        </div>
                        <button type="button"
                            className="btn btn-info"
                            onClick={() => setShowCalendar(!showCalendar)}
                            style={{ height: '48px', fontSize: '16px' }}
                        >
                            📅 {showCalendar ? '달력 닫기' : '일정 달력'}
                        </button>
                    </div>

                    {/* 달력 */}
                    {showCalendar && <Calendar groups={groups} />}

                    <div className="main-content">
                        {/* 사이드바 */}
                        <div className="sidebar-area">
                            <div className="sidebar">
                                <h3>📋 저장된 단체 목록</h3>

                                <div className="archive-tabs">
                                    <button type="button"
                                        className={`archive-tab ${activeTab === 'active' ? 'active' : ''}`}
                                        onClick={() => setActiveTab('active')}
                                    >
                                        진행 중 <span className="archive-badge">{activeGroupCount}</span>
                                    </button>
                                    <button type="button"
                                        className={`archive-tab ${activeTab === 'archived' ? 'active' : ''}`}
                                        onClick={() => setActiveTab('archived')}
                                    >
                                        지난 행사 <span className="archive-badge">{archivedGroupCount}</span>
                                    </button>
                                </div>

                                <div className="search-box">
                                    <input
                                        type="text"
                                        placeholder="단체명 검색..."
                                        value={groupSearchTerm}
                                        onChange={(e) => setGroupSearchTerm(e.target.value)}
                                    />
                                </div>

                                {activeTab === 'active' && (
                                    <button type="button"
                                        className="btn btn-accent"
                                        style={{ width: '100%', marginBottom: '16px' }}
                                        onClick={() => setShowModal(true)}
                                    >
                                        ➕ 새 단체 만들기
                                    </button>
                                )}

                                <div className="group-list">
                                    {filteredGroups.length === 0 ? (
                                        <div style={{ textAlign: 'center', padding: '20px', color: '#999' }}>
                                            {groups.length === 0 ? '저장된 단체가 없습니다' :
                                             activeTab === 'archived' && archivedGroupCount === 0 ? '지난 행사가 없습니다' :
                                             '검색 결과가 없습니다'}
                                        </div>
                                    ) : (
                                        <>
                                            {groupSearchTerm && (
                                                <div className="search-result-info">
                                                    검색 결과: {filteredGroups.length}개 단체
                                                </div>
                                            )}
                                            {filteredGroups.map(group => (
                                                <div
                                                    key={group.id}
                                                    className={`group-item ${currentGroup === group.id ? 'active' : ''}`}
                                                    onClick={() => setCurrentGroup(group.id)}
                                                >
                                                    <div className="group-info">
                                                        <div className="group-name">{group.name}</div>
                                                        {group.destination && (
                                                            <div className="group-destination" style={{ fontSize: '13px', color: '#4CAF50', marginTop: '4px' }}>
                                                                📍 {group.destination}
                                                            </div>
                                                        )}
                                                        {(group.departureDate || group.returnDate) && (
                                                            <div style={{ fontSize: '12px', color: '#2196F3', marginTop: '4px', lineHeight: '1.6' }}>
                                                                {group.departureDate && <div>출발 {group.departureDate}</div>}
                                                                {group.returnDate && <div>귀국 {group.returnDate}</div>}
                                                            </div>
                                                        )}
                                                        <div className="group-meta">
                                                            {group.members.length}명 · {new Date(group.createdAt).toLocaleDateString()}
                                                        </div>
                                                    </div>
                                                    <div className="group-actions" onClick={e => e.stopPropagation()}>
                                                        {activeTab === 'active' ? (
                                                            <>
                                                                <button type="button"
                                                                    className="btn-archive"
                                                                    onClick={() => archiveGroup(group.id)}
                                                                    title="지난 행사로 이동"
                                                                    style={{ background: '#f0f0f0' }}
                                                                >
                                                                    📦
                                                                </button>
                                                                <button type="button"
                                                                    className="btn-icon"
                                                                    onClick={() => openEditGroupModal(group.id)}
                                                                    title="단체명 수정"
                                                                    style={{ background: '#4CAF50', color: 'white' }}
                                                                >
                                                                    ✏️

                                    취소
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
