                    let extractedDestination = '';
                    let extractedDepartureDate = '';
                    let extractedReturnDate = '';

                    for (const sheetName of workbook.SheetNames) {
                        const worksheet = workbook.Sheets[sheetName];
                        const sheetData = XLSX.utils.sheet_to_json(worksheet, { header: 1, raw: false });

                        // 상위 5개 행에서 제목 정보 찾기 (모든 셀 검사)
                        for (let i = 0; i < Math.min(sheetData.length, 5); i++) {
                            const row = sheetData[i];
                            if (!row || row.length === 0) continue;

                            // 모든 셀 검사
                            for (let j = 0; j < row.length; j++) {
                                const cellValue = String(row[j] || '').trim();
                                if (!cellValue) continue;

                                // 단체명 패턴: "지역 - 단체명" 형식 (한글 포함, 날짜 제외)
                                if (cellValue.includes('-') && !cellValue.includes('년') && !extractedGroupName) {
                                    // YYYY-MM-DD 형식의 날짜는 제외
                                    const isDate = /^\d{4}-\d{2}-\d{2}/.test(cellValue);
                                    // 한글이 포함되어 있는지 확인
                                    const hasKorean = /[ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/.test(cellValue);

                                    if (!isDate && hasKorean) {
                                        extractedGroupName = cellValue;
                                        // 여행지 추출 (앞부분)
                                        const parts = cellValue.split('-');
                                        if (parts.length > 0) {
                                            extractedDestination = parts[0].trim();
                                        }
                                    }
                                }

                                // 날짜 패턴: "25년12월17일 ~12월 23일" 형식
                                if (cellValue.includes('년') && cellValue.includes('월') && cellValue.includes('일') && !extractedDepartureDate) {
                                    try {
                                        // "25년12월17일 ~12월 23일" 또는 "25년12월17일~12월23일" 파싱
                                        const dateMatch = cellValue.match(/(\d{2})년(\d{1,2})월(\d{1,2})일\s*~\s*(\d{1,2})월\s*(\d{1,2})일/);
                                        if (dateMatch) {
                                            const year = '20' + dateMatch[1]; // 25 → 2025
                                            const startMonth = dateMatch[2].padStart(2, '0');
                                            const startDay = dateMatch[3].padStart(2, '0');
                                            const endMonth = dateMatch[4].padStart(2, '0');
                                            const endDay = dateMatch[5].padStart(2, '0');

                                            extractedDepartureDate = `${year}-${startMonth}-${startDay}`;
                                            extractedReturnDate = `${year}-${endMonth}-${endDay}`;
                                        }
                                    } catch (err) {
                                        console.warn('날짜 파싱 오류:', err);
                                    }
                                }
                            }
                        }

                        // 헤더 찾기
                        for (let i = 0; i < Math.min(sheetData.length, 20); i++) {
                            const row = sheetData[i];
                            if (!row || row.length === 0) continue;

                            const firstCell = String(row[0] || '').trim().toUpperCase();
                            if (firstCell === 'NO' || firstCell === 'NUM' || firstCell === '번호') {
                                selectedSheet = sheetName;
                                headerIndex = i;
                                jsonData = sheetData;

                                // 추출된 정보를 state에 자동 입력
                                if (extractedGroupName && !newGroupName) {
                                    setNewGroupName(extractedGroupName);
                                }
                                if (extractedDestination && !newGroupDestination) {
                                    setNewGroupDestination(extractedDestination);
                                }
                                if (extractedDepartureDate && !newGroupDepartureDate) {
                                    setNewGroupDepartureDate(extractedDepartureDate);
                                }
                                if (extractedReturnDate && !newGroupReturnDate) {
                                    setNewGroupReturnDate(extractedReturnDate);
                                }

                                break;
                            }

                            const rowStr = row.map(c => String(c || '').trim().toLowerCase()).join('|');
                            if (rowStr.includes('한글') || rowStr.includes('이름') || rowStr.includes('name')) {
                                if (rowStr.includes('여권') || rowStr.includes('생년월일') || rowStr.includes('passport') || rowStr.includes('birth')) {
                                    selectedSheet = sheetName;
                                    headerIndex = i;
                                    jsonData = sheetData;

                                    // 추출된 정보를 state에 자동 입력
                                    if (extractedGroupName && !newGroupName) {
                                        setNewGroupName(extractedGroupName);
                                    }
                                    if (extractedDestination && !newGroupDestination) {
                                        setNewGroupDestination(extractedDestination);
                                    }
                                    if (extractedDepartureDate && !newGroupDepartureDate) {
                                        setNewGroupDepartureDate(extractedDepartureDate);
                                    }
                                    if (extractedReturnDate && !newGroupReturnDate) {
                                        setNewGroupReturnDate(extractedReturnDate);
                                    }

                                    break;
                                }
                            }
                        }

                        if (selectedSheet) break;
                    }

                    if (!selectedSheet || !jsonData) {
                        showToast('엑셀 파일에서 헤더를 찾을 수 없습니다.', 'warning');
                        return;
                    }

                    const headers = jsonData[headerIndex];
                    const dataRows = jsonData.slice(headerIndex + 1);

                    const getColIndex = (names) => {
                        for (let name of names) {
                            const idx = headers.findIndex(h => {
                                const headerStr = String(h || '').trim().toLowerCase();
                                return headerStr === name.toLowerCase() || headerStr.includes(name.toLowerCase());
                            });
                            if (idx !== -1) return idx;
                        }
                        return -1;
                    };

                    const noIdx = getColIndex(['NO', 'no', 'NUM', '번호']);
                    const nameKrIdx = getColIndex(['한글', '이름', '성명']);
                    const surnameIdx = getColIndex(['성']);
                    const givenNameIdx = getColIndex(['명']);
                    const nameEnIdx = getColIndex(['영문', 'NAME']);
                    const genderIdx = getColIndex(['성별', 'Gender', 'SEX']);
                    const passportIdx = getColIndex(['여권번호', 'Passport', '여권']);
                    const birthIdx = getColIndex(['생년월일', 'Birth', 'DOB']);
                    const idNoIdx = getColIndex(['ID NO', 'IDNO', 'ID']);
                    const expireIdx = getColIndex(['여권만료일', 'Expiry', '만료일']);
                    const phoneIdx = getColIndex(['전화번호', 'Phone', 'Tel']);
                    const roomIdx = getColIndex(['ROOM', 'Room', '방']);

                    const hasNoColumn = noIdx !== -1;

                    const parsedData = dataRows
                        .filter(row => {
                            if (!row || row.length === 0) return false;
                            if (hasNoColumn) {
                                return row[noIdx] && String(row[noIdx]).trim() !== '';
                            } else {
                                const hasName = (nameKrIdx !== -1 && row[nameKrIdx] && String(row[nameKrIdx]).trim() !== '') ||
                                               (nameEnIdx !== -1 && row[nameEnIdx] && String(row[nameEnIdx]).trim() !== '');
                                return hasName;
                            }
                        })
                        .map((row, idx) => {
                            try {
                                let nameEn = '';
                                if (surnameIdx !== -1 && givenNameIdx !== -1) {
                                    const surname = (row[surnameIdx] || '').toString().trim();
                                    const givenName = (row[givenNameIdx] || '').toString().trim();
                                    if (surname && givenName) {
                                        nameEn = `${surname}/${givenName}`;
                                    } else {
                                        nameEn = surname || givenName;
                                    }
                                } else if (nameEnIdx !== -1) {
                                    nameEn = (row[nameEnIdx] || '').toString().trim();
                                    if (nameEn && !nameEn.includes('/') && nameEn.includes(' ')) {
                                        const parts = nameEn.split(/\s+/);
                                        if (parts.length >= 2) {
                                            nameEn = parts[0] + '/' + parts.slice(1).join(' ');
                                        }
                                    }
                                }

                                let rawGender = genderIdx !== -1 ? row[genderIdx] : '';
                                const gender = normalizeGender(rawGender) || 'M';

                                let birthDate = '';
                                try {
                                    birthDate = birthIdx !== -1 ? formatDate(row[birthIdx], 'birth') : '';
                                } catch (dateError) {
                                    console.warn(`생년월일 파싱 오류 (행 ${idx + 1}):`, dateError);
                                    birthDate = '';
                                }

                                let idNo = '';
                                if (idNoIdx !== -1 && row[idNoIdx]) {
                                    idNo = (row[idNoIdx] || '').toString().trim();
                                }
                                if (!idNo && birthDate && gender) {
                                    try {
                                        idNo = generateIdNo(gender, birthDate);
                                    } catch (idError) {
                                        console.warn(`ID 생성 오류 (행 ${idx + 1}):`, idError);
                                        idNo = '';
                                    }
                                }

                                let passportExpire = '';
                                try {
                                    passportExpire = expireIdx !== -1 ? formatDate(row[expireIdx], 'passport') : '';
                                } catch (expireError) {
                                    console.warn(`여권만료일 파싱 오류 (행 ${idx + 1}):`, expireError);
                                    passportExpire = '';
                                }

                                return {
                                    no: hasNoColumn ? (parseInt(row[noIdx]) || idx + 1) : idx + 1,
                                    nameKor: nameKrIdx !== -1 ? (row[nameKrIdx] || '').toString().trim() : '',
                                    nameEn: formatEnglishName(nameEn, gender, birthDate),
                                    gender: gender,
                                    passportNo: passportIdx !== -1 ? (row[passportIdx] || '').toString().trim().toUpperCase() : '',
                                    birthDate: birthDate,
                                    idNo: idNo,
                                    passportExpire: passportExpire,
                                    phone: formatPhoneNumber(phoneIdx !== -1 ? (row[phoneIdx] || '').toString().trim() : ''),
                                    room: roomIdx !== -1 ? (row[roomIdx] || '').toString().trim() : ''
                                };
                            } catch (rowError) {
                                console.error(`행 ${idx + 1} 파싱 오류:`, rowError);
                                return null;
                            }
                        })
                        .filter(item => item !== null);

                    if (parsedData.length === 0) {
                        showToast('엑셀 파일에서 유효한 데이터를 찾을 수 없습니다.', 'warning');
                        return;
                    }

                    setNewGroupExcelData(parsedData);

                    // 성공 메시지 생성
                    let message = `✅ ${parsedData.length}명의 데이터를 불러왔습니다.\n`;

                    // 자동 추출된 정보 표시
                    const extracted = [];
                    if (extractedGroupName) extracted.push(`📋 단체명: ${extractedGroupName}`);
                    if (extractedDestination) extracted.push(`📍 여행지: ${extractedDestination}`);
                    if (extractedDepartureDate && extractedReturnDate) {
                        extracted.push(`📅 일정: ${extractedDepartureDate} ~ ${extractedReturnDate}`);
                    }

                    if (extracted.length > 0) {
                        message += '\n자동으로 추출된 정보:\n' + extracted.join('\n');
                        message += '\n\n필요시 수정 후 "생성" 버튼을 클릭하세요.';
                    } else {
                        message += '\n단체 정보를 입력하고 "생성" 버튼을 클릭하세요.';
                    }

                    showToast(message, 'success', 5000);

                } catch (error) {
                    console.error('❌ 엑셀 읽기 오류:', error);
                    showToast(`엑셀 파일을 읽는 중 오류가 발생했습니다: ${error.message}`, 'error', 5000);
                }
            };

            // 새 단체 생성
            const createNewGroup = async () => {
                if (!newGroupName.trim()) {
                    showToast('단체명을 입력하세요.', 'warning');
                    return;
                }

                const newGroup = {
                    id: `group-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`,
                    name: newGroupName.trim(),
                    destination: newGroupDestination.trim(),
                    departureDate: newGroupDepartureDate,
                    returnDate: newGroupReturnDate,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString(),
                    members: newGroupExcelData.length > 0 ? newGroupExcelData : []
                };

                // API로 그룹 생성
                const apiGroup = {
                    id: newGroup.id,
                    name: newGroup.name,
                    destination: newGroup.destination || '',
                    departure_date: newGroup.departureDate || '',
                    return_date: newGroup.returnDate || '',
                    members: JSON.stringify(newGroup.members),
                    created_at: newGroup.createdAt,
                    updated_at: newGroup.updatedAt
                };

                try {
                    await fetch('/tables/groups', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(apiGroup)
                    });
                } catch (err) {
                    console.error('API 그룹 생성 실패:', err);
                }

                const updatedGroups = [...groups, newGroup];
                saveRostersToServer(updatedGroups);
                setGroups(updatedGroups);
                setCurrentGroup(newGroup.id);
                setNewGroupName('');
                setNewGroupDestination('');
                setNewGroupDepartureDate('');
                setNewGroupReturnDate('');
                setNewGroupExcelData([]);
                setFlightScheduleText('');
                setParsedFlightData([]);
                setShowModal(false);

                // 파싱된 항공편 데이터가 있으면 DB에 저장
                if (parsedFlightData.length > 0) {
                    for (const flight of parsedFlightData) {
                        try {
                            await fetch('/api/flight-schedules', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    group_id: newGroup.id,
                                    group_name: newGroup.name,
                                    airline: flight.airline,
                                    flight_number: flight.flight_number,
                                    departure_date: flight.departure_date,
                                    departure_airport: flight.departure_airport,
                                    departure_time: flight.departure_time,
                                    arrival_date: flight.arrival_date,
                                    arrival_airport: flight.arrival_airport,
                                    arrival_time: flight.arrival_time,
                                    passengers: newGroup.members.length
                                })
                            });
                        } catch (err) {
                            console.error('항공 스케줄 DB 저장 오류:', err);
                        }
                    }
                }

                // 엑셀 데이터가 있었다면 자동으로 고객 관리에 추가
                if (newGroup.members.length > 0) {
                    try {
                        await GroupSyncManager.syncGroup(newGroup, { confirm: false });
                    } catch (err) {
                        console.error('고객 관리 동기화 오류:', err);
                    }
                }

                // 상품 자동 생성 (같은 목적지라도 단체명/날짜가 다르면 생성)
                if (newGroup.destination && newGroup.departureDate && newGroup.returnDate) {
                    try {
                        // 여행 기간 계산
                        const departureDate = new Date(newGroup.departureDate);
                        const returnDate = new Date(newGroup.returnDate);
                        const duration = Math.ceil((returnDate - departureDate) / (1000 * 60 * 60 * 24)) + 1;

                        // 기존 상품 확인 (중복 방지: 단체명 기준)
                        const existingProductsResponse = await fetch('/tables/products');
                        const existingProductsData = await existingProductsResponse.json();
                        const existingProducts = Array.isArray(existingProductsData) ? existingProductsData : (existingProductsData.data || []);

                        // 같은 단체명의 상품이 이미 있는지 확인
                        const duplicate = existingProducts.find(p =>
                            p.description && p.description.includes(newGroup.name)
                        );

                        if (!duplicate) {
                            // 새 상품 생성 (상품명: 목적지)
                            const newProduct = {
                                id: crypto.randomUUID(),
                                name: `${newGroup.destination}`,
                                destination: newGroup.destination,
                                duration: duration,
                                price: 0,
                                status: 'active',
                                description: `${newGroup.name} (${newGroup.departureDate} ~ ${newGroup.returnDate})`,
                                created_at: new Date().toISOString()
                            };

                            const createProductResponse = await fetch('/tables/products', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(newProduct)
                            });

                            if (!createProductResponse.ok) {
                                console.error('❌ 상품 생성 실패:', await createProductResponse.text());
                            }
                        }
                    } catch (err) {
                        console.error('상품 자동 생성 오류:', err);
                    }
                }
            };

            // 단체 삭제
            const deleteGroup = async (groupId) => {
                if (!await showConfirmModal('단체 삭제', '이 단체를 삭제하시겠습니까?', { danger: true })) return;

                // API로 그룹 삭제
                try {
                    await fetch(`/tables/groups/${groupId}`, {
                        method: 'DELETE'
                    });
                } catch (err) {
                    console.error('API 그룹 삭제 실패:', err);
                }

                const updatedGroups = groups.filter(g => g.id !== groupId);
                saveRostersToServer(updatedGroups);
                setGroups(updatedGroups);

                if (currentGroup === groupId) {
                    if (updatedGroups.length > 0) {
                        setCurrentGroup(updatedGroups[0].id);
                    } else {
                        setCurrentGroup(null);
                        setData([]);
                    }
                }
            };

            // 단체 아카이브
            const archiveGroup = async (groupId) => {
                const now = new Date().toISOString();
                const group = groups.find(g => g.id === groupId);

                try {
                    await fetch(`/tables/groups/${groupId}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ is_archived: 1, archived_at: now })
                    });
                } catch (err) {
                    console.error('아카이브 API 실패:', err);
                }

                // 완료 시 고객 DB 일괄 갱신 (단체명, 여행지역, 여행이력)
                if (group && group.members && group.members.length > 0) {
                    const destination = group.destination || '';
                    const departureDate = group.departureDate || '';
                    const historyEntry = destination
                        ? (departureDate ? `${destination}(${departureDate})` : destination)
                        : '';

                    for (const member of group.members) {
                        if (!member.passportNo && !member.nameKor) continue;
                        try {
                            let matched = null;
                            if (member.passportNo) {
                                const res = await fetch(`/tables/customers?search=${encodeURIComponent(member.passportNo)}`);
                                const result = await res.json();
                                const list = result.data || result;
                                matched = Array.isArray(list) ? list.find(c => c.passport_number === member.passportNo) : null;
                            }
                            if (matched) {
                                const patch = {
                                    group_name: group.name || matched.group_name,
                                    departure_date: departureDate || matched.departure_date,
                                    travel_region: destination || matched.travel_region,
                                    last_modified: now
                                };
                                // 여행이력 자동 추가 (중복 방지)
                                if (historyEntry) {
                                    const existing = matched.travel_history || '';
                                    const items = existing ? existing.split(',').map(s => s.trim()) : [];
                                    if (!items.some(item => item === historyEntry)) {
                                        patch.travel_history = existing ? `${historyEntry}, ${existing}` : historyEntry;
                                    }
                                }
                                await fetch(`/tables/customers/${matched.id}`, {
                                    method: 'PATCH',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify(patch)
                                });
                            }
                        } catch (err) {
                            console.error('완료 시 고객 갱신 실패:', member.nameKor, err);
                        }
                    }
                }

                const updatedGroups = groups.map(g =>
                    g.id === groupId ? { ...g, isArchived: 1, archivedAt: now } : g
                );
                setGroups(updatedGroups);
                saveRostersToServer(updatedGroups);
                // 아카이브된 그룹이 현재 선택된 그룹이면 다른 활성 그룹으로 전환
                if (currentGroup === groupId) {
                    const nextActive = updatedGroups.find(g => !g.isArchived && g.id !== groupId);
                    if (nextActive) {
                        setCurrentGroup(nextActive.id);
                        setData(nextActive.members);
                    }
                }
                showToast(`"${group?.name}" 단체가 완료 처리되었습니다. 고객 여행이력이 갱신되었습니다.`, 'success');
            };

            // 단체 아카이브 복원
            const restoreGroup = async (groupId) => {
                try {
                    await fetch(`/tables/groups/${groupId}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ is_archived: 0, archived_at: null })
                    });
                } catch (err) {
                    console.error('복원 API 실패:', err);
                }
                const updatedGroups = groups.map(g =>
                    g.id === groupId ? { ...g, isArchived: 0, archivedAt: null } : g
                );
                setGroups(updatedGroups);
                saveRostersToServer(updatedGroups);
            };

            // 단체명 수정 모달 열기
            const openEditGroupModal = (groupId) => {
                const group = groups.find(g => g.id === groupId);
                if (group) {
                    setEditingGroupId(groupId);
                    setEditGroupName(group.name);
                    setEditGroupDestination(group.destination || '');
                    setEditGroupDepartureDate(group.departureDate || '');
                    setEditGroupReturnDate(group.returnDate || '');
                    setShowEditGroupModal(true);
                }
            };

            // 단체 정보 수정 저장
            const saveGroupInfo = () => {
                if (!editGroupName.trim()) {
                    showToast('단체명을 입력하세요.', 'warning');
                    return;
                }

                const oldGroup = groups.find(g => g.id === editingGroupId);

                const updatedGroups = groups.map(g =>
                    g.id === editingGroupId
                        ? {
                            ...g,
                            name: editGroupName.trim(),
                            destination: editGroupDestination.trim(),
                            departureDate: editGroupDepartureDate,
                            returnDate: editGroupReturnDate,
                            updatedAt: new Date().toISOString()
                        }
                        : g
                );

                saveToLocalStorage(updatedGroups);

                // 고객관리에 단체 정보 변경 알림 (단체명 또는 여행지역이 변경된 경우)
                if (oldGroup && (oldGroup.name !== editGroupName.trim() || oldGroup.destination !== editGroupDestination.trim())) {
                    window.parent.postMessage({
                        type: 'UPDATE_GROUP_INFO',
                        oldGroupName: oldGroup.name,
                        newGroupName: editGroupName.trim(),
                        destination: editGroupDestination.trim(),
                        departureDate: editGroupDepartureDate
                    }, '*');

                    // 고객 DB 직접 갱신 (iframe 외부에서도 동작하도록)
                    (async () => {
                        try {
                            const res = await fetch('/tables/customers');
                            const result = await res.json();
                            const customers = result.data || result;
                            const affected = customers.filter(c => c.group_name === oldGroup.name);
                            for (const customer of affected) {
                                await fetch(`/tables/customers/${customer.id}`, {
                                    method: 'PATCH',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        group_name: editGroupName.trim(),
                                        travel_region: editGroupDestination.trim() || customer.travel_region,
                                        departure_date: editGroupDepartureDate || customer.departure_date,
                                        last_modified: new Date().toISOString()
                                    })
                                });
                            }
                            if (affected.length > 0) {
                                showToast(`고객 ${affected.length}명의 단체명이 변경되었습니다.`, 'info');
                            }
                        } catch (err) {
                            console.error('고객 DB 단체명 갱신 실패:', err);
                        }
                    })();
                }

                setShowEditGroupModal(false);
                setEditingGroupId(null);
                setEditGroupName('');
                setEditGroupDestination('');
                setEditGroupDepartureDate('');
                setEditGroupReturnDate('');
                showToast('단체 정보가 변경되었습니다.', 'success');
            };

            // 현재 단체의 데이터 저장
            // 통합 고객 DB 저장 함수 - 어디서든 이 함수로 고객 저장하면 그룹 정보 자동 포함
            const upsertCustomerToDB = async (member, options = {}) => {
                const { passportFileData, passportFileName } = options;
                if (!member.passportNo && !member.nameKor && !member.nameEn) return;

                const curGroup = groups.find(g => g.id === currentGroup);
                const groupInfo = {
                    group_name: curGroup?.name || '',
                    departure_date: curGroup?.departureDate || curGroup?.departure_date || '',
                    travel_region: curGroup?.destination || ''
                };

                try {
                    // 여권번호로 기존 고객 검색
                    let matched = null;
                    if (member.passportNo) {
                        const res = await fetch(`/tables/customers?search=${encodeURIComponent(member.passportNo)}`);
                        const result = await res.json();
                        const list = result.data || result;
                        matched = Array.isArray(list) ? list.find(c => c.passport_number === member.passportNo) : null;
                    }

                    const nameEn = member.nameEn || member.nameEng || '';

                    if (matched) {
                        // 기존 고객 업데이트
                        // 현재 단체 정보가 있으면 항상 덮어씌움 (새 단체에 추가된 경우 반영)
                        const patch = {
                            name_kor: member.nameKor || matched.name_kor,
                            name_eng: nameEn || matched.name_eng,
                            passport_expiry: member.passportExpire || matched.passport_expiry,
                            birth_date: member.birthDate || matched.birth_date,
                            phone: formatPhoneNumber(member.phone) || matched.phone,
                            gender: member.gender || matched.gender,
                            group_name: groupInfo.group_name ? groupInfo.group_name : matched.group_name,
                            departure_date: groupInfo.departure_date ? groupInfo.departure_date : matched.departure_date,
                            travel_region: groupInfo.travel_region ? groupInfo.travel_region : matched.travel_region,
                            last_modified: new Date().toISOString()
                        };
                        // 여행이력 자동 누적 (여행지역 + 출발일 조합, 동일 항목만 중복 방지)
                        if (groupInfo.travel_region) {
                            const historyEntry = groupInfo.departure_date
                                ? `${groupInfo.travel_region}(${groupInfo.departure_date})`
                                : groupInfo.travel_region;
                            const existingHistory = matched.travel_history || '';
                            const items = existingHistory ? existingHistory.split(',').map(s => s.trim()) : [];
                            if (!items.some(item => item === historyEntry)) {
                                patch.travel_history = existingHistory
                                    ? `${historyEntry}, ${existingHistory}`
                                    : historyEntry;
                            }
                        }
                        if (passportFileData) {
                            patch.passport_file_name = passportFileName || '';
                            patch.passport_file_data = passportFileData;
                        }
                        await fetch(`/tables/customers/${matched.id}`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(patch)
                        });
                    } else if (member.passportNo) {
                        // 새 고객 생성
                        const initialHistory = groupInfo.travel_region
                            ? (groupInfo.departure_date ? `${groupInfo.travel_region}(${groupInfo.departure_date})` : groupInfo.travel_region)
                            : '';
                        const newCust = {
                            id: `cust-${Date.now()}-${Math.random().toString(36).substr(2, 6)}`,
                            name_kor: member.nameKor || '',
                            name_eng: nameEn ? nameEn.replace('/', ' ') : '',
                            passport_number: member.passportNo,
                            birth_date: member.birthDate || '',
                            passport_expiry: member.passportExpire || '',
                            gender: member.gender || '',
                            phone: formatPhoneNumber(member.phone) || '',
                            ...groupInfo,
                            travel_history: initialHistory,
                            last_modified: new Date().toISOString()
                        };
                        if (passportFileData) {
                            newCust.passport_file_name = passportFileName || '';
                            newCust.passport_file_data = passportFileData;
                        }
                        await fetch('/tables/customers', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newCust)
                        });
                    }
                } catch (err) {
                    console.error('고객 DB 저장 실패:', member.passportNo || member.nameKor, err);
                }
            };

            const saveCurrentGroupData = async (newData, syncToCustomers = false) => {
                const updatedGroups = groups.map(g =>
                    g.id === currentGroup
                        ? { ...g, members: newData, updatedAt: new Date().toISOString() }
                        : g
                );
                saveToLocalStorage(updatedGroups);
                setData(newData);

                // TASK-514: GroupSyncManager를 통한 자동 동기화
                if (syncToCustomers && newData && newData.length > 0 && window.GroupSyncManager) {
                    const currentGroupData = groups.find(g => g.id === currentGroup);
                    if (currentGroupData) {
                        try {
                            const result = await GroupSyncManager.syncGroup({
                                ...currentGroupData,
                                members: newData
                            }, { confirm: true });
                        } catch (error) {
                            console.error('❌ 동기화 오류:', error);
                        }
                    }
                    return; // 새로운 동기화 시스템 사용 시 기존 로직 건너뛰기
                }

                // 기존 고객 관리에 자동으로 추가 (레거시 지원, syncToCustomers가 true일 때만)
                if (syncToCustomers && newData && newData.length > 0) {

                    // 현재 그룹명, 여행지역, 출발일 찾기
                    const currentGroupData = groups.find(g => g.id === currentGroup);
                    const groupName = currentGroupData ? currentGroupData.name : '';
                    const destination = currentGroupData ? currentGroupData.destination : '';
                    const departureDate = currentGroupData ? currentGroupData.departureDate : '';

                    // 순차적으로 처리하기 위해 async 함수 사용
                    (async () => {
                        let successCount = 0;
                        let failCount = 0;

                        for (let index = 0; index < newData.length; index++) {
                            const member = newData[index];

                            // nameKr와 nameKor 둘 다 지원 (호환성)
                            const nameKor = member.nameKor || member.nameKr || '';
                            const nameEng = member.nameEng || member.nameEn || '';

                            if (member.passportNo || nameKor || nameEng) {
                                const customerData = {
                                    type: 'ADD_CUSTOMER_FROM_ROSTER',
                                    customer: {
                                        nameKor: nameKor,
                                        한글명: nameKor,
                                        nameEng: nameEng,
                                        영문명: nameEng,
                                        passportNumber: member.passportNo,
                                        여권번호: member.passportNo,
                                        birthDate: formatDate(member.birthDate, 'birth') || '',
                                        생년월일: formatDate(member.birthDate, 'birth') || '',
                                        passportExpiry: formatDate(member.passportExpire, 'passport') || '',
                                        여권만료일: formatDate(member.passportExpire, 'passport') || '',
                                        phone: member.phone || '',
                                        연락처: member.phone || '',
                                        email: '',
                                        이메일: '',
                                        groupName: groupName,
                                        단체명: groupName,
                                        destination: destination,
                                        여행지역: destination,
                                        departureDate: departureDate,
                                        출발일: departureDate,
                                        gender: member.gender || '',
                                        성별: member.gender || ''
                                    }
                                };

                                // window.parent가 존재하는지 확인
                                if (window.parent && window.parent !== window) {
                                    try {
                                        window.parent.postMessage(customerData, '*');

                                        // 각 요청 사이에 200ms 대기 (서버 과부하 방지)
                                        await new Promise(resolve => setTimeout(resolve, 200));
                                        successCount++;
                                    } catch (error) {
                                        console.error(`❌ 전송 실패 (${index + 1}):`, nameKor, error);
                                        failCount++;
                                    }
                                } else {
                                    console.warn('⚠️ window.parent를 찾을 수 없습니다. iframe 내부가 아닌 것 같습니다.');
                                    failCount++;
                                }
                            }
                        }

                        // 사용자에게 결과 알림
                        setTimeout(() => {
                            if (failCount === 0) {
                                showToast(`고객관리에 동기화 완료! ${successCount}명의 고객이 추가되었습니다.`, 'success');
                            } else {
                                showToast(`고객관리에 동기화 완료 - 성공: ${successCount}명, 실패: ${failCount}명`, 'warning', 5000);
                            }
                        }, (newData.length * 200) + 500);
                    })();
                }
            };

            // 단체 전체를 예약으로 생성
            const createBookingFromGroup = () => {
                if (!currentGroup) {
                    showToast('단체를 선택해주세요.', 'warning');
                    return;
                }

                const currentGroupData = groups.find(g => g.id === currentGroup);
                if (!currentGroupData) {
                    showToast('단체 정보를 찾을 수 없습니다.', 'error');
                    return;
                }

                // 유효한 멤버만 필터링 (이름이나 여권번호가 있는 경우)
                const validMembers = data.filter(member => {
                    const nameKor = member.nameKor || member.nameKr || '';
                    const nameEng = member.nameEng || member.nameEn || '';
                    const passportNo = member.passportNo || '';
                    return nameKor || nameEng || passportNo;
                });

                if (validMembers.length === 0) {
                    showToast('단체에 멤버가 없습니다.', 'warning');
                    return;
                }

                // 부모창에 메시지 전송
                window.parent.postMessage({
                    type: 'CREATE_BOOKING_FROM_GROUP',
                    groupData: {
                        name: currentGroupData.name,
                        destination: currentGroupData.destination,
                        departureDate: currentGroupData.departureDate,
                        returnDate: currentGroupData.returnDate,
                        members: validMembers
                    }
                }, '*');

                showToast(`단체 "${currentGroupData.name}" (${validMembers.length}명)의 예약 생성을 시작합니다. 고객관리로 전환됩니다.`, 'info', 5000);
            };

            // 만 나이 계산
            const calculateAge = (birthDate) => {
                if (!birthDate) return null;

                const today = new Date();
                const birth = new Date(birthDate);
                let age = today.getFullYear() - birth.getFullYear();
                const monthDiff = today.getMonth() - birth.getMonth();

                if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
                    age--;
                }

                return age;
            };

            // MSTR/MISS 추가
            const formatEnglishName = (nameEn, gender, birthDate) => {
                if (!nameEn) return '';

                let cleanName = nameEn.replace(/^(MSTR|MISS)\s+/i, '').trim();

                if (!cleanName.includes('/') && cleanName.includes(' ')) {
                    const parts = cleanName.split(/\s+/);
                    if (parts.length >= 2) {
                        cleanName = parts[0] + '/' + parts.slice(1).join(' ');
                    }
                }

                const age = calculateAge(birthDate);

                if (age !== null && age < 15) {
                    if (gender === 'M') {
                        return `MSTR ${cleanName}`;
                    } else if (gender === 'F') {
                        return `MISS ${cleanName}`;
                    }
                }

                return cleanName;
            };

            // 전화번호 자동 포맷 (010 0000 0000 → +82 10-0000-0000)
            const formatPhoneNumber = (phone) => {
                if (!phone) return '';
                let cleaned = phone.replace(/[\s\-\.\(\)]/g, '');

                // 이미 올바른 +82 포맷이면 그대로 반환
                if (/^\+82\s?\d{1,2}-\d{3,4}-\d{4}$/.test(phone.trim())) return phone.trim();

                // +82 또는 82 접두어 → 0 붙여서 정규화
                if (cleaned.startsWith('+82')) cleaned = '0' + cleaned.substring(3);
                else if (cleaned.startsWith('82') && cleaned.length >= 11) cleaned = '0' + cleaned.substring(2);

                // 010XXXXXXXX (11자리) → +82 10-XXXX-XXXX
                if (/^010\d{8}$/.test(cleaned)) {
                    return `+82 10-${cleaned.substring(3, 7)}-${cleaned.substring(7)}`;
                }
                // 011/016/017/018/019 (10~11자리)
                if (/^01[1-9]\d{7,8}$/.test(cleaned)) {
                    const prefix = cleaned.substring(1, 3);
                    const rest = cleaned.substring(3);
                    if (rest.length === 8) return `+82 ${prefix}-${rest.substring(0, 4)}-${rest.substring(4)}`;
                    if (rest.length === 7) return `+82 ${prefix}-${rest.substring(0, 3)}-${rest.substring(3)}`;
                }

                return phone;
            };

            // 필드 업데이트
            const updateField = (index, field, value) => {
                const newData = [...data];
                // 전화번호 자동 포맷
                if (field === 'phone') value = formatPhoneNumber(value);
                newData[index][field] = value;

                if (field === 'gender' || field === 'birthDate') {
                    const newId = generateIdNo(
                        field === 'gender' ? value : newData[index].gender,
                        field === 'birthDate' ? value : newData[index].birthDate
                    );
                    if (newId) {
                        newData[index].idNo = newId;
                    }
                }

                if (field === 'nameEn' || field === 'gender' || field === 'birthDate') {
                    const currentNameEn = field === 'nameEn' ? value : newData[index].nameEn;
                    const currentGender = field === 'gender' ? value : newData[index].gender;
                    const currentBirthDate = field === 'birthDate' ? value : newData[index].birthDate;

                    newData[index].nameEn = formatEnglishName(currentNameEn, currentGender, currentBirthDate);
                }

                saveCurrentGroupData(newData);

                // 고객 DB 자동 동기화 (중요 필드 변경 시)
                if (['nameKor', 'nameEn', 'passportNo', 'birthDate', 'phone', 'passportExpire', 'gender'].includes(field)) {
                    const member = newData[index];
                    if (member.passportNo || member.nameKor || member.nameEn) {
                        upsertCustomerToDB(member);

                        // 역동기화 방지: 전송 중 플래그 설정
                        isSyncingRef.current = true;
                        window.parent.postMessage({
                            type: 'UPDATE_CUSTOMER_FROM_ROSTER',
                            customer: {
                                nameKor: member.nameKor,
                                nameKr: member.nameKor,
                                nameEng: member.nameEn,
                                nameEn: member.nameEn,
                                passportNumber: member.passportNo,
                                passportNo: member.passportNo,
                                birthDate: member.birthDate,
                                phone: member.phone,
                                passportExpiry: member.passportExpire,
                                passportExpire: member.passportExpire,
                                gender: member.gender,
                                last_modified: new Date().toISOString()
                            }
                        }, '*');
                        // 500ms 후 플래그 해제 (역동기화 메시지가 올 시간 충분히 대기)
                        setTimeout(() => { isSyncingRef.current = false; }, 500);
                    }
                }
            };

            // 멤버 선택 토글
            const toggleMemberSelect = (no) => {
                setSelectedMembers(prev => {
                    const next = new Set(prev);
                    if (next.has(no)) next.delete(no);
                    else next.add(no);
                    return next;
                });
            };

            const toggleSelectAll = () => {
                if (selectedMembers.size === filteredData.length) {
                    setSelectedMembers(new Set());
                } else {
                    setSelectedMembers(new Set(filteredData.map(p => p.no)));
                }
            };

            // 멤버 이동 실행
            const moveMembersToGroup = async (targetGroupId) => {
                if (selectedMembers.size === 0 || !targetGroupId || targetGroupId === currentGroup) return;

                const targetGroup = groups.find(g => g.id === targetGroupId);
                if (!targetGroup) return;

                // 이동할 멤버와 남는 멤버 분리
                const moving = data.filter(m => selectedMembers.has(m.no));
                const remaining = data.filter(m => !selectedMembers.has(m.no));

                // 남는 멤버 no 재정렬
                remaining.forEach((m, i) => { m.no = i + 1; });

                // 대상 그룹에 추가 (no 이어서 부여)
                const startNo = targetGroup.members.length;
                const movedMembers = moving.map((m, i) => ({ ...m, no: startNo + i + 1 }));
                const newTargetMembers = [...targetGroup.members, ...movedMembers];

                // 양쪽 그룹 업데이트
                const updatedGroups = groups.map(g => {
                    if (g.id === currentGroup) return { ...g, members: remaining, updatedAt: new Date().toISOString() };
                    if (g.id === targetGroupId) return { ...g, members: newTargetMembers, updatedAt: new Date().toISOString() };
                    return g;
                });

                // 서버에 저장 (localStorage 폴백 포함)
                saveRostersToServer(updatedGroups);
                setGroups(updatedGroups);
                setData(remaining);
                setSelectedMembers(new Set());
                setShowMoveModal(false);

                // API에도 저장 시도
                try {
                    await fetch('/tables/groups/' + currentGroup, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ members: JSON.stringify(remaining) })
                    });
                    await fetch('/tables/groups/' + targetGroupId, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ members: JSON.stringify(newTargetMembers) })
                    });
                } catch (e) {
                }

                // 이동된 멤버들의 고객 DB 단체명 갱신
                const updatedTargetGroup = updatedGroups.find(g => g.id === targetGroupId);
                for (const member of movedMembers) {
                    if (member.passportNo || member.nameKor || member.nameEn) {
                        try {
                            // 여권번호로 기존 고객 검색
                            if (member.passportNo) {
                                const res = await fetch(`/tables/customers?search=${encodeURIComponent(member.passportNo)}`);
                                const result = await res.json();
                                const list = result.data || result;
                                const matched = Array.isArray(list) ? list.find(c => c.passport_number === member.passportNo) : null;
                                if (matched) {
                                    await fetch(`/tables/customers/${matched.id}`, {
                                        method: 'PATCH',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({
                                            group_name: updatedTargetGroup?.name || '',
                                            departure_date: updatedTargetGroup?.departureDate || '',
                                            travel_region: updatedTargetGroup?.destination || '',
                                            last_modified: new Date().toISOString()
                                        })
                                    });
                                }
                            }
                        } catch (err) {
                            console.error('이동 멤버 고객DB 갱신 실패:', member.nameKor, err);
                        }
                    }
                }

                showToast(`${moving.length}명을 "${targetGroup.name}"으로 이동했습니다.`, 'success');
            };

            // 행 추가
            const addRow = () => {
                const newNo = data.length > 0 ? Math.max(...data.map(p => p.no)) + 1 : 1;
                const newData = [...data, {
                    no: newNo,
                    nameKor: '',
                    nameEn: '',
                    gender: 'M',
                    passportNo: '',
                    birthDate: '',
                    idNo: '',
                    passportExpire: '',
                    phone: '',
                    room: '',
                    isVip: false
                }];
                saveCurrentGroupData(newData);
            };

            // 행 삭제
            const deleteRow = async (index) => {
                if (await showConfirmModal('행 삭제', '이 행을 삭제하시겠습니까?', { danger: true })) {
                    const newData = data.filter((_, i) => i !== index);
                    saveCurrentGroupData(newData);
                }
            };

            // VIP 토글 (1번으로 이동)
            const toggleVip = (index) => {
                const newData = [...data];
                const member = newData[index];
                const wasVip = member.isVip;
                member.isVip = !wasVip;

                if (!wasVip) {
                    // VIP로 설정 → 맨 앞으로 이동
                    newData.splice(index, 1);
                    // 기존 VIP 수 계산하여 VIP 그룹 끝에 삽입
                    const vipCount = newData.filter(m => m.isVip).length;
                    newData.splice(vipCount, 0, member);
                }

                // NO 재정렬
                newData.forEach((m, i) => { m.no = i + 1; });
                saveCurrentGroupData(newData);
                showToast(wasVip ? 'VIP 해제되었습니다.' : `${member.nameKor || member.nameEn}님을 VIP로 설정했습니다.`, wasVip ? 'info' : 'success');
            };

            // 고객정보 불러오기 (고객 DB에서 전화번호 등 가져오기)
            const fetchCustomerInfo = async () => {
                if (data.length === 0) {
                    showToast('현재 단체에 멤버가 없습니다.', 'warning');
                    return;
                }

                try {
                    // 고객 DB에서 전체 고객 목록 가져오기
                    const response = await fetch('/tables/customers');
                    const result = await response.json();
                    const customers = result.data || result;

                    if (!Array.isArray(customers) || customers.length === 0) {
                        showToast('고객 DB에 등록된 고객이 없습니다.', 'info');
                        return;
                    }

                    let updatedCount = 0;
                    let skippedCount = 0;
                    const updatedFields = [];

                    const newData = data.map(member => {
                        // 1차: 여권번호로 매칭
                        let matched = null;
                        if (member.passportNo) {
                            matched = customers.find(c =>
                                c.passport_number && c.passport_number === member.passportNo
                            );
                        }

                        // 2차: 여권번호 매칭 실패 시 한글명으로 매칭
                        if (!matched && member.nameKor) {
                            matched = customers.find(c =>
                                c.name_kor && c.name_kor === member.nameKor
                            );
                        }

                        if (!matched) {
                            skippedCount++;
                            return member;
                        }

                        // 매칭된 고객에서 빈 필드만 채우기 (기존 값 덮어쓰지 않음)
                        const updated = { ...member };

                        // 전화번호
                        if (!member.phone && matched.phone) {

                            memberUpdates.push('생년월일');

                        if (hasUpdate) {
                            updatedCount++;
                            updatedFields.push(`${member.nameKor || member.nameEn}: ${memberUpdates.join(', ')}`);

                            skippedCount++;
                        }

                        return updated;
                    });

                    if (updatedCount > 0) {
                        saveCurrentGroupData(newData);

                    showToast(`고객정보 불러오기 실패: ${error.message}`, 'error');
                }
            };

            // 여권 스캔 (GPT-4o-mini Vision)
            const handlePassportScan = async (e) => {
                const files = Array.from(e.target.files || []);
                if (files.length === 0) return;
                e.target.value = ''; // input 리셋

                setShowPassportScanModal(true);
                setPassportScanResults(null);
                setPassportScanProgress({ current: 0, total: files.length, scanning: true });

                try {
                    // 파일 → base64 변환
                    const images = await Promise.all(files.map(file => {
                        return new Promise((resolve, reject) => {
                            const reader = new FileReader();
                            reader.onload = () => {
                                const base64 = reader.result.split(',')[1];
                                resolve({
                                    filename: file.name,
                                    base64,
                                    mimeType: file.type
                                });
                            };
                            reader.onerror = reject;
                            reader.readAsDataURL(file);
                        });
                    }));

                    // 서버에 OCR 요청
                    const response = await fetch('/api/passport-ocr/scan', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ images })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error || '서버 오류');
                    }

                    const result = await response.json();
                    setPassportScanResults(result);
                    setPassportScanProgress({ current: files.length, total: files.length, scanning: false });

                    // OCR 성공 결과가 있으면 자동 적용
                    const successResults = result.results ? result.results.filter(r => r.success && r.data) : [];
                    if (successResults.length > 0) {
                        let newData = [...data];
                        let updatedCount = 0;
                        let addedCount = 0;

                        for (let si = 0; si < successResults.length; si++) {
                            const sr = successResults[si];
                            const d = sr.data;
                            const nameEn = [d.surname, d.givenName].filter(Boolean).join('/');
                            let existingIdx = d.passportNo ? newData.findIndex(m => m.passportNo === d.passportNo) : -1;

                            if (existingIdx >= 0) {
                                const member = { ...newData[existingIdx] };
                                if (!member.nameKor && d.nameKor) member.nameKor = d.nameKor;
                                if (!member.nameEn && nameEn) member.nameEn = nameEn;
                                if (!member.gender && d.gender) member.gender = d.gender;
                                if (!member.birthDate && d.birthDate) member.birthDate = d.birthDate;
                                if (!member.passportExpire && d.passportExpire) member.passportExpire = d.passportExpire;
                                newData[existingIdx] = member;
                                updatedCount++;
                            } else {
                                const newNo = newData.length > 0 ? Math.max(...newData.map(p => p.no)) + 1 : 1;
                                newData.push({
                                    no: newNo,
                                    nameKor: d.nameKor || '',
                                    nameEn: nameEn || '',
                                    gender: d.gender || 'M',
                                    passportNo: d.passportNo || '',
                                    birthDate: d.birthDate || '',
                                    idNo: '',
                                    passportExpire: d.passportExpire || '',
                                    phone: '',
                                    room: ''
                                });
                                addedCount++;
                            }

                            // 고객관리 DB에 여권사본(이미지) 자동 저장 (통합 함수 사용)
                            const imgData = images[si];
                            if (imgData && d.passportNo) {
                                const passportFileData = `data:${imgData.mimeType};base64,${imgData.base64}`;
                                await upsertCustomerToDB({
                                    nameKor: d.nameKor || '',
                                    nameEn: nameEn || '',
                                    passportNo: d.passportNo,
                                    birthDate: d.birthDate || '',
                                    passportExpire: d.passportExpire || '',
                                    gender: d.gender || '',
                                    phone: ''
                                }, {
                                    passportFileData,
                                    passportFileName: imgData.filename
                                });
                            }
                        }

                        saveCurrentGroupData(newData);
                    }
                } catch (error) {
                    console.error('여권 스캔 오류:', error);
                    showToast(`여권 스캔 실패: ${error.message}`, 'error');
                    setShowPassportScanModal(false);
                    setPassportScanProgress({ current: 0, total: 0, scanning: false });

            };

            // 여권 스캔 결과를 명단에 적용
            const applyPassportScanResults = () => {
                if (!passportScanResults || !passportScanResults.results) return;

                const successResults = passportScanResults.results.filter(r => r.success && r.data);
                if (successResults.length === 0) {
                    showToast('적용할 성공 결과가 없습니다.', 'warning');
                    return;
                }

                let newData = [...data];
                let updatedCount = 0;
                let addedCount = 0;

                for (const result of successResults) {
                    const d = result.data;
                    const nameEn = [d.surname, d.givenName].filter(Boolean).join('/');

                    // 여권번호로 기존 행 매칭

                    if (existingIdx >= 0) {

                        if (!member.gender && d.gender) member.gender = d.gender;
                        if (!member.birthDate && d.birthDate) member.birthDate = d.birthDate;
                        if (!member.passportExpire && d.passportExpire) member.passportExpire = d.passportExpire;
                        newData[existingIdx] = member;
                        updatedCount++;
                    } else {
                        // 새 행 추가

                        newData.push({
                            no: newNo,
                            nameKor: d.nameKor || '',
                            nameEn: nameEn || '',
                            gender: d.gender || 'M',

                            birthDate: d.birthDate || '',
                            idNo: '',
                            passportExpire: d.passportExpire || '',

                            room: ''

                saveCurrentGroupData(newData);

                if (updatedCount > 0) message += `- 기존 업데이트: ${updatedCount}명`;
                showToast(message, 'success');
            };

            // ID 일괄 생성
            const generateAllIds = () => {
                let successCount = 0;
                let failCount = 0;

                const newData = data.map(person => {

                showToast(message, 'success', 5000);

            // 기존 DB의 모든 ID를 새 형식으로 변환
            const convertAllIdsToNewFormat = async () => {
                if (!await showConfirmModal('ID 형식 변환', '모든 단체의 ID NO를 새 형식(7자리)으로 변환하시겠습니까? (기존: 670110-1 → 변경: 6701101)')) {
                    return;
                }

                let totalConverted = 0;

                const updatedGroups = groups.map(group => {

                            idNo: finalId
                        };
                    });

                        ...group,
                        members: updatedMembers
                    };
                });

                saveToLocalStorage(updatedGroups);

                // 현재 단체 데이터 새로고침
                if (currentGroup) {
                    const currentGroupData = updatedGroups.find(g => g.id === currentGroup);
                    if (currentGroupData) {
                        setData(currentGroupData.members);
                    }

                let message = `변환 완료! 성공: ${totalConverted}개`;
                if (totalFailed > 0) {
                    message += `, 실패: ${totalFailed}개 (생년월일 확인 필요)`;
                }
                showToast(message, 'success', 5000);
            };

            // 엑셀 가져오기
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // 파일 확장자 확인
                const fileName = file.name.toLowerCase();
                if (!fileName.endsWith('.xlsx') && !fileName.endsWith('.xls')) {
                    showToast('엑셀 파일(.xlsx, .xls)만 업로드 가능합니다.', 'warning');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        // cellDates를 false로 설정하여 숫자로 받음 (타임존 문제 방지)
                        const workbook = XLSX.read(event.target.result, { type: 'binary', cellDates: false, cellNF: false });

                        if (!workbook || !workbook.SheetNames || workbook.SheetNames.length === 0) {
                            showToast('엑셀 파일에 시트가 없습니다.', 'warning');
                            return;
                        }

                        let selectedSheet = null;
                        let headerIndex = -1;
                        let jsonData = null;

                        for (let sheetName of workbook.SheetNames) {
                            const sheet = workbook.Sheets[sheetName];
                            if (!sheet) continue;

                            const data = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: '' });
                            if (!data || data.length === 0) continue;

                            for (let i = 0; i < Math.min(data.length, 20); i++) {
                                const row = data[i];
                                if (!row || row.length === 0) continue;

                                const firstCell = String(row[0] || '').trim().toUpperCase();
                                if (firstCell === 'NO' || firstCell === 'NUM' || firstCell === '번호') {
                                    selectedSheet = sheetName;
                                    headerIndex = i;
                                    jsonData = data;
                                    break;
                                }

                                const rowStr = row.map(c => String(c || '').trim().toLowerCase()).join('|');
                                if (rowStr.includes('한글') || rowStr.includes('이름') || rowStr.includes('name')) {
                                    if (rowStr.includes('여권') || rowStr.includes('생년월일') || rowStr.includes('passport') || rowStr.includes('birth')) {
                                        selectedSheet = sheetName;
                                        headerIndex = i;
                                        jsonData = data;
                                        break;
                                    }
                                }
                            }

                            if (selectedSheet) break;
                        }

                        if (!selectedSheet || !jsonData) {
                            showToast('엑셀 파일에서 헤더를 찾을 수 없습니다. 첫 번째 행에 "번호", "한글명", "영문명" 등의 헤더가 있는지 확인해주세요.', 'warning', 5000);
                            return;
                        }

                        const headers = jsonData[headerIndex];
                        const dataRows = jsonData.slice(headerIndex + 1);

                        const getColIndex = (names) => {
                            for (let name of names) {
                                const idx = headers.findIndex(h => {
                                    const headerStr = String(h || '').trim().toLowerCase();
                                    return headerStr === name.toLowerCase() || headerStr.includes(name.toLowerCase());
                                });
                                if (idx !== -1) return idx;
                            }
                            return -1;
                        };

                        const noIdx = getColIndex(['NO', 'no', 'NUM', '번호']);
                        const nameKrIdx = getColIndex(['한글', '이름', '성명']);
                        const surnameIdx = getColIndex(['성']);
                        const givenNameIdx = getColIndex(['명']);
                        const nameEnIdx = getColIndex(['영문', 'NAME']);
                        const genderIdx = getColIndex(['성별', 'Gender', 'SEX']);
                        const passportIdx = getColIndex(['여권번호', 'Passport', '여권']);
                        const birthIdx = getColIndex(['생년월일', 'Birth', 'DOB']);
                        const idNoIdx = getColIndex(['ID NO', 'IDNO', 'ID']);
                        const expireIdx = getColIndex(['여권만료일', 'Expiry', '만료일']);
                        const phoneIdx = getColIndex(['전화번호', 'Phone', 'Tel']);
                        const roomIdx = getColIndex(['ROOM', 'Room', '방']);

                        const hasNoColumn = noIdx !== -1;

                        const parsedData = dataRows
                            .filter(row => {
                                if (!row || row.length === 0) return false;
                                if (hasNoColumn) {
                                    return row[noIdx] && String(row[noIdx]).trim() !== '';
                                } else {
                                    const hasName = (nameKrIdx !== -1 && row[nameKrIdx] && String(row[nameKrIdx]).trim() !== '') ||
                                                   (nameEnIdx !== -1 && row[nameEnIdx] && String(row[nameEnIdx]).trim() !== '');
                                    return hasName;
                                }
                            })
                            .map((row, idx) => {
                                try {
                                    let nameEn = '';
                                    if (surnameIdx !== -1 && givenNameIdx !== -1) {
                                        const surname = (row[surnameIdx] || '').toString().trim();
                                        const givenName = (row[givenNameIdx] || '').toString().trim();
                                        if (surname && givenName) {
                                            nameEn = `${surname}/${givenName}`;
                                        } else {
                                            nameEn = surname || givenName;
                                        }
                                    } else if (nameEnIdx !== -1) {
                                        nameEn = (row[nameEnIdx] || '').toString().trim();
                                        if (nameEn && !nameEn.includes('/') && nameEn.includes(' ')) {
                                            const parts = nameEn.split(/\s+/);
                                            if (parts.length >= 2) {
                                                nameEn = parts[0] + '/' + parts.slice(1).join(' ');
                                            }
                                        }
                                    }

                                    // 성별 읽기 및 정규화
                                    let rawGender = genderIdx !== -1 ? row[genderIdx] : '';
                                    const gender = normalizeGender(rawGender) || 'M'; // 기본값: 남성

                                    // 생년월일 처리
                                    let birthDate = '';
                                    try {
                                        birthDate = birthIdx !== -1 ? formatDate(row[birthIdx]) : '';
                                    } catch (dateError) {
                                        console.warn(`생년월일 파싱 오류 (행 ${idx + 1}):`, dateError);
                                        birthDate = '';
                                    }

                                    // ID NO가 엑셀에 있으면 사용, 없으면 자동 생성
                                    let idNo = '';
                                    if (idNoIdx !== -1 && row[idNoIdx]) {
                                        idNo = (row[idNoIdx] || '').toString().trim();
                                    }
                                    // ID NO가 없거나 비어있으면 생년월일과 성별로 자동 생성
                                    if (!idNo && birthDate && gender) {
                                        try {
                                            idNo = generateIdNo(gender, birthDate);

                                            console.warn(`ID 생성 오류 (행 ${idx + 1}):`, idError);
                                            idNo = '';

                                    }

                                    // 여권 만료일 처리
                                    let passportExpire = '';
                                    try {
                                        passportExpire = expireIdx !== -1 ? formatDate(row[expireIdx], 'passport') : '';
                                    } catch (expireError) {
                                        console.warn(`여권만료일 파싱 오류 (행 ${idx + 1}):`, expireError);

                                    }

                                    return {

                                        nameKor: nameKrIdx !== -1 ? (row[nameKrIdx] || '').toString().trim() : '',
                                        nameEn: formatEnglishName(nameEn, gender, birthDate),
                                        gender: gender,
                                        passportNo: passportIdx !== -1 ? (row[passportIdx] || '').toString().trim().toUpperCase() : '',
                                        birthDate: birthDate,
                                        idNo: idNo,
                                        passportExpire: passportExpire,
                                        phone: formatPhoneNumber(phoneIdx !== -1 ? (row[phoneIdx] || '').toString().trim() : ''),
                                        room: roomIdx !== -1 ? (row[roomIdx] || '').toString().trim() : ''
                                    };
                                } catch (rowError) {
                                    console.error(`행 ${idx + 1} 파싱 오류:`, rowError);
                                    return null;
                                }
                            })
                            .filter(item => item !== null);

                        if (parsedData.length === 0) {
                            showToast('엑셀 파일에서 유효한 데이터를 찾을 수 없습니다. 한글명/영문명이 입력되어 있는지, 헤더 행이 올바른지 확인해주세요.', 'warning', 5000);
                            return;
                        }

                        // 데이터 저장
                        saveCurrentGroupData(parsedData, true); // 엑셀 업로드 시 고객 관리에도 자동 추가

                        // 성공 메시지 생성
                        const totalRows = dataRows.length;
                        const successRows = parsedData.length;
                        const failedRows = totalRows - successRows;

                        let message = `✅ ${successRows}명의 데이터를 불러왔습니다.`;
                        if (failedRows > 0) {
                            message += `\n⚠️ ${failedRows}개 행은 데이터가 없어 건너뛰었습니다.`;
                        }
                        message += '\n\n고객 관리에 자동 추가 중입니다.';
                        message += '\n처리 결과는 콘솔(F12)에서 확인하세요.';

                        // 고객 추가 완료를 기다린 후 알림
                        setTimeout(() => {
                            showToast(message, 'success', 5000);
                        }, 500);

                    } catch (error) {
                        console.error('❌ 엑셀 읽기 오류:', error);
                        showToast(`엑셀 파일을 읽는 중 오류가 발생했습니다: ${error.message}`, 'error', 5000);

                };
                reader.onerror = (error) => {
