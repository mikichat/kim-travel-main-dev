<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여행상품 일정 변환기</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">
            여행상품 일정 변환기
        </h1>

        <form id="convertForm" class="space-y-4">
            <div>
                <label for="url" class="block text-sm font-medium text-gray-700 mb-1">
                    하나투어 상품 URL
                </label>
                <input
                    type="url"
                    id="url"
                    name="url"
                    placeholder="https://www.hanatour.com/..."
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required
                >
            </div>

            <button
                type="submit"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition-colors"
            >
                엑셀 변환
            </button>
        </form>

        <div id="result" class="mt-4 hidden">
            <!-- Result will be displayed here -->
        </div>
    </div>

    <script>
        const form = document.getElementById('convertForm');
        const urlInput = document.getElementById('url');
        const resultDiv = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const url = urlInput.value.trim();

            // 빈 URL 입력 방지
            if (!url) {
                showError('URL을 입력해주세요.');
                return;
            }

            // 로딩 상태 표시
            showLoading();

            try {
                const response = await fetch('/api/convert', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url })
                });

                if (!response.ok) {
                    // 에러 응답 처리
                    const errorData = await response.json().catch(() => ({
                        detail: '서버 오류가 발생했습니다.'
                    }));
                    throw new Error(errorData.detail || errorData.message || '변환에 실패했습니다.');
                }

                // 성공: 엑셀 파일 다운로드
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = 'hanatour_itinerary.xlsx';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(downloadUrl);

                showSuccess('엑셀 파일 다운로드가 시작되었습니다.');

            } catch (error) {
                showError(error.message || '알 수 없는 오류가 발생했습니다.');
            }
        });

        function showLoading() {
            resultDiv.className = 'mt-4 p-4 bg-blue-50 border border-blue-200 rounded-md';
            resultDiv.innerHTML = `
                <div class="flex items-center">
                    <svg class="animate-spin h-5 w-5 mr-3 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span class="text-blue-700 font-medium">변환 중...</span>
                </div>
            `;
            resultDiv.classList.remove('hidden');
        }

        function showSuccess(message) {
            resultDiv.className = 'mt-4 p-4 bg-green-50 border border-green-200 rounded-md';
            resultDiv.innerHTML = `
                <div class="flex items-start">
                    <svg class="h-5 w-5 text-green-600 mr-3 mt-0.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    <span class="text-green-700">${message}</span>
                </div>
            `;
            resultDiv.classList.remove('hidden');

            // 3초 후 메시지 숨기기
            setTimeout(() => {
                resultDiv.classList.add('hidden');
                urlInput.value = '';
            }, 3000);
        }

        function showError(message) {
            resultDiv.className = 'mt-4 p-4 bg-red-50 border border-red-200 rounded-md';
            resultDiv.innerHTML = `
                <div class="flex items-start">
                    <svg class="h-5 w-5 text-red-600 mr-3 mt-0.5 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                    <span class="text-red-700">${message}</span>
                </div>
            `;
            resultDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
