# 공통 타입 정의
version: "2.0"

types:
  BookingStatus:
    type: enum
    values: [pending, confirmed, ticketed, cancelled]
    labels:
      pending: 대기
      confirmed: 확정
      ticketed: 발권완료
      cancelled: 취소

  SettlementStatus:
    type: enum
    values: [unpaid, paid, partial]
    labels:
      unpaid: 미수
      paid: 입금완료
      partial: 부분입금

  PaymentType:
    type: enum
    values: [cash, card, transfer]
    labels:
      cash: 현금
      card: 카드
      transfer: 계좌이체

  VendorType:
    type: enum
    values: [travel_agency, airline]
    labels:
      travel_agency: 여행사
      airline: 항공사

  UserRole:
    type: enum
    values: [admin, staff]
    labels:
      admin: 관리자
      staff: 직원

  UrgencyLevel:
    type: enum
    values: [urgent, imminent, normal, completed]
    description: D-0 빨강, D-1~3 노랑, D-4+ 기본, 처리완료 초록
    colors:
      urgent: "#DC2626"
      imminent: "#F59E0B"
      normal: "#64748B"
      completed: "#16A34A"

  ApiResponse:
    type: generic
    shape:
      success: boolean
      data: T | null
      error: string | null

  PaginatedResponse:
    type: generic
    shape:
      success: boolean
      data: T[]
      total: number
      page: number
      limit: number
