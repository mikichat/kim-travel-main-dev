<!-- 일정표 파일 업로드: Excel, PDF, Word, HWP 지원 -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일정표 업로드</title>
    <script src="js/tailwind.min.js"></script>
    <link rel="stylesheet" href="css/font-awesome.min.css">
    <script src="js/toast.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <!-- 헤더 -->
        <div class="text-center mb-6">
            <i class="fas fa-file-upload text-5xl text-indigo-600 mb-3"></i>
            <h2 class="text-3xl font-bold text-gray-800">일정표 업로드</h2>
            <p class="text-gray-600 mt-2">여행 일정표 파일을 업로드하세요</p>
        </div>

        <!-- 안내 메시지 -->
        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
            <p class="text-sm text-blue-800">
                <i class="fas fa-info-circle mr-2"></i>
                <strong>지원 형식:</strong> Excel (.xlsx, .xls), PDF (.pdf), Word (.doc, .docx), HWP (.hwp)
            </p>
        </div>

        <!-- 업로드 폼 -->
        <form id="uploadForm" action="/api/upload" method="post" enctype="multipart/form-data">
            <!-- 그룹명 입력 -->
            <div class="mb-5">
                <label for="group_name" class="block text-gray-700 text-sm font-bold mb-2">
                    <i class="fas fa-users text-indigo-600"></i> 그룹명 <span class="text-red-500">*</span>
                </label>
                <input type="text"
                       name="group_name"
                       id="group_name"
                       placeholder="예: 하노이 골프단, 제주 워크샵"
                       required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
            </div>

            <!-- 파일 선택 -->
            <div class="mb-6">
                <label for="schedule_file" class="block text-gray-700 text-sm font-bold mb-2">
                    <i class="fas fa-file text-indigo-600"></i> 일정표 파일 <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <input type="file"
                           name="schedule_file"
                           id="schedule_file"
                           accept=".xlsx,.xls,.pdf,.doc,.docx,.hwp"
                           required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                </div>
                <p class="text-xs text-gray-500 mt-2">
                    <i class="fas fa-info-circle text-blue-600"></i> PDF, Word, HWP 파일은 텍스트로 변환되어 분석됩니다
                </p>
            </div>

            <!-- 업로드 버튼 -->
            <div class="space-y-3">
                <button type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition transform hover:scale-105 shadow-lg">
                    <i class="fas fa-cloud-upload-alt mr-2"></i>업로드 및 데이터 추출
                </button>
                <a href="/select-group.html"
                   class="block w-full bg-purple-100 hover:bg-purple-200 text-purple-700 font-bold py-3 px-6 rounded-lg text-center border border-purple-300 transition">
                    <i class="fas fa-users mr-2"></i>그룹별 일정 보기
                </a>
                <a href="/schedules.html"
                   class="block w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-lg text-center transition">
                    <i class="fas fa-calendar-alt mr-2"></i>일정 관리 페이지로 이동
                </a>
                <a href="/index.html"
                   class="block w-full bg-white hover:bg-gray-50 text-gray-700 font-medium py-3 px-6 rounded-lg text-center border border-gray-300 transition">
                    <i class="fas fa-home mr-2"></i>메인으로 돌아가기
                </a>
            </div>
        </form>

        <!-- 로딩 표시 -->
        <div id="loadingMessage" class="hidden mt-6 p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
            <div class="flex items-center">
                <i class="fas fa-spinner fa-spin text-2xl text-yellow-600 mr-3"></i>
                <div>
                    <p class="text-yellow-800 font-semibold">처리 중입니다...</p>
                    <p class="text-yellow-700 text-sm">파일을 분석하고 있습니다. 잠시만 기다려주세요.</p>
                </div>
            </div>
        </div>

        <!-- 성공 메시지 및 링크 박스 -->
        <div id="successMessage" class="hidden mt-6 p-6 bg-green-50 border border-green-200 rounded-lg">
            <div class="flex items-start mb-4">
                <i class="fas fa-check-circle text-3xl text-green-600 mr-3 mt-1"></i>
                <div>
                    <p class="text-green-800 font-semibold text-lg">업로드 성공!</p>
                    <p class="text-green-700 text-sm mt-1">데이터가 성공적으로 저장되었습니다.</p>
                </div>
            </div>

            <div class="bg-white p-4 rounded-lg border border-green-200 mb-4">
                <p class="text-sm text-gray-600 mb-1"><i class="fas fa-users mr-2"></i>그룹명</p>
                <p class="font-semibold text-gray-800 mb-3" id="successGroupName"></p>

                <p class="text-sm text-gray-600 mb-1"><i class="fas fa-calendar-check mr-2"></i>저장된 일정</p>
                <p class="font-semibold text-gray-800" id="successCount"></p>
            </div>

            <div class="bg-indigo-50 p-4 rounded-lg border border-indigo-200">
                <p class="text-sm text-indigo-800 font-semibold mb-2">
                    <i class="fas fa-link mr-2"></i>랜딩 페이지 URL
                </p>
                <div class="flex gap-2">
                    <input type="text"
                           id="landingPageUrl"
                           readonly
                           aria-label="랜딩 페이지 URL"
                           class="flex-1 px-3 py-2 bg-white border border-indigo-300 rounded text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <button type="button" onclick="copyLandingUrl()"
                            class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded transition">
                        <i class="fas fa-copy mr-1"></i>복사
                    </button>
                </div>
                <p class="text-xs text-indigo-600 mt-2">
                    <i class="fas fa-info-circle mr-1"></i>이 링크를 고객에게 전달하세요
                </p>
            </div>

            <div class="flex gap-3 mt-4">
                <button type="button" onclick="window.location.href=document.getElementById('landingPageUrl').value"
                        class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded transition">
                    <i class="fas fa-eye mr-2"></i>랜딩 페이지 보기
                </button>
                <button type="button" onclick="window.location.href='/schedules.html'"
                        class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-semibold py-2 px-4 rounded transition">
                    <i class="fas fa-list mr-2"></i>일정 관리
                </button>
            </div>
        </div>
    </div>

    <script>
        // URL 복사 함수
        function copyLandingUrl() {
            const urlInput = document.getElementById('landingPageUrl');
            urlInput.select();
            urlInput.setSelectionRange(0, 99999); // 모바일 지원

            try {
                navigator.clipboard.writeText(urlInput.value).then(() => {
                    showToast('URL이 클립보드에 복사되었습니다! 고객에게 전달하세요.', 'success', 4000);
                }).catch(() => {
                    // 대체 방법
                    document.execCommand('copy');
                    showToast('URL이 복사되었습니다.', 'success');
                });
            } catch (err) {
                showToast('URL 복사에 실패했습니다. 수동으로 복사해주세요.', 'error');
            }
        }

        // 폼 제출 시 AJAX로 업로드
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // 기본 폼 제출 방지

            const groupName = document.getElementById('group_name').value.trim();
            const fileInput = document.getElementById('schedule_file');

            // 유효성 검사
            if (!groupName) {
                showToast('그룹명을 입력해주세요.', 'warning');
                return;
            }

            if (!fileInput.files || fileInput.files.length === 0) {
                showToast('파일을 선택해주세요.', 'warning');
                return;
            }

            // 파일 형식 검사
            const fileName = fileInput.files[0].name.toLowerCase();
            const allowedExtensions = ['.xlsx', '.xls', '.pdf', '.doc', '.docx', '.hwp'];
            const isValidFile = allowedExtensions.some(ext => fileName.endsWith(ext));

            if (!isValidFile) {
                showToast('지원하는 파일 형식: Excel, PDF, Word, HWP', 'warning');
                return;
            }

            // 로딩 표시
            document.getElementById('loadingMessage').classList.remove('hidden');

            try {
                // FormData 생성
                const formData = new FormData();
                formData.append('schedule_file', fileInput.files[0]);
                formData.append('group_name', groupName);

                // AJAX 업로드
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                // 로딩 숨기기
                document.getElementById('loadingMessage').classList.add('hidden');

                if (response.ok) {
                    // 성공 - 랜딩 페이지 링크 생성
                    const landingPageUrl = `${window.location.origin}/landing.html?group=${encodeURIComponent(result.group_name)}`;

                    // 성공 메시지 박스 표시
                    document.getElementById('successGroupName').textContent = result.group_name;
                    document.getElementById('successCount').textContent = `${result.saved}개`;
                    document.getElementById('landingPageUrl').value = landingPageUrl;
                    document.getElementById('successMessage').classList.remove('hidden');

                    // 폼 초기화
                    document.getElementById('uploadForm').reset();

                    // 성공 박스로 스크롤
                    document.getElementById('successMessage').scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    // 오류
                    showToast(`업로드 실패: ${result.error || '알 수 없는 오류가 발생했습니다.'}`, 'error');
                }
            } catch (error) {
                // 로딩 숨기기
                document.getElementById('loadingMessage').classList.add('hidden');

                console.error('업로드 오류:', error);
                showToast(`업로드 중 오류가 발생했습니다: ${error.message}`, 'error');
            }
        });

        // 파일 선택 시 파일명 표시 개선
        document.getElementById('schedule_file').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name;
        });
    </script>
</body>
</html>
